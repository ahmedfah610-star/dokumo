<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#ffffff;
  font-family:'Figtree',-apple-system,sans-serif;
  display:flex; flex-direction:column;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── NAV ── */
.ws-nav{
  height:60px; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2rem;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid #e5e5e5;
  z-index:50;
}
.ws-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#111111;}
.ws-logo span{font-family:'Inter',sans-serif;font-size:1.125rem;font-weight:800;letter-spacing:-0.02em;color:#111827;}
.ws-step{font-size:0.72rem;font-weight:600;color:#999999;letter-spacing:0.03em;}

/* ── STAGE ── */
.ws-stage{
  flex:1; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  padding:24px 80px;
}
@media(max-width:600px){.ws-stage{padding:20px 56px;}}

/* ── ARROW BTNS ── */
.ws-arrow{
  position:absolute; top:50%; transform:translateY(-50%);
  z-index:20; width:44px; height:44px; border-radius:50%;
  background:#fff; border:1.5px solid #e5e5e5;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.18s;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
  -webkit-tap-highlight-color:transparent;
}
.ws-arrow:hover{background:#111111;border-color:#111111;}
.ws-arrow:hover svg{stroke:#fff;}
.ws-arrow:active{transform:translateY(-50%) scale(0.93);}
.ws-arrow.prev{left:12px;}
.ws-arrow.next{right:12px;}
@media(max-width:600px){.ws-arrow{width:38px;height:38px;}.ws-arrow.prev{left:6px;}.ws-arrow.next{right:6px;}}

/* ── TRACK ── */
.ws-track-wrap{width:100%;height:100%;overflow:hidden;position:relative;}
.ws-track{
  display:flex; align-items:center; height:100%;
  transition:transform 0.42s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
}

/* ── CARD ── */
.ws-card{
  flex-shrink:0;
  border-radius:16px; overflow:hidden;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.06), 0 0 0 1.5px #e5e5e5;
  cursor:pointer;
  transition:transform 0.42s cubic-bezier(0.4,0,0.2,1),
             box-shadow 0.42s cubic-bezier(0.4,0,0.2,1),
             opacity 0.42s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.ws-card.active{
  box-shadow:0 16px 48px rgba(0,0,0,0.12), 0 0 0 1.5px #111111;
}
.ws-card:not(.active){
  opacity:0.55; transform:scale(0.88);
}
.ws-card.clicking{transform:scale(0.96) !important; transition:transform 0.1s !important;}

/* thumb */
.ws-thumb{width:100%;aspect-ratio:595/842;overflow:hidden;position:relative;}
.ws-thumb-inner{position:absolute;top:0;left:0;width:595px;height:842px;overflow:hidden;}

/* label */
.ws-lbl{
  padding:9px 12px 10px;
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid #e5e5e5;
}
.ws-name{font-size:0.78rem;font-weight:700;color:#111111;letter-spacing:-0.01em;font-family:'Figtree',sans-serif;}
.ws-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* counter + hint */
.ws-footer{
  flex-shrink:0; padding:14px 28px 20px;
  display:flex; align-items:center; justify-content:center; gap:16px;
}
.ws-dots{display:flex;gap:5px;}
.ws-pip{
  width:5px;height:5px;border-radius:50%;
  background:#e5e5e5;
  transition:all 0.2s;
}
.ws-pip.active{background:#111111;width:18px;border-radius:3px;}
.ws-hint{font-size:0.72rem;color:#999999;font-weight:600;letter-spacing:0.03em;font-family:'Figtree',sans-serif;}

/* ── LANG SELECTOR ── */
.ws-lang-wrap{display:flex;align-items:center;gap:7px;}
.ws-lang-label{font-size:0.7rem;font-weight:600;color:#999999;letter-spacing:0.03em;white-space:nowrap;font-family:'Figtree',sans-serif;}
.ws-lang-dd{position:relative;}
.ws-lang-btn{
  display:flex;align-items:center;gap:6px;
  font-size:0.78rem;font-family:'Figtree',sans-serif;font-weight:600;
  color:#111111;background:#f5f5f7;
  border:1.5px solid #e5e5e5;border-radius:8px;
  padding:5px 10px 5px 8px;cursor:pointer;
  transition:border-color 0.15s;white-space:nowrap;user-select:none;
}
.ws-lang-btn:hover{border-color:#999999;}
.ws-lang-btn .ws-chevron{font-size:0.6rem;color:#999;margin-left:2px;}
.ws-lang-menu{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.10);padding:4px;
  min-width:150px;z-index:200;
}
.ws-lang-menu.open{display:block;}
.ws-lang-opt{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:7px;cursor:pointer;
  font-size:0.8rem;font-family:'Figtree',sans-serif;font-weight:600;color:#111;
  transition:background 0.12s;
}
.ws-lang-opt:hover{background:#f5f5f7;}
.ws-lang-opt.active{background:#f0f0f2;}
</style>
</head>
<body>

<nav class="ws-nav">
  <a href="index.html" class="ws-logo">
    <img src="logo2.png" style="height:26px;width:auto;display:block;">
    <span>Dokumo</span>
  </a>
  <div class="ws-lang-wrap">
    <span class="ws-lang-label">🌐 Język CV</span>
    <div class="ws-lang-dd" id="wsLangDd">
      <div class="ws-lang-btn" id="wsLangBtn" onclick="toggleLangMenu()">
        <span id="wsLangFlag">🇵🇱</span>
        <span id="wsLangName">Polski</span>
        <span class="ws-chevron">▼</span>
      </div>
      <div class="ws-lang-menu" id="wsLangMenu">
        <div class="ws-lang-opt active" onclick="pickLang('pl','🇵🇱','Polski',this)">🇵🇱 Polski</div>
        <div class="ws-lang-opt" onclick="pickLang('en','🇬🇧','English',this)">🇬🇧 English</div>
        <div class="ws-lang-opt" onclick="pickLang('de','🇩🇪','Deutsch',this)">🇩🇪 Deutsch</div>
        <div class="ws-lang-opt" onclick="pickLang('uk','🇺🇦','Українська',this)">🇺🇦 Українська</div>
        <div class="ws-lang-opt" onclick="pickLang('es','🇪🇸','Español',this)">🇪🇸 Español</div>
        <div class="ws-lang-opt" onclick="pickLang('cs','🇨🇿','Čeština',this)">🇨🇿 Čeština</div>
        <div class="ws-lang-opt" onclick="pickLang('nl','🇳🇱','Nederlands',this)">🇳🇱 Nederlands</div>
      </div>
    </div>
  </div>
  <span class="ws-step">Wybierz szablon</span>
</nav>

<div class="ws-stage">
  <button class="ws-arrow prev" id="wsPrev" onclick="move(-1)" aria-label="Poprzedni">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f0e0c" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>

  <div class="ws-track-wrap">
    <div class="ws-track" id="wsTrack"></div>
  </div>

  <button class="ws-arrow next" id="wsNext" onclick="move(1)" aria-label="Następny">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f0e0c" stroke-width="2.2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>
</div>

<div class="ws-footer">
  <div class="ws-dots" id="wsDots"></div>
  <span class="ws-hint" id="wsHint">Kliknij, aby wybrać</span>
</div>

<script>
// ── Templates ────────────────────────────────────────────────
const T = [
  { id:'nova',      name:'Nova',       c1:'#1a3a2e', c2:'#2d6b52' },
  { id:'clean',     name:'Clean',      c1:'#1a2744', c2:'#2c4a8a' },
  { id:'cascade',   name:'Cascade',    c1:'#0f766e', c2:'#14b8a6' },
  { id:'metro',     name:'Metro',      c1:'#1a3a2e', c2:'#2d6b52' },
  { id:'executive', name:'Executive',  c1:'#92400e', c2:'#d97706' },
  { id:'athens',    name:'Athens',     c1:'#1e3a5f', c2:'#2563eb' },
  { id:'matrix',    name:'Matrix',     c1:'#00ff88', c2:'#00cc6a' },
  { id:'prism',     name:'Prism',      c1:'#7c3aed', c2:'#ec4899' },
  { id:'linen',     name:'Linen',      c1:'#92400e', c2:'#d97706' },
  { id:'sidebar',   name:'Sidebar',    c1:'#1a2744', c2:'#2c4a8a' },
  { id:'timeline',  name:'Timeline',   c1:'#1a3a2e', c2:'#2d6b52' },
  { id:'bold',      name:'Bold',       c1:'#c0392b', c2:'#e74c3c' },
  { id:'midnight',  name:'Midnight',   c1:'#0f172a', c2:'#334155' },
  { id:'teal',      name:'Teal',       c1:'#0f766e', c2:'#14b8a6' },
  { id:'slate',     name:'Slate',      c1:'#334155', c2:'#64748b' },
  { id:'ocean',     name:'Ocean',      c1:'#1e40af', c2:'#38bdf8' },
  { id:'creative',  name:'Creative',   c1:'#6b21a8', c2:'#a855f7' },
  { id:'coral',     name:'Coral',      c1:'#c2410c', c2:'#fb923c' },
  { id:'rose',      name:'Rose',       c1:'#9d174d', c2:'#ec4899' },
  { id:'shield',    name:'Shield',     c1:'#1a2744', c2:'#e8e4dc' },
];

// ── Sample data ───────────────────────────────────────────────
const S = {
  name: 'Anna Kowalska',
  role: 'Marketing Manager',
  email: 'anna@email.pl',
  phone: '+48 123 456 789',
  city: 'Warszawa',
  linkedin: 'linkedin.com/in/anna',
  sum: 'Doświadczona specjalistka ds. marketingu z 5-letnim stażem w e-commerce i kampaniach cyfrowych. Zarządzam kampaniami Google Ads i Meta, analityką oraz strategią contentową. Osiągam wzrosty konwersji o 30–40%.',
  exp1f: 'Sklep Online ABC',  exp1r: 'Marketing Specialist',  exp1d: 'sty 2021 – obecnie',
  exp1desc: 'Zarządzanie kampaniami Google Ads i Meta Ads z budżetem 50k PLN/mies. Wzrost konwersji o 35%. Tworzenie strategii contentowej i analiz rynku.',
  exp2f: 'Agencja XYZ',       exp2r: 'Junior Marketer',       exp2d: 'cze 2018 – gru 2020',
  exp2desc: 'Obsługa social media dla 12 klientów. Tworzenie treści, raportowanie kampanii i wsparcie działu sprzedaży.',
  exp3f: 'StartUp Sp. z o.o.',exp3r: 'Marketing Intern',      exp3d: 'mar 2017 – maj 2018',
  exp3desc: 'Tworzenie materiałów marketingowych, wsparcie przy organizacji eventów branżowych.',
  edu1: 'Uniwersytet Warszawski', edu1d: 'Zarządzanie i Marketing', edu1y: '2014 – 2018',
  edu2: 'Szkoła Wyższa SGH',     edu2d: 'Podyplomowe: Digital Marketing', edu2y: '2019 – 2020',
  sk1: 'Google Analytics', sk2: 'Facebook Ads', sk3: 'SEO / SEM', sk4: 'Copywriting', sk5: 'Excel', sk6: 'Figma',
  lang1: 'Angielski', lang1l: 'C1 – biegły',
  lang2: 'Niemiecki', lang2l: 'B1 – średniozaawansowany',
  cert1: 'Google Ads Certified – 2023',
  cert2: 'Meta Blueprint – 2022',
  int: 'Fotografia, podróże, psychologia, literatura faktu',
};

// ── Preview HTML builders — full A4 scale (595×842) ──────────
// Fonts are real CV size; scale transform makes them readable in thumbnail
function t(val, style) {
  return `<div style="${style}">${val}</div>`;
}
function sl(label, c, mt=18) {
  return `<div style="font-size:9px;font-weight:800;letter-spacing:0.13em;text-transform:uppercase;color:${c};margin-top:${mt}px;margin-bottom:6px;border-bottom:1.5px solid ${c};padding-bottom:3px;opacity:0.85">${label}</div>`;
}
function expEntry(firm, role, dates, desc, c) {
  return `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div style="font-size:13px;font-weight:700;color:#1e293b">${firm}</div>
      <div style="font-size:10px;color:#94a3b8;flex-shrink:0;margin-left:8px">${dates}</div>
    </div>
    <div style="font-size:11px;color:${c};font-weight:600;margin-top:2px">${role}</div>
    <div style="font-size:10.5px;color:#475569;margin-top:5px;line-height:1.5">${desc}</div>
  </div>`;
}
function eduEntry(school, degree, years) {
  return `<div style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:#1e293b">${school}</div>
    <div style="font-size:11px;color:#64748b;margin-top:2px">${degree} · ${years}</div>
  </div>`;
}
function skillChip(label, bg, color) {
  return `<span style="display:inline-block;background:${bg};color:${color};font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;margin:3px 3px 0 0">${label}</span>`;
}
function contactRow(icon, val, c) {
  return `<span style="font-size:11px;color:${c};margin-right:16px">${icon} ${val}</span>`;
}

// full-width A4 preview at 595px → scaled to fit card
function preview(id, c1, c2) {
  const dk = '#1e293b', mu = '#64748b', lt = '#f8fafc';

  // Shared full-body content for single-column templates
  function body(ac) {
    return `
      ${sl('Podsumowanie', ac, 0)}
      <div style="font-size:11.5px;color:#475569;line-height:1.6;margin-bottom:4px">${S.sum}</div>
      ${sl('Doświadczenie', ac)}
      ${expEntry(S.exp1f, S.exp1r, S.exp1d, S.exp1desc, ac)}
      ${expEntry(S.exp2f, S.exp2r, S.exp2d, S.exp2desc, ac)}
      ${expEntry(S.exp3f, S.exp3r, S.exp3d, S.exp3desc, ac)}
      ${sl('Wykształcenie', ac)}
      ${eduEntry(S.edu1, S.edu1d, S.edu1y)}
      ${eduEntry(S.edu2, S.edu2d, S.edu2y)}
      ${sl('Umiejętności', ac)}
      <div style="margin-bottom:4px">
        ${skillChip(S.sk1,'rgba(0,0,0,0.06)',dk)}${skillChip(S.sk2,'rgba(0,0,0,0.06)',dk)}${skillChip(S.sk3,'rgba(0,0,0,0.06)',dk)}${skillChip(S.sk4,'rgba(0,0,0,0.06)',dk)}${skillChip(S.sk5,'rgba(0,0,0,0.06)',dk)}${skillChip(S.sk6,'rgba(0,0,0,0.06)',dk)}
      </div>
      ${sl('Języki', ac)}
      <div style="display:flex;gap:20px;font-size:11px;color:${dk}">
        <span><b>${S.lang1}</b> — ${S.lang1l}</span><span><b>${S.lang2}</b> — ${S.lang2l}</span>
      </div>
      ${sl('Certyfikaty', ac)}
      <div style="font-size:11px;color:${dk};margin-bottom:3px">${S.cert1}</div>
      <div style="font-size:11px;color:${dk}">${S.cert2}</div>
      ${sl('Zainteresowania', ac)}
      <div style="font-size:11px;color:${mu}">${S.int}</div>
    `;
  }

  // Sidebar body (for 2-col layouts — sidebar has contact/skills, main has exp/edu)
  function sidebarCol(ac, textC, subC) {
    return `
      ${sl('Kontakt', subC, 0)}
      <div style="font-size:10.5px;color:${textC};margin-bottom:4px;line-height:1.7">${S.email}<br>${S.phone}<br>${S.city}<br>${S.linkedin}</div>
      ${sl('Umiejętności', subC)}
      <div>${skillChip(S.sk1,'rgba(255,255,255,0.15)',textC)}${skillChip(S.sk2,'rgba(255,255,255,0.15)',textC)}${skillChip(S.sk3,'rgba(255,255,255,0.15)',textC)}${skillChip(S.sk4,'rgba(255,255,255,0.15)',textC)}${skillChip(S.sk5,'rgba(255,255,255,0.15)',textC)}${skillChip(S.sk6,'rgba(255,255,255,0.15)',textC)}</div>
      ${sl('Języki', subC)}
      <div style="font-size:10.5px;color:${textC};line-height:1.7">${S.lang1} — ${S.lang1l}<br>${S.lang2} — ${S.lang2l}</div>
      ${sl('Certyfikaty', subC)}
      <div style="font-size:10.5px;color:${textC};line-height:1.7">${S.cert1}<br>${S.cert2}</div>
      ${sl('Zainteresowania', subC)}
      <div style="font-size:10.5px;color:${textC};line-height:1.6">${S.int}</div>
    `;
  }
  function mainCol(ac) {
    return `
      ${sl('Podsumowanie', ac, 0)}
      <div style="font-size:11px;color:#475569;line-height:1.6;margin-bottom:4px">${S.sum}</div>
      ${sl('Doświadczenie', ac)}
      ${expEntry(S.exp1f, S.exp1r, S.exp1d, S.exp1desc, ac)}
      ${expEntry(S.exp2f, S.exp2r, S.exp2d, S.exp2desc, ac)}
      ${expEntry(S.exp3f, S.exp3r, S.exp3d, S.exp3desc, ac)}
      ${sl('Wykształcenie', ac)}
      ${eduEntry(S.edu1, S.edu1d, S.edu1y)}
      ${eduEntry(S.edu2, S.edu2d, S.edu2y)}
    `;
  }

  const wrap = (inner, bg='#fff') =>
    `<div style="width:595px;min-height:842px;height:842px;overflow:hidden;background:${bg};font-family:Arial,sans-serif;display:flex;flex-direction:column;box-sizing:border-box;">${inner}</div>`;
  const wrapRow = (inner, bg='#fff') =>
    `<div style="width:595px;min-height:842px;height:842px;overflow:hidden;background:${bg};font-family:Arial,sans-serif;display:flex;box-sizing:border-box;">${inner}</div>`;

  // ── Header variants ──
  function headerLight(namec, rolec, bgc, pad='32px 32px 24px') {
    return `<div style="width:100%;background:${bgc};padding:${pad};flex-shrink:0;box-sizing:border-box;">
      <div style="font-size:30px;font-weight:800;color:${namec};letter-spacing:-0.03em;line-height:1.1">${S.name}</div>
      <div style="font-size:14px;color:${rolec};margin-top:6px;font-weight:500">${S.role}</div>
      <div style="margin-top:12px;font-size:11px;color:${rolec};opacity:0.8">
        ${contactRow('✉', S.email, rolec)}${contactRow('☎', S.phone, rolec)}${contactRow('📍', S.city, rolec)}
      </div>
    </div>`;
  }
  function headerDark(namec='#fff', rolec='rgba(255,255,255,0.75)', bgc=c1, pad='32px 32px 24px') {
    return `<div style="width:100%;background:${bgc};padding:${pad};flex-shrink:0;box-sizing:border-box;">
      <div style="font-size:30px;font-weight:800;color:${namec};letter-spacing:-0.03em;line-height:1.1">${S.name}</div>
      <div style="font-size:14px;color:${rolec};margin-top:6px;font-weight:500">${S.role}</div>
      <div style="margin-top:12px;font-size:11px;color:${rolec}">
        ${contactRow('✉', S.email, rolec)}${contactRow('☎', S.phone, rolec)}${contactRow('📍', S.city, rolec)}
      </div>
    </div>`;
  }

  const R = {
    nova: wrap(`
      ${headerDark('#fff','rgba(255,255,255,0.75)',c1,'28px 32px 22px')}
      <div style="flex:1;padding:0 32px 24px;overflow:hidden">${body(c1)}</div>`),

    clean: wrap(`
      <div style="padding:28px 32px 16px;border-bottom:3px solid ${c1}">
        <div style="font-size:30px;font-weight:800;color:${c1};letter-spacing:-0.03em">${S.name}</div>
        <div style="font-size:14px;color:${mu};margin-top:5px">${S.role}</div>
        <div style="margin-top:10px;font-size:11px;color:${mu}">
          ${contactRow('', S.email, mu)}${contactRow('', S.phone, mu)}${contactRow('', S.city, mu)}
        </div>
      </div>
      <div style="flex:1;padding:0 32px 24px;overflow:hidden">${body(c1)}</div>`),

// ── Lang dropdown ──────────────────────────────────────────
let wsLang = 'pl';
function toggleLangMenu() {
  document.getElementById('wsLangMenu').classList.toggle('open');
}
function pickLang(code, flag, name, el) {
  wsLang = code;
  document.getElementById('wsLangFlag').textContent = flag;
  document.getElementById('wsLangName').textContent = name;
  document.querySelectorAll('.ws-lang-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('wsLangMenu').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!document.getElementById('wsLangDd').contains(e.target)) {
    document.getElementById('wsLangMenu').classList.remove('open');
  }
});

// ── Carousel state ─────────────────────────────────────────
let idx = 0;
const total = T.length;

function stageH() {
  // nav=58, footer~58, vertical padding=48
  return window.innerHeight - 58 - 58 - 48;
}
function cardW() {
  // Size from height so cards fill the vertical space
  const fromH = stageH() * (595 / 842);
  if (window.innerWidth <= 600) return Math.min(fromH, window.innerWidth * 0.76);
  return Math.min(fromH, (window.innerWidth - 160) * 0.38);
}
function gap() { return window.innerWidth <= 600 ? 14 : 22; }

function buildCards() {
  const track = document.getElementById('wsTrack');
  const scale = cardW() / 595;
  const cardH = 842 * scale;

  track.innerHTML = T.map((t, i) => `
    <div class="ws-card ${i===0?'active':''}"
         data-idx="${i}"
         style="width:${cardW()}px;margin:0 ${gap()/2}px;"
         onclick="onCardClick(${i})">
      <div class="ws-thumb" style="height:${cardH}px;">
        <div class="ws-thumb-inner" style="transform-origin:top left;transform:scale(${scale.toFixed(4)});">
          ${preview(t.id, t.c1, t.c2)}
        </div>
      </div>
      <div class="ws-lbl">
        <span class="ws-name">${t.name}</span>
        <span class="ws-dot" style="background:${t.c1}"></span>
      </div>
    </div>`).join('');

  buildDots();
  updateTrack(false);
}

function buildDots() {
  const dotsEl = document.getElementById('wsDots');
  // Show max 7 dots (condensed for many templates)
  const maxDots = 7;
  if (total <= maxDots) {
    dotsEl.innerHTML = T.map((_,i) => `<div class="ws-pip ${i===0?'active':''}" data-i="${i}"></div>`).join('');
  } else {
    dotsEl.innerHTML = `<span id="wsCounter" style="font-size:0.72rem;font-weight:600;color:#9ca3af;letter-spacing:0.04em">1 / ${total}</span>`;
  }
}

function updateDots() {
  const pips = document.querySelectorAll('.ws-pip');
  if (pips.length) {
    pips.forEach((p,i) => p.classList.toggle('active', i === idx));
  } else {
    const counter = document.getElementById('wsCounter');
    if (counter) counter.textContent = `${idx+1} / ${total}`;
  }
}

function updateTrack(animate=true) {
  const track = document.getElementById('wsTrack');
  const cw = cardW(), g = gap();
  const stageW = document.querySelector('.ws-track-wrap').offsetWidth;
  const offset = stageW / 2 - (idx * (cw + g)) - cw / 2;
  track.style.transition = animate ? 'transform 0.42s cubic-bezier(0.4,0,0.2,1)' : 'none';
  track.style.transform = `translateX(${offset}px)`;

  // Update card states
  document.querySelectorAll('.ws-card').forEach((c, i) => {
    c.classList.toggle('active', i === idx);
  });
  updateDots();
  document.getElementById('wsHint').textContent = T[idx].name;
}

function move(dir) {
  idx = (idx + dir + total) % total;
  updateTrack(true);
}

function onCardClick(i) {
  if (i === idx) {
    // Already active → go to creator
    const card = document.querySelectorAll('.ws-card')[i];
    if (card) card.classList.add('clicking');
    setTimeout(() => { window.location.href = `kreator-cv.html?template=${T[i].id}&lang=${wsLang}`; }, 110);
  } else {
    // Navigate to that card
    idx = i;
    updateTrack(true);
  }
}

// ── Touch / swipe ─────────────────────────────────────────
let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) move(dx < 0 ? 1 : -1);
  touchX = null;
}, {passive:true});

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') move(-1);
  if (e.key === 'ArrowRight') move(1);
  if (e.key === 'Enter') { window.location.href = `kreator-cv.html?template=${T[idx].id}&lang=${wsLang}`; }
});

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => buildCards());

// ── Init ─────────────────────────────────────────────────
buildCards();
</script>
