<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #f5f3ef;
  --ink: #0f0e0c;
  --muted: #9ca3af;
  --card-bg: #ffffff;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Syne', sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── CURSOR GLOW ── */
#cursorGlow {
  pointer-events: none;
  position: fixed;
  width: 480px; height: 480px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(26,58,46,0.07) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  transition: opacity 0.4s;
  z-index: 0;
  opacity: 0;
}

/* ── NAV ── */
.ws-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: rgba(245,243,239,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(15,14,12,0.06);
}
.ws-logo {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: var(--ink);
}
.ws-logo span {
  font-size: 1.05rem; font-weight: 800;
  letter-spacing: -0.03em; color: var(--ink);
}
.ws-count {
  font-size: 0.72rem; font-weight: 600;
  color: var(--muted); letter-spacing: 0.04em;
}

/* ── MAIN ── */
.ws-main {
  padding: 100px 28px 80px;
  max-width: 1280px;
  margin: 0 auto;
  position: relative; z-index: 1;
}

/* ── GRID ── */
.ws-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
@media(max-width:1100px){ .ws-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:720px){ .ws-grid { grid-template-columns: repeat(2,1fr); gap:12px; } }

/* ── CARD ── */
.ws-card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  background: var(--card-bg);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 0 0 1px rgba(15,14,12,0.06);
  transition: box-shadow 0.25s ease, transform 0.25s ease;
  transform-style: preserve-3d;
  will-change: transform;
  /* stagger animation */
  opacity: 0;
  animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.ws-card:hover {
  box-shadow: 0 20px 60px rgba(0,0,0,0.13), 0 4px 16px rgba(0,0,0,0.08), 0 0 0 1px rgba(15,14,12,0.08);
}
/* dimming siblings on hover */
.ws-grid:has(.ws-card:hover) .ws-card:not(:hover) {
  opacity: 0.55;
  transform: scale(0.98);
  transition: opacity 0.3s, transform 0.3s, box-shadow 0.25s;
}
.ws-grid:has(.ws-card:hover) .ws-card:hover {
  opacity: 1;
  transform: scale(1.025);
}

/* card thumb */
.ws-thumb {
  aspect-ratio: 3/4;
  overflow: hidden;
  position: relative;
}
.ws-thumb-inner {
  position: absolute; inset: 0;
}

/* card label */
.ws-label {
  padding: 10px 14px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.ws-name {
  font-size: 0.82rem; font-weight: 700;
  color: var(--ink); letter-spacing: -0.01em;
}
.ws-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}

/* hover overlay */
.ws-overlay {
  position: absolute; inset: 0;
  background: rgba(15,14,12,0.0);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.25s;
  pointer-events: none;
}
.ws-card:hover .ws-overlay {
  background: rgba(15,14,12,0.04);
}
.ws-overlay-label {
  background: var(--ink);
  color: #fff;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 8px 20px; border-radius: 99px;
  opacity: 0;
  transform: translateY(6px) scale(0.96);
  transition: opacity 0.2s, transform 0.2s;
}
.ws-card:hover .ws-overlay-label {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* click ripple */
.ws-card.clicking {
  transform: scale(0.97) !important;
  transition: transform 0.12s ease !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
}

/* stagger in */
@keyframes cardIn {
  from { opacity:0; transform: translateY(22px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
</style>

      <div style="height:3px;width:44%;background:rgba(255,255,255,0.45);border-radius:2px"></div>
    </div>
    <div style="padding:12px 14px">${lines('#d1d5db',[78,56,70,52])}</div>
  </div>`,

  shield: (c1,c2)=>`<div style="background:#e8e4dc;width:100%;height:100%;display:flex">
    <div style="width:54%;background:${c1};padding:12px 9px">
      <div style="height:6px;width:78%;background:rgba(255,255,255,0.9);border-radius:2px;margin-bottom:5px"></div>
      <div style="height:3px;width:54%;background:rgba(255,255,255,0.4);border-radius:2px;margin-bottom:12px"></div>
      ${lines('rgba(255,255,255,0.5)',[84,62,74,54],7)}
    </div>
    <div style="flex:1;padding:12px 9px">${lines('#94a3b8',[88,66,78,58],7)}</div>
  </div>`,

  arrow: (c1,c2)=>`<div style="background:#fff7f0;width:100%;height:100%;overflow:hidden;position:relative">
    <div style="position:absolute;top:0;left:0;right:0;height:40%;background:${c1};clip-path:polygon(0 0,100% 0,100% 78%,50% 100%,0 78%)"></div>
    <div style="position:relative;z-index:1;padding:14px 14px 0">
      <div style="height:6px;width:64%;background:rgba(255,255,255,0.92);border-radius:2px;margin-bottom:6px"></div>
      <div style="height:3px;width:44%;background:${c2};border-radius:2px"></div>
    </div>
    <div style="position:relative;z-index:1;padding:46px 14px 0">${lines('#d1d5db',[78,56,70,50],7)}</div>
  </div>`,
};

// ── Render ───────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('wsGrid');
  let html = '';
  TEMPLATES.forEach((t, i) => {
    const prevFn = PREVIEWS[t.id];
    const prevHTML = prevFn ? prevFn(t.color1, t.color2) : `<div style="background:${t.color1};width:100%;height:100%"></div>`;
    html += `<div class="ws-card" data-id="${t.id}" style="animation-delay:${i * 28}ms" onclick="pick('${t.id}')">
      <div class="ws-thumb"><div class="ws-thumb-inner">${prevHTML}</div></div>
      <div class="ws-overlay"><span class="ws-overlay-label">Wybierz</span></div>
      <div class="ws-label">
        <span class="ws-name">${t.name}</span>
        <span class="ws-dot" style="background:${t.color1}"></span>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

// ── Pick → navigate ──────────────────────────────────────────
function pick(id) {
  const card = document.querySelector(`.ws-card[data-id="${id}"]`);
  if (card) {
    card.classList.add('clicking');
    setTimeout(() => {
      window.location.href = `kreator-cv.html?template=${id}`;
    }, 110);
  } else {
    window.location.href = `kreator-cv.html?template=${id}`;
  }
}

// ── Cursor glow ──────────────────────────────────────────────
const glow = document.getElementById('cursorGlow');
let glowVisible = false;

document.addEventListener('mousemove', (e) => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
  if (!glowVisible) { glow.style.opacity = '1'; glowVisible = true; }
});
document.addEventListener('mouseleave', () => {
  glow.style.opacity = '0'; glowVisible = false;
});

// ── 3D tilt on cards ────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  const card = e.target.closest('.ws-card');
  if (card) {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const rx = ((y - cy) / cy) * -6;  // max 6deg tilt
    const ry = ((x - cx) / cx) * 6;
    card.style.transform = `scale(1.025) perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  }
});

document.addEventListener('mouseover', (e) => {
  const card = e.target.closest('.ws-card');
  if (!card) {
    // reset all cards
    document.querySelectorAll('.ws-card').forEach(c => {
      c.style.transform = '';
    });
  }
});

document.querySelectorAll && document.addEventListener('mouseout', (e) => {
  const card = e.target.closest('.ws-card');
  if (card && !card.contains(e.relatedTarget)) {
    card.style.transform = '';
  }
});

render();
</script>
</body>
</html>
