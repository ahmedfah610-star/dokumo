<script>
// cv-templates.js – szablony CV
// Ten plik jest ładowany przez kreator-cv.html

function renderCustomSections(c1, c2) {
  if (typeof cvCustomSections === 'undefined' || !cvCustomSections.length) return '';
  const sections = cvCustomSections.filter(s => s.title || s.content);
  if (!sections.length) return '';
  const tpl = typeof cvTemplate !== 'undefined' ? cvTemplate : '';

  // Section title style matching each template's own certGroups header
  const ts = ({
    sidebar:   `font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:9px`,
    cascade:   `font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:9px`,
    nova:      `font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:14px`,
    coral:     `font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:9px`,
    metro:     `font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:4px;margin-bottom:12px`,
    midnight:  `font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:${c2||c1};margin-bottom:8px`,
    bold:      `font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#111;border-bottom:2px solid ${c1};padding-bottom:3px;margin-bottom:8px`,
    nordic:    `font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:8px`,
    rose:      `font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:${c1};margin-bottom:8px`,
    slate:     `font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:${c1};margin-bottom:8px`,
    teal:      `font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px`,
    creative:  `font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px`,
    shield:    `font-size:13px;font-weight:700;color:#1a2744;border-bottom:2px solid #1a2744;padding-bottom:4px;margin-bottom:8px`,
    athens:    `font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:${c1};margin-bottom:9px`,
    matrix:    `font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px`,
    executive: `font-size:9px;font-weight:800;letter-spacing:0.13em;text-transform:uppercase;color:${c2};border-bottom:1.5px solid ${c2};padding-bottom:3px;opacity:0.85;margin-bottom:10px`,
    prism:     `font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px`,
    linen:     `font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:${c1};margin-bottom:8px`,
  })[tpl] || `font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px`;

  const isDark = tpl === 'matrix';
  const contentStyle = `font-size:9.5px;color:${isDark?'#c9d1d9':'#555'};line-height:1.65`;

  const html = sections.map(s =>
    `<div style="margin-bottom:16px"><div style="${ts}">${s.title}</div><div style="${contentStyle}">${s.content}</div></div>`
  ).join('');

  return html ? `<div style="margin-top:16px">${html}</div>` : '';
}

function buildCVHTML(tpl) {
  const d = cvData;
  const t = CV_TEMPLATES.find(x => x.id === tpl) || CV_TEMPLATES[0];
  const c1 = (typeof cvCustomColor !== 'undefined' && cvCustomColor) ? cvCustomColor.c1 : t.color1;
  const c2 = (typeof cvCustomColor !== 'undefined' && cvCustomColor) ? cvCustomColor.c2 : t.color2;
  const name = [d.imie, d.nazwisko].filter(Boolean).join(' ') || 'Imię Nazwisko';
  const skills = d.umiejetnosci ? d.umiejetnosci.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const certItems = (d.certyfikatyList||[]).filter(c=>c.nazwa).map(c => c.nazwa + (c.wydawca ? ' – '+c.wydawca : '') + (c.rok ? ', '+c.rok : ''));
  const kursyItems = (d.kursy||[]).filter(k=>k.nazwa).map(k => { let dates=''; if(k.od&&k.do) dates=' '+k.od+' – '+k.do; else if(k.od&&k.obecnie) dates=' '+k.od+' – obecnie'; else if(k.od) dates=' '+k.od; return k.nazwa+(k.prowadzacy?' – '+k.prowadzacy:'')+dates; });
  const stazeItems = (d.staze||[]).filter(s=>s.firma).map(s => { let dates=''; if(s.od&&s.do) dates=' '+s.od+' – '+s.do; else if(s.od&&s.obecnie) dates=' '+s.od+' – obecnie'; else if(s.od) dates=' '+s.od; else if(s.do) dates=' do '+s.do; return s.firma+dates; });
  const certGroups = [
    ...(certItems.length ? [{ key: 'certyfikaty', label: 'Certyfikaty', items: certItems }] : []),
    ...(kursyItems.length ? [{ key: 'kursy', label: 'Kursy', items: kursyItems }] : []),
    ...(stazeItems.length ? [{ key: 'staze', label: 'Staże', items: stazeItems }] : []),
  ];
  const photo = d.zdjecie ? `<img src="${d.zdjecie}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : '';
  const contact = [
    d.email && `<span>✉ ${d.email}</span>`,
    d.tel && `<span>📞 ${d.tel}</span>`,
    d.adres && `<span>📍 ${d.adres}</span>`,
    d.linkedin && `<span>🔗 ${d.linkedin}</span>`,
  ].filter(Boolean).join('');

  // ── TIMELINE ──────────────────────────────────────────────
  if (tpl === 'timeline') return `
    <div style="font-family:Arial,sans-serif;background:#fff;padding:0;min-height:842px">
      <div style="background:linear-gradient(135deg,${c1},${c2});padding:36px 40px 28px;display:flex;align-items:center;gap:22px">
        ${d.zdjecie ? `<div style="width:88px;height:88px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,0.5);flex-shrink:0">${photo}</div>` : ''}
        <div>
          <div style="font-size:26px;font-weight:700;color:#fff;line-height:1.1">${name}</div>
          ${d.stanowisko?`<div style="font-size:12px;color:rgba(255,255,255,0.8);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">${d.stanowisko}</div>`:''}
          <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:9.5px;color:rgba(255,255,255,0.75)">${contact}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 200px;gap:0;padding:24px 40px;align-items:start">
        <div style="padding-right:32px;border-right:2px solid #f0f0f0">
          ${d.podsumowanie?`<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:6px">${L("profile")}</div><div style="font-size:10px;line-height:1.7;color:#555">${d.podsumowanie}</div></div>`:''}
          ${d.doswiadczenie.some(e=>e.firma||e.stanowisko)?`
          <div style="margin-bottom:20px">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:12px">${L("experience")}</div>
            ${d.doswiadczenie.filter(e=>e.firma||e.stanowisko).map(e=>`
              <div style="display:flex;gap:12px;margin-bottom:18px">
                <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
                  <div style="width:10px;height:10px;border-radius:50%;background:${c1};flex-shrink:0;margin-top:2px"></div>
                  <div style="width:2px;flex:1;background:#e8e8e8;margin-top:3px"></div>
                </div>
                <div style="padding-bottom:12px">
                  <div style="font-size:11px;font-weight:700;color:#1a1a1a">${e.stanowisko||''}</div>
                  <div style="font-size:10px;color:${c2};font-weight:600">${e.firma||''}</div>
                  <div style="font-size:9px;color:#aaa;margin-bottom:3px">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
                  ${e.opis?`<div style="font-size:9.5px;color:#666;line-height:1.6">${e.opis}</div>`:''}
                </div>
              </div>`).join('')}
          </div>`:''}
          ${d.wyksztalcenie.some(e=>e.szkola)?`
          <div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:12px">${L("education")}</div>
            ${d.wyksztalcenie.filter(e=>e.szkola).map(e=>`
              <div style="display:flex;gap:12px;margin-bottom:16px">
                <div style="width:10px;height:10px;border-radius:50%;background:${c1};flex-shrink:0;margin-top:2px"></div>
                <div>
                  <div style="font-size:11px;font-weight:700;color:#1a1a1a">${e.kierunek||''}</div>
                  <div style="font-size:10px;color:#666">${e.szkola}</div>
                  <div style="font-size:9px;color:#aaa">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
                </div>
              </div>`).join('')}
          </div>`:''}${renderCustomSections(c1, c2)}
        </div>
        <div style="padding-left:20px">
          ${skills.length?`
          <div style="margin-bottom:20px">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px">${L("skills")}</div>
            ${skills.map(s=>`<div style="font-size:9.5px;margin-bottom:5px;display:flex;align-items:center;gap:6px"><span style="width:5px;height:5px;border-radius:50%;background:${c1};flex-shrink:0;display:inline-block"></span>${s}</div>`).join('')}
          </div>`:''}
          ${d.jezyki.some(l=>l.jezyk)?`
          <div style="margin-bottom:20px">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px">${L("languages")}</div>
            ${d.jezyki.filter(l=>l.jezyk).map(l=>`<div style="font-size:9.5px;margin-bottom:5px"><strong>${l.jezyk}</strong> <span style="color:#aaa">– ${l.poziom}</span></div>`).join('')}
          </div>`:''}
          ${certGroups.map(({label,items}) => `<div style="margin-bottom:16px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px">${label}</div>${items.map(c=>`<div style="font-size:9.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px"><span style="width:5px;height:5px;border-radius:50%;background:${c1};flex-shrink:0;display:inline-block"></span>${c}</div>`).join('')}</div>`).join('')}
          ${d.zainteresowania?`
          <div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${c1};margin-bottom:8px">${L("interests")}</div>
            <div style="font-size:9.5px;color:#666;line-height:1.6">${d.zainteresowania}</div>
          </div>`:''}
        </div>
      </div>
      <div style="text-align:center;font-size:7.5px;color:#ccc;padding:10px;border-top:1px solid #f0f0f0">${L("consent")}</div>
    </div>`;

  // ── SIDEBAR ───────────────────────────────────────────────
  if (tpl === 'sidebar') return `
    <div style="font-family:'Segoe UI',Arial,Helvetica,sans-serif;display:flex;min-height:842px;background:#fff">
      <div style="width:215px;background:${c1};flex-shrink:0;display:flex;flex-direction:column;min-height:842px">
        <div style="padding:28px 20px 22px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1)">
          ${d.zdjecie?`<div style="width:82px;height:82px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:3px solid rgba(255,255,255,0.28)">${photo}</div>`:''}
          <div style="font-size:16px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-0.2px">${name}</div>
          ${d.stanowisko?`<div style="font-size:8px;color:rgba(255,255,255,0.55);margin-top:5px;text-transform:uppercase;letter-spacing:1.2px;line-height:1.4">${d.stanowisko}</div>`:''}
        </div>
        <div style="padding:16px 20px 0;flex:1">
          <div style="margin-bottom:15px">
            <div style="font-size:7.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:9px">${L("contact")}</div>
            ${[d.email,d.tel,d.adres,d.linkedin].filter(Boolean).map(x=>`<div style="font-size:8.5px;color:rgba(255,255,255,0.72);margin-bottom:5px;line-height:1.45;word-break:break-word">${x}</div>`).join('')}
          </div>
          ${skills.length?`
          <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:13px;margin-bottom:15px">
            <div style="font-size:7.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px">${L("skills")}</div>
            ${skills.map(s=>`<div style="font-size:8.5px;color:rgba(255,255,255,0.78);margin-bottom:5px;display:flex;align-items:flex-start;gap:5px"><span style="color:rgba(255,255,255,0.3);flex-shrink:0;margin-top:2px;font-size:7px">▸</span>${s}</div>`).join('')}
          </div>`:''}
          ${d.jezyki.some(l=>l.jezyk)?`
          <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:13px;margin-bottom:15px">
            <div style="font-size:7.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px">${L("languages")}</div>
            ${d.jezyki.filter(l=>l.jezyk).map(l=>`<div style="font-size:8.5px;color:rgba(255,255,255,0.78);margin-bottom:5px">${l.jezyk} <span style="color:rgba(255,255,255,0.4)">· ${l.poziom}</span></div>`).join('')}
          </div>`:''}
          ${certGroups.map(({label,items}) => `<div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:13px;margin-bottom:15px"><div style="font-size:7.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:9px">${label}</div>${items.map(c=>`<div style="font-size:8.5px;color:rgba(255,255,255,0.72);margin-bottom:4px">· ${c}</div>`).join('')}</div>`).join('')}
          ${d.zainteresowania?`
          <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:13px;margin-bottom:15px">
            <div style="font-size:7.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">${L("interests")}</div>
            <div style="font-size:8.5px;color:rgba(255,255,255,0.65);line-height:1.65">${d.zainteresowania}</div>
          </div>`:''}
        </div>
      </div>
      <div style="flex:1;padding:28px 28px 20px;display:flex;flex-direction:column;min-width:0">
        ${d.podsumowanie?`
        <div style="margin-bottom:20px">
          <div style="font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:9px">${L("profile")}</div>
          <div style="font-size:10px;line-height:1.75;color:#484848">${d.podsumowanie}</div>
        </div>`:''}
        ${d.doswiadczenie.some(e=>e.firma||e.stanowisko)?`
        <div style="margin-bottom:20px">
          <div style="font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:14px">${L("experience")}</div>
          ${d.doswiadczenie.filter(e=>e.firma||e.stanowisko).map(e=>`
          <div style="margin-bottom:18px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div style="font-size:11px;font-weight:700;color:#1c1c1c;line-height:1.3">${e.stanowisko||''}</div>
              <div style="font-size:8.5px;color:#aaa;white-space:nowrap;flex-shrink:0;margin-top:1px">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
            </div>
            <div style="font-size:9.5px;color:${c1};font-weight:600;margin:2px 0 4px">${e.firma||''}</div>
            ${e.opis?`<div style="font-size:9.5px;color:#555;line-height:1.65">${e.opis}</div>`:''}
          </div>`).join('')}
        </div>`:''}
        ${d.wyksztalcenie.some(e=>e.szkola)?`
        <div style="margin-bottom:20px">
          <div style="font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:${c1};border-bottom:1.5px solid ${c1};padding-bottom:5px;margin-bottom:12px">${L("education")}</div>
          ${d.wyksztalcenie.filter(e=>e.szkola).map(e=>`
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div style="font-size:11px;font-weight:700;color:#1c1c1c">${e.kierunek||''}</div>
              <div style="font-size:8.5px;color:#aaa;white-space:nowrap;flex-shrink:0">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
            </div>
            <div style="font-size:9.5px;color:#555">${e.szkola}</div>
          </div>`).join('')}
        </div>`:''}${renderCustomSections(c1, c2)}
        <div style="margin-top:auto;font-size:7.5px;color:#ccc;border-top:1px solid #f0f0f0;padding-top:8px;text-align:center">${L("consent")}</div>
      </div>
    </div>`;

  // ── CREATIVE (fioletowy gradient) ─────────────────────────
  if (tpl === 'creative') return `
    <div style="font-family:'Segoe UI',Arial,sans-serif;background:#fff;min-height:842px">

<script>
function updateChip(){
  const sub=(()=>{try{return JSON.parse(localStorage.getItem('dokumo_sub'));}catch(e){return null;}})();
  const chip=document.getElementById('uPlanChip');
  if(!chip)return;
  const active=sub&&sub.expiresAt&&new Date(sub.expiresAt)>new Date();
  const names={kariera:'Kariera',biznes:'Biznes',promax:'Pro Max',pro:'PRO'};
  chip.textContent=active?(names[sub.plan]||'PRO'):'Free';
  chip.className='cv-nav-badge '+(active?'pro':'free');
}
updateChip(); // od razu z localStorage

// Po zalogowaniu Firebase — odśwież z API + profil + wersja robocza
window.addEventListener('_fbAuthReady', async ()=>{
  updateCVNavProfile();
  if(!window._fbToken) return;
  try{
    const token = typeof window._fbToken === 'function' ? await window._fbToken() : window._fbToken;
    const res=await fetch('/api/check-sub',{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    if(data.active&&data.expiresAt){
      localStorage.setItem('dokumo_sub',JSON.stringify({plan:data.plan,expiresAt:data.expiresAt}));
      updateChip();
    }
  }catch(e){}
  // Załaduj wersję roboczą tylko jeśli nie ma danych z edycji
  if(!window._cvEditLoaded) loadCVDraft();
});
</script>

<script>
// ── PROFIL W NAW ──────────────────────────────────────────
function updateCVNavProfile() {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('dokumo_user')); } catch(e) {}
  var profile = document.getElementById('cvNavProfile');
  if (!profile) return;
  if (user) {
    profile.style.display = 'flex';
    var avatar = document.getElementById('cvNavAvatar');
    var emailEl = document.getElementById('cvNavEmail');
    if (emailEl) emailEl.textContent = user.email || '';
    if (avatar) {
      if (user.photo) {
        avatar.innerHTML = '<img src="' + user.photo + '" alt="" style="width:100%;height:100%;object-fit:cover">';
      } else {
        avatar.textContent = (user.email || 'U')[0].toUpperCase();
      }
    }
  } else {
    profile.style.display = 'none';
  }
  var resetBtn = document.getElementById('btnResetCV');
  if (resetBtn) resetBtn.style.display = user ? '' : 'none';
}

// Przenieś dropdown do <body> żeby żaden stacking context z nav nie blokował
document.addEventListener('DOMContentLoaded', function() {
  var dd = document.getElementById('cvNavDropdown');
  if (dd) document.body.appendChild(dd);
});

function toggleCVNavDropdown(e) {
  e.stopPropagation();
  var dd = document.getElementById('cvNavDropdown');
  if (!dd) return;
  var isOpen = dd.classList.contains('open');
  dd.classList.toggle('open');
  if (!isOpen) {
    var avatar = document.getElementById('cvNavAvatar');
    if (avatar) {
      var rect = avatar.getBoundingClientRect();
      dd.style.top = (rect.bottom + 8) + 'px';
      dd.style.right = (window.innerWidth - rect.right) + 'px';
      dd.style.left = 'auto';
    }
  }
}

document.addEventListener('click', function() {
  var dd = document.getElementById('cvNavDropdown');
  if (dd) dd.classList.remove('open');
});

function logoutUserCV() {
  localStorage.removeItem('dokumo_user');
  localStorage.removeItem('dokumo_sub');
  (window._fbSignOut ? window._fbSignOut() : Promise.resolve()).finally(() => { window.location.href = 'index.html'; });
}

function confirmResetCV() {
  resetCVData();
}

async function resetCVData() {
  cvData = {
    imie:'', nazwisko:'', stanowisko:'', email:'', tel:'', adres:'', linkedin:'', www:'',
    zdjecie: null,
    podsumowanie:'',
    doswiadczenie:[{ firma:'', stanowisko:'', od:'', do:'', opis:'' }],
    wyksztalcenie:[{ szkola:'', kierunek:'', od:'', do:'', opis:'' }],
    umiejetnosci:'',
    certyfikatyList:[],
    kursy:[],
    staze:[],
    jezyki:[{ jezyk:'', poziom:'B2' }],
    zainteresowania:''
  };
  if (typeof cvCustomColor !== 'undefined') cvCustomColor = null;
  if (typeof cvCustomSections !== 'undefined') cvCustomSections = [];
  try {
    var token = typeof window._fbToken === 'function' ? await window._fbToken() : window._fbToken;
    if (token) {
      await fetch('/api/draft', {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
    }
  } catch(e) {}
  if (typeof renderCVForm === 'function') renderCVForm();
  if (typeof updateCVPreview === 'function') updateCVPreview();
}

// ── WERSJA ROBOCZA – AUTOSAVE ─────────────────────────────
var _draftTimer = null;

function triggerDraftSave() {
  if (!window._fbToken) return;
  var badge = document.getElementById('cvDraftBadge');
  if (badge) { badge.textContent = '💾 Zapisuję...'; badge.classList.add('visible'); }
  clearTimeout(_draftTimer);
  _draftTimer = setTimeout(saveCVDraft, 2500);
}

async function saveCVDraft() {
  try {
    var token = typeof window._fbToken === 'function' ? await window._fbToken() : window._fbToken;
    if (!token) return;
    var cvPreviewEl = document.getElementById('cvPreviewInner');
    var cvText = cvPreviewEl ? '__CV_HTML__:' + cvPreviewEl.outerHTML : '';
    var resp = await fetch('/api/draft', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        text: cvText,
        cvDataJson: JSON.stringify(Object.assign({}, cvData, { __template: cvTemplate, __color: cvCustomColor || null, __customSections: cvCustomSections || [], __sidebarSections: Array.from(cvSidebarSections) }))
      })
    });
    if (resp.ok) {
      var badge = document.getElementById('cvDraftBadge');
      if (badge) {
        badge.textContent = '✓ Zapisano';
        clearTimeout(badge._hideTimer);
        badge._hideTimer = setTimeout(function() { badge.classList.remove('visible'); }, 3000);
      }
    }
  } catch(e) {}
}

async function loadCVDraft() {
  try {
    var token = typeof window._fbToken === 'function' ? await window._fbToken() : window._fbToken;
    if (!token) return;
    var resp = await fetch('/api/draft', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!resp.ok) return;
    var data = await resp.json();
    if (!data.cvDataJson) return;
    var loaded = JSON.parse(data.cvDataJson);
    // If user picked a template from wybierz-szablon.html (?template=…), keep it — only restore from draft when no template was explicitly chosen
    var urlTpl = new URLSearchParams(location.search).get('template');
    if (!urlTpl && loaded.__template) cvTemplate = loaded.__template;
    if (loaded.__color) cvCustomColor = loaded.__color;
    if (loaded.__customSections) cvCustomSections = loaded.__customSections;
    if (loaded.__sidebarSections) cvSidebarSections = new Set(loaded.__sidebarSections);
    delete loaded.__template; delete loaded.__color; delete loaded.__customSections; delete loaded.__sidebarSections;
    Object.assign(cvData, loaded);
    if (typeof renderCVForm === 'function') renderCVForm();
    if (typeof updateCVPreview === 'function') updateCVPreview();
    if (typeof renderTplGrid === 'function') renderTplGrid();
    var badge = document.getElementById('cvDraftBadge');
    if (badge) {
      badge.textContent = '↩ Wersja robocza przywrócona';
      badge.classList.add('visible');
      clearTimeout(badge._hideTimer);
      badge._hideTimer = setTimeout(function() { badge.classList.remove('visible'); }, 5000);
    }
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  updateCVNavProfile();
  if (new URLSearchParams(location.search).get('mode') === 'import') {
    const dataUrl = sessionStorage.getItem('dokumo_import_cv_pdf');
    if (dataUrl) {
      sessionStorage.removeItem('dokumo_import_cv_pdf');
      try {
        const base64 = dataUrl.split(',')[1];
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        processCvImport(bytes.buffer);
      } catch(e) { console.error('Błąd odczytu pliku:', e); }
    }
  }
});
</script>

<script>
// ======================================================
// IMPORT CV Z PDF (wyzwalany z kariera.html via sessionStorage)
// ======================================================

try { pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; } catch(e) {}

function _cvImportSetProgress(text, pct) {
  document.getElementById('cvImportText').textContent = text;
  document.getElementById('cvImportBar').style.width = pct + '%';
}

function _cvImportShowError(msg) {
  document.getElementById('cvImportText').textContent = 'Wystąpił błąd';
  document.getElementById('cvImportBar').style.width = '0%';
  const errEl = document.getElementById('cvImportError');
  errEl.textContent = '⚠ ' + msg;
  errEl.style.display = 'block';
  document.getElementById('cvImportErrorClose').style.display = 'inline-block';
}

async function processCvImport(arrayBuffer) {
  const overlay = document.getElementById('cvImportOverlay');
  overlay.style.display = 'flex';
  _cvImportSetProgress('Wczytuję plik PDF…', 10);

  try {
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(item => item.str).join(' ') + '\n';
    }

    if (!fullText.trim()) {
      _cvImportShowError('Nie udało się wyciągnąć tekstu z PDF. Upewnij się, że plik nie jest skanem obrazkowym.');
      return;
    }

    _cvImportSetProgress('Wyciągam dane przez AI…', 40);

    const prompt = `Jesteś profesjonalnym parserem CV. Wyciągnij WSZYSTKIE informacje z poniższego tekstu CV i zwróć je jako pojedynczy poprawny obiekt JSON. Zachowaj oryginalny język danych (nie tłumacz).

Zwróć TYLKO surowy obiekt JSON (bez markdown, bez backticks, bez wyjaśnień) w tej dokładnej strukturze:
{
  "imie": "imię",
  "nazwisko": "nazwisko",
  "stanowisko": "stanowisko/tytuł zawodowy",
  "email": "email",
  "tel": "telefon",
  "adres": "miasto, kraj",
  "linkedin": "url linkedin lub puste",
  "www": "strona www lub puste",
  "podsumowanie": "podsumowanie zawodowe 2-4 zdania",
  "doswiadczenie": [
    {"firma": "nazwa firmy", "stanowisko": "stanowisko", "od": "data rozpoczęcia", "do": "data zakończenia lub obecnie", "opis": "obowiązki"}
  ],
  "wyksztalcenie": [
    {"szkola": "nazwa uczelni/szkoły", "kierunek": "kierunek studiów", "od": "rok rozpoczęcia", "do": "rok ukończenia", "opis": ""}
  ],
  "umiejetnosci": "umiejętności oddzielone przecinkami",
  "jezyki": [
    {"jezyk": "nazwa języka", "poziom": "poziom (A1/A2/B1/B2/C1/C2/Ojczysty)"}
  ],
  "zainteresowania": "zainteresowania oddzielone przecinkami"
}

TEKST CV:
${fullText.substring(0, 8000)}`;

    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!response.ok) throw new Error('Błąd API: ' + response.status);

    _cvImportSetProgress('Przetwarzam odpowiedź AI…', 78);

    const data = await response.json();
    const rawText = data.text || data.result || '';

    let parsed;
    try {
      parsed = JSON.parse(rawText.replace(/```json|```/g, '').trim());
    } catch(e) {
      const match = rawText.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else throw new Error('Nie udało się odczytać odpowiedzi AI.');
    }

    _cvImportSetProgress('Wypełniam formularz…', 94);

    cvData.imie = parsed.imie || '';
    cvData.nazwisko = parsed.nazwisko || '';
    cvData.stanowisko = parsed.stanowisko || '';
    cvData.email = parsed.email || '';
    cvData.tel = parsed.tel || '';
    cvData.adres = parsed.adres || '';
    cvData.linkedin = parsed.linkedin || '';
    cvData.www = parsed.www || '';
    cvData.podsumowanie = parsed.podsumowanie || '';
    cvData.umiejetnosci = parsed.umiejetnosci || '';
    cvData.zainteresowania = parsed.zainteresowania || '';

    if (Array.isArray(parsed.doswiadczenie) && parsed.doswiadczenie.length > 0) {
      cvData.doswiadczenie = parsed.doswiadczenie.map(e => ({
        firma: e.firma || '', stanowisko: e.stanowisko || '',
        od: e.od || '', do: e.do || '', opis: e.opis || ''
      }));
    }
    if (Array.isArray(parsed.wyksztalcenie) && parsed.wyksztalcenie.length > 0) {
      cvData.wyksztalcenie = parsed.wyksztalcenie.map(e => ({
        szkola: e.szkola || '', kierunek: e.kierunek || '',
        od: e.od || '', do: e.do || '', opis: e.opis || ''
      }));
    }
    if (Array.isArray(parsed.jezyki) && parsed.jezyki.length > 0) {
      cvData.jezyki = parsed.jezyki.map(l => ({ jezyk: l.jezyk || '', poziom: l.poziom || 'B2' }));
    }

    _cvImportSetProgress('Gotowe! ✓', 100);

    setTimeout(() => {
      renderCVForm();
      updateCVPreview();
      overlay.style.display = 'none';
    }, 600);

  } catch(err) {
    console.error('Import error:', err);
    _cvImportShowError(err.message || 'Spróbuj ponownie.');
  }
}

function switchCVTab(tab) {
  const formCol = document.getElementById('cvFormPanel');
  const previewCol = document.getElementById('cvPreviewCol');
  const tabForm = document.getElementById('tabForm');
  const tabPreview = document.getElementById('tabPreview');
  const isMobile = window.innerWidth < 768;

  if (!isMobile) return;

  if (tab === 'form') {
    formCol.style.display = '';
    previewCol.style.display = 'none';
    tabForm.classList.add('active');
    tabPreview.classList.remove('active');
  } else {
    formCol.style.display = 'none';
    previewCol.style.display = 'flex';
    tabPreview.classList.add('active');
    tabForm.classList.remove('active');
    scaleMobilePreview();
  }
}

function scaleMobilePreview() {
  const previewDoc = document.getElementById('cvPreviewInner');
  const previewCol = document.getElementById('cvPreviewCol');
  if (!previewDoc || !previewCol || window.innerWidth >= 768) return;
  // Use full viewport width with 16px margin each side
  const vw = window.innerWidth;
  const margin = 12;
  const availW = vw - margin * 2;
  const scale = availW / 595;
  const scaledH = Math.round(842 * scale);
  previewDoc.style.zoom = '';
  previewDoc.style.width = '595px';
  previewDoc.style.transform = `scale(${scale})`;
  previewDoc.style.transformOrigin = 'top left';
  previewDoc.style.position = 'relative';
  previewDoc.style.left = margin + 'px';
  previewDoc.style.top = '0';
  previewDoc.style.marginTop = '0';
  previewDoc.style.marginBottom = -(842 - scaledH) + 'px'; // collapse extra space
  previewDoc.style.flexShrink = '0';
  // Container: enough height for scaled content + label + bottom bar
  previewCol.style.minHeight = (scaledH + 60) + 'px';
  previewCol.style.overflow = 'auto';
  previewCol.style.paddingLeft = '0';
  previewCol.style.paddingRight = '0';
  previewCol.style.alignItems = 'flex-start';
}

var _cvZoom = 1.0;
var _cvZoomMin = 0.4;
var _cvZoomMax = 2.0;
var _cvZoomStep = 0.1;

function applyCvZoom() {
  var doc = document.getElementById('cvPreviewInner');
  if (!doc || window.innerWidth < 768) return;
  doc.style.zoom = _cvZoom;
  var el = document.getElementById('cvZoomLevel');
  if (el) el.textContent = Math.round(_cvZoom * 100) + '%';
}

function cvZoomStep(dir) {
  _cvZoom = Math.min(_cvZoomMax, Math.max(_cvZoomMin, Math.round((_cvZoom + dir * _cvZoomStep) * 100) / 100));
  applyCvZoom();
}

(function() {
  var col = document.getElementById('cvPreviewCol');
  if (!col) return;
  col.addEventListener('wheel', function(e) {
    if (window.innerWidth < 768) return;
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      var dir = e.deltaY > 0 ? -1 : 1;
      cvZoomStep(dir);
    }
  }, { passive: false });
})();

window.addEventListener('resize', () => {
  if (window.innerWidth >= 768) {
    const formCol = document.getElementById('cvFormPanel');
    const previewCol = document.getElementById('cvPreviewCol');
    if (formCol) formCol.style.display = '';
    if (previewCol) { previewCol.style.display = ''; previewCol.style.minHeight = ''; }
    const previewDoc = document.getElementById('cvPreviewInner');
    if (previewDoc) {
      previewDoc.style.transform = '';
      previewDoc.style.width = '';
      previewDoc.style.position = '';
      previewDoc.style.left = '';
      previewDoc.style.flexShrink = '';
      previewDoc.style.marginBottom = '';
    }
    applyCvZoom();
  } else {
    scaleMobilePreview();
  }
});

function getSectionSummary(sec) {
  if (sec === 'podsumowanie') return cvData.podsumowanie ? cvData.podsumowanie.substring(0,55)+'…' : '';
  if (sec === 'doswiadczenie') {
    const f = cvData.doswiadczenie.filter(e=>e.firma||e.stanowisko);
    return f.length ? f.map(e=>e.firma||e.stanowisko).join(', ') : '';
  }
  if (sec === 'wyksztalcenie') {
    const f = cvData.wyksztalcenie.filter(e=>e.szkola);
    return f.length ? f.map(e=>e.szkola).join(', ') : '';
  }
  if (sec === 'umiejetnosci') return cvData.umiejetnosci ? cvData.umiejetnosci.substring(0,50) : '';
  if (sec === 'certyfikaty') { const f = (cvData.certyfikatyList||[]).filter(c=>c.nazwa); return f.length ? f.map(c=>c.nazwa).join(', ').substring(0,50) : ''; }
  if (sec === 'kursy') { const f = (cvData.kursy||[]).filter(k=>k.nazwa); return f.length ? f.map(k=>k.nazwa).join(', ').substring(0,50) : ''; }
  if (sec === 'staze') { const f = (cvData.staze||[]).filter(s=>s.firma); return f.length ? f.map(s=>s.firma).join(', ').substring(0,50) : ''; }
  if (sec === 'jezyki') return cvData.jezyki.filter(l=>l.jezyk).map(l=>l.jezyk).join(', ');
  if (sec === 'zainteresowania') return cvData.zainteresowania ? cvData.zainteresowania.substring(0,50) : '';
  return '';
}

function toggleAccSection(sec) {

// Helper used inside buildCVHTML templates
function L(key) {
  return (CV_LABELS[cvCurrentLang] || CV_LABELS.pl)[key] || CV_LABELS.pl[key];
}

function setCVLang(lang) {
  cvCurrentLang = lang;
  renderCVForm();
  updateCVPreview();
}

function applySpellcheck() {
  document.querySelectorAll('.cvf-input').forEach(function(el) {
    el.setAttribute('spellcheck', 'true');
    el.setAttribute('autocorrect', 'on');
    el.setAttribute('autocapitalize', 'sentences');
  });
}

function renderCVForm() {
  const panel = document.getElementById('cvFormPanel');
  const fullName = [cvData.imie, cvData.nazwisko].filter(Boolean).join(' ');
  const totalSteps = CV_WIZARD_STEPS.length;
  const pct = Math.round((cvWizardStep / (totalSteps - 1)) * 100);

  // Preview always active
  const previewCol = document.getElementById('cvPreviewCol');
  if (previewCol) previewCol.classList.remove('cvw-preview-blur');

  // Progress bar + step dots
  const progressHTML = `
    <div class="cvw-header">
      <div class="cvw-progress-wrap"><div class="cvw-progress-bar" style="width:${pct}%"></div></div>
      <div class="cvw-steps-row">
        ${CV_WIZARD_STEPS.map((s,i) => `
          <div class="cvw-step-dot ${i<cvWizardStep?'done':i===cvWizardStep?'active':''}" onclick="${i<=cvWizardStep?'cvWizardGoTo('+i+')':''}">
            <div class="cvw-dot-circle">${i<cvWizardStep?'✓':i+1}</div>
            <span class="cvw-dot-label">${s.label}</span>
          </div>`).join('')}
      </div>
    </div>`;

  // Step content
  let stepContent = '';
  if (cvWizardStep === 0) {
    stepContent = `
      <div class="acc-item open" id="accPersonalItem">
        <div class="acc-row" onclick="toggleAccPersonal()">
          <span class="acc-drag-spacer"></span>
          <div class="acc-info">
            <span class="acc-label">${L("personalData")}</span>
          </div>
          <button class="acc-btn" onclick="event.stopPropagation();toggleAccPersonal()">
            <svg width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="acc-plus-v"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="acc-body" id="accPersonalBody">
          <div class="acc-personal-inner">
            <div class="cv-photo-drop" id="cvPhotoDrop"
              onclick="document.getElementById('cvPhotoInput').click()"
              ondragover="cvPhotoDragOver(event)"
              ondragleave="cvPhotoDragLeave(event)"
              ondrop="cvPhotoDropHandler(event)">
              <div class="cv-photo-avatar">
                ${cvData.zdjecie
                  ? `<img src="${cvData.zdjecie}"><div class="cv-photo-overlay">
                      <button class="cv-photo-ov-btn" title="Zmień" onclick="event.stopPropagation();document.getElementById('cvPhotoInput').click()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button class="cv-photo-ov-btn" title="Usuń" onclick="event.stopPropagation();cvData.zdjecie=null;renderCVForm();updateCVPreview()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                      </button>
                    </div>`
                  : `<div class="cv-photo-placeholder"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`}
              </div>
              <div class="cv-photo-info">
                <span class="cv-photo-label">${cvData.zdjecie ? 'Zmień zdjęcie' : 'Wybierz plik lub przeciągnij go tutaj'}</span>
                <span class="cv-photo-hint">JPG, PNG • maks. 2 MB</span>
              </div>
            </div>
            <input type="file" id="cvPhotoInput" accept="image/jpeg,image/png" style="display:none" onchange="loadPhoto(this)">
            <div class="cvf-grid2">
              <div class="cvf-group"><label>${L("firstName")}</label><input class="cvf-input" oninput="cvData.imie=this.value;updateCVPreview()" value="${cvData.imie}" placeholder="Jan"></div>
              <div class="cvf-group"><label>${L("lastName")}</label><input class="cvf-input" oninput="cvData.nazwisko=this.value;updateCVPreview()" value="${cvData.nazwisko}" placeholder="Kowalski"></div>
              <div class="cvf-group cvf-full"><label>${L("position")}</label><input class="cvf-input" oninput="cvData.stanowisko=this.value;updateCVPreview()" value="${cvData.stanowisko}" placeholder="Specjalista ds. marketingu"></div>
              <div class="cvf-group"><label>${L("email")}</label><input class="cvf-input" type="email" oninput="cvData.email=this.value;updateCVPreview()" value="${cvData.email}" placeholder="jan@email.pl"></div>
              <div class="cvf-group"><label>${L("phone")}</label><input class="cvf-input" oninput="cvData.tel=this.value;updateCVPreview()" value="${cvData.tel}" placeholder="+48 600 000 000"></div>
              <div class="cvf-group"><label>${L("city")}</label><input class="cvf-input" oninput="cvData.adres=this.value;updateCVPreview()" value="${cvData.adres}" placeholder="Warszawa"></div>
              <div class="cvf-group"><label>${L("linkedin")}</label><input class="cvf-input" oninput="cvData.linkedin=this.value;updateCVPreview()" value="${cvData.linkedin}" placeholder="linkedin.com/in/..."></div>
            </div>
          </div>
        </div>
      </div>`;
  } else if (cvWizardStep === 1) {
    stepContent = `<div class="acc-list">${buildSectionFormHTML('podsumowanie')}</div>`;
  } else if (cvWizardStep === 2) {
    stepContent = `<div class="acc-list" id="cvSectionsContainer">${buildSectionFormHTML('doswiadczenie')}</div>`;
  } else if (cvWizardStep === 3) {
    stepContent = `<div class="acc-list" id="cvSectionsContainer">${buildSectionFormHTML('wyksztalcenie')}</div>`;
  } else if (cvWizardStep === 4) {

        : `<button class="cvw-btn cvw-btn-done" onclick="downloadCV()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Pobierz PDF</button>`}
    </div>`;

  panel.innerHTML = `
    ${progressHTML}
    <div class="cvw-content cvw-slide-in" id="cvwContent">

  initDragDrop();
  if (cvWizardStep === 4 && cvOpenSections.has('umiejetnosci')) updateSkillChips();
  if (cvWizardStep === 5 && cvOpenSections.has('zainteresowania')) updateInterestChips();
  applySpellcheck();
}

// ── DATE HELPERS ─────────────────────────────────────────
function fmtMonth(val) {
  // Konwertuje "2022-01" → "01.2022"
  if (!val) return '';
  const m = val.match(/^(\d{4})-(\d{2})$/);
  if (m) return m[2] + '.' + m[1];
  return val;
}
function monthVal(stored) {
  // Konwertuje "01.2022" → "2022-01" (dla atrybutu value w type=month)
  if (!stored) return '';
  const m = stored.match(/^(\d{2})\.(\d{4})$/);
  if (m) return m[2] + '-' + m[1];
  const y = stored.match(/^(\d{4})$/);
  if (y) return y[1] + '-01';
  return stored;
}
function monthPartM(stored) {
  if (!stored) return '';
  const m = stored.match(/^(\d{2})\.(\d{4})$/);
  return m ? m[1] : '';
}
function monthPartY(stored) {
  if (!stored) return '';
  const m = stored.match(/^(\d{2})\.(\d{4})$/);
  if (m) return m[2];
  const y = stored.match(/^(\d{4})$/);
  return y ? y[1] : '';
}
function cvPickMonth(wrap) {
  const sels = wrap.querySelectorAll('select');
  const m = sels[0].value, y = sels[1].value;
  if (!y) return '';
  return m ? m + '.' + y : y;
}
function buildMonthPickerHTML(dataPath, stored) {
  const MONTHS = [['','Miesiąc'],['01','Sty'],['02','Lut'],['03','Mar'],['04','Kwi'],['05','Maj'],['06','Cze'],['07','Lip'],['08','Sie'],['09','Wrz'],['10','Paź'],['11','Lis'],['12','Gru']];
  const curM = monthPartM(stored), curY = monthPartY(stored);
  const curYear = new Date().getFullYear();
  const years = [];
  for (let y = curYear + 1; y >= 1970; y--) years.push(y);
  const onch = dataPath + '=cvPickMonth(this.closest(\'.cvf-monthpick\'));updateCVPreview()';
  return '<div class="cvf-monthpick" style="display:flex;gap:6px">'
    + '<select class="cvf-input" style="flex:0 0 88px;min-width:0;padding-right:2px;font-size:0.82rem" onchange="' + onch + '">'
    + MONTHS.map(([v,l]) => '<option value="' + v + '"' + (curM === v ? ' selected' : '') + '>' + l + '</option>').join('')
    + '</select>'
    + '<select class="cvf-input" style="flex:1;min-width:0;font-size:0.82rem" onchange="' + onch + '">'
    + '<option value="">Rok</option>'
    + years.map(y => '<option value="' + y + '"' + (curY === String(y) ? ' selected' : '') + '>' + y + '</option>').join('')
    + '</select></div>';
}

// ── AUTOCOMPLETE UCZELNIE ──────────────────────────────────
function showUniSuggest(i, val) {
  const list = document.getElementById('uni-list-' + i);
  if (!list) return;
  const q = (val || '').toLowerCase();
  const matches = q.length === 0
    ? POLISH_UNIVERSITIES.slice(0, 7)
    : POLISH_UNIVERSITIES.filter(u => u.toLowerCase().includes(q)).slice(0, 7);
  if (!matches.length) { list.classList.remove('show'); return; }
  list.innerHTML = matches.map(u => `<div class="cvf-autocomplete-item" onmousedown="event.preventDefault();pickUni(${i},'${u.replace(/'/g,"\\'")}')">  ${u}</div>`).join('');
  list.classList.add('show');
}
function pickUni(i, val) {
  cvData.wyksztalcenie[i].szkola = val;
  const input = document.getElementById('szkola-' + i);
  if (input) input.value = val;
  const list = document.getElementById('uni-list-' + i);
  if (list) list.classList.remove('show');
  updateCVPreview();
}

// ── AUTOCOMPLETE KIERUNKI ──────────────────────────────────
function showKierunekSuggest(i, val) {
  const list = document.getElementById('kierunek-list-' + i);
  if (!list) return;
  const q = (val || '').toLowerCase();
  const matches = q.length === 0
    ? KIERUNKI_SUGGESTIONS.slice(0, 7)

let dragSrc = null;
function initDragDrop() {
  const blocks = document.querySelectorAll('.acc-item');
  blocks.forEach(block => {
    block.addEventListener('dragstart', e => {
      dragSrc = block;
      block.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    block.addEventListener('dragend', () => {
      block.classList.remove('dragging');
      document.querySelectorAll('.acc-item').forEach(b => b.classList.remove('drag-over'));
    });
    block.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.acc-item').forEach(b => b.classList.remove('drag-over'));
      if (block !== dragSrc) block.classList.add('drag-over');
    });
    block.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === block) return;
      const fromSec = dragSrc.dataset.section;
      const toSec = block.dataset.section;
      // Handle standard sections
      const fromIdx = cvSectionOrder.indexOf(fromSec);
      const toIdx = cvSectionOrder.indexOf(toSec);
      if (fromIdx !== -1 && toIdx !== -1) {
        cvSectionOrder.splice(fromIdx, 1);
        cvSectionOrder.splice(toIdx, 0, fromSec);
      }
      // Handle custom sections
      const fromCIdx = cvCustomSections.findIndex(s => 'custom-'+s.id === fromSec);
      const toCIdx = cvCustomSections.findIndex(s => 'custom-'+s.id === toSec);
      if (fromCIdx !== -1 && toCIdx !== -1) {
        const [moved] = cvCustomSections.splice(fromCIdx, 1);
        cvCustomSections.splice(toCIdx, 0, moved);
      }
      renderCVForm();
      updateCVPreview();
      updateSkillChips();
      updateInterestChips();
    });
  });
  // Init chips after render
  updateSkillChips();
  updateInterestChips();
}

/* ── PHOTO CROP ── */
const CROP_SIZE = 260;
let _cropImg = null;
let _cropScale = 1.0;   // multiplier on top of base cover-scale
let _cropOffX = 0;
let _cropOffY = 0;
let _cropDragging = false;
let _cropDragStartX = 0, _cropDragStartY = 0;
let _cropDragBaseX = 0, _cropDragBaseY = 0;

function openCropModal(src) {
  _cropOffX = 0; _cropOffY = 0; _cropScale = 1.0;
  const slider = document.getElementById('cvCropSlider');
  const pct = document.getElementById('cvCropPct');
  slider.value = 100; pct.textContent = '100%';
  document.getElementById('cvCropOverlay').classList.add('open');
  _cropImg = new Image();
  _cropImg.onload = () => { clampCropOffset(); renderCropCanvas(); };
  _cropImg.src = src;
  // global mouse/touch up handlers
  document.addEventListener('mousemove', cropMouseMove);
  document.addEventListener('mouseup', cropMouseUp);
}

function closeCropModal() {
  document.getElementById('cvCropOverlay').classList.remove('open');
  document.removeEventListener('mousemove', cropMouseMove);
  document.removeEventListener('mouseup', cropMouseUp);
  _cropImg = null;
  // reset file input so same file can be re-selected
  const inp = document.getElementById('cvPhotoInput');
  if (inp) inp.value = '';
}

function _cropBaseScale() {
  if (!_cropImg) return 1;
  return Math.max(CROP_SIZE / _cropImg.naturalWidth, CROP_SIZE / _cropImg.naturalHeight);
}

function clampCropOffset() {
  if (!_cropImg) return;
  const s = _cropBaseScale() * _cropScale;
  const hw = (_cropImg.naturalWidth * s - CROP_SIZE) / 2;
  const hh = (_cropImg.naturalHeight * s - CROP_SIZE) / 2;
  _cropOffX = Math.max(-Math.max(hw, 0), Math.min(Math.max(hw, 0), _cropOffX));
  _cropOffY = Math.max(-Math.max(hh, 0), Math.min(Math.max(hh, 0), _cropOffY));
}

function renderCropCanvas() {
  const canvas = document.getElementById('cvCropCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CROP_SIZE, CROP_SIZE);
  if (!_cropImg) return;
  const s = _cropBaseScale() * _cropScale;
  const w = _cropImg.naturalWidth * s;
  const h = _cropImg.naturalHeight * s;
  const x = (CROP_SIZE - w) / 2 + _cropOffX;
  const y = (CROP_SIZE - h) / 2 + _cropOffY;
  ctx.drawImage(_cropImg, x, y, w, h);
}

function cropSliderChange(val) {
  _cropScale = val / 100;
  document.getElementById('cvCropPct').textContent = val + '%';
  clampCropOffset();
  renderCropCanvas();
}

function cropMouseDown(e) {
  _cropDragging = true;
  _cropDragStartX = e.clientX; _cropDragStartY = e.clientY;
  _cropDragBaseX = _cropOffX; _cropDragBaseY = _cropOffY;
  e.preventDefault();
}
function cropMouseMove(e) {
  if (!_cropDragging) return;
  _cropOffX = _cropDragBaseX + (e.clientX - _cropDragStartX);
  _cropOffY = _cropDragBaseY + (e.clientY - _cropDragStartY);
  clampCropOffset();
  renderCropCanvas();
}
function cropMouseUp() { _cropDragging = false; }

function cropTouchStart(e) {
  if (e.touches.length !== 1) return;
  _cropDragging = true;
  _cropDragStartX = e.touches[0].clientX; _cropDragStartY = e.touches[0].clientY;
  _cropDragBaseX = _cropOffX; _cropDragBaseY = _cropOffY;
  e.preventDefault();
}
function cropTouchMove(e) {
  if (!_cropDragging || e.touches.length !== 1) return;
  _cropOffX = _cropDragBaseX + (e.touches[0].clientX - _cropDragStartX);
  _cropOffY = _cropDragBaseY + (e.touches[0].clientY - _cropDragStartY);
  clampCropOffset();
  renderCropCanvas();
}
function cropTouchEnd() { _cropDragging = false; }

function _fixCVFullHeight(root) {
  if (!root) return;
  // Ensure full A4 min-height
  root.style.minHeight = '842px';

  // Detect sidebar/horizontal-flex layouts (outer div already has display:flex = row)
  const rootStyleStr = root.getAttribute('style') || '';
  const isHorizFlex = rootStyleStr.includes('display:flex') && !rootStyleStr.includes('flex-direction:column');

  if (isHorizFlex) {
    // Sidebar templates: find the main content column (flex:1 without explicit width)
    // and ensure it is display:flex flex-direction:column so margin-top:auto works
    for (const child of root.children) {
      const cs = child.getAttribute('style') || '';
      if ((cs.includes('flex:1') || cs.includes('flex: 1')) && !cs.match(/width:\s*\d/)) {
        child.style.display = 'flex';
        child.style.flexDirection = 'column';
        // Pin last child (consent) to bottom
        const last = child.lastElementChild;
        if (last) last.style.marginTop = 'auto';
        break;
      }
    }
  } else {
    // Standard vertical layouts
    root.style.display = 'flex';
    root.style.flexDirection = 'column';
    // Pin the last direct child (consent div) to the bottom
    const last = root.lastElementChild;
    if (last) last.style.marginTop = 'auto';
    // Give the main content area flex:1 so it expands between header and consent
    // The main content div is typically the second-to-last or third-to-last child
    const children = Array.from(root.children);
    if (children.length >= 2) {
      // Find the first big content div (grid layout or padded content area)
      // that is NOT the header (first child) and NOT the consent (last child)
      for (let i = 1; i < children.length - 1; i++) {
        const cs = children[i].getAttribute('style') || '';
        if (cs.includes('display:grid') || cs.includes('padding:') || cs.includes('flex:1')) {
          children[i].style.flex = '1';
          break;
        }
      }
    }
  }
}

function updateCVPreview() {
  const el = document.getElementById('cvPreviewInner');
  if (!el) return;
  try {
    el.innerHTML = buildCVHTML(cvTemplate);
    _fixCVFullHeight(el.firstElementChild);
  } catch(e) {
    console.error('buildCVHTML error:', e);
    el.innerHTML = '<div style="padding:20px;color:red;font-size:12px">Błąd szablonu: ' + e.message + '</div>';
  }
  if (typeof triggerDraftSave === 'function') triggerDraftSave();
  if (typeof applyCvZoom === 'function') applyCvZoom();
}

// Wczytaj CV do edycji jeśli przyszliśmy z moje-dokumenty.html

function renderColorPicker() {
  const el = document.getElementById('colorThemePicker');
  if (!el) return;
  const currentTpl = CV_TEMPLATES.find(t => t.id === cvTemplate);
  const defaultC1 = currentTpl ? currentTpl.color1 : '#1a3a2e';
  el.innerHTML = COLOR_THEMES.map(theme => {
    const isActive = cvCustomColor
      ? cvCustomColor.c1 === theme.c1
      : theme.c1 === defaultC1;
    return `<button title="${theme.name}" onclick="setColorTheme('${theme.c1}','${theme.c2}')"
      style="width:28px;height:28px;border-radius:50%;background:${theme.c1};border:${isActive?'3px solid #fff':'2px solid transparent'};
      box-shadow:${isActive?'0 0 0 2px '+theme.c1:'0 1px 4px rgba(0,0,0,0.2)'};
      cursor:pointer;transition:all 0.15s;flex-shrink:0"></button>`;
  }).join('');
  // Also add "default" reset option
  const hasCustom = !!cvCustomColor;
  el.innerHTML += `<button title="Domyślny kolor szablonu" onclick="resetColorTheme()"
    style="width:28px;height:28px;border-radius:50%;background:transparent;border:2px dashed #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#aaa;${!hasCustom?'border-color:#666;color:#333':''}"
    >↺</button>`;
}

function setColorTheme(c1, c2) {
  cvCustomColor = { c1, c2 };
  updateCVPreview();
  renderColorPicker();
  renderTplGrid();
  document.getElementById('tplDot').style.background = c1;
}

function resetColorTheme() {
  cvCustomColor = null;
  const t = CV_TEMPLATES.find(x => x.id === cvTemplate);
  if (t) document.getElementById('tplDot').style.background = t.color1;
  updateCVPreview();
  renderColorPicker();
  renderTplGrid();
}

  const savedImie = cvData.imie, savedNazwisko = cvData.nazwisko, savedStan = cvData.stanowisko;

    cvData.imie = 'Anna'; cvData.nazwisko = 'Kowalska';
    cvData.stanowisko = 'Marketing Manager';
    cvData.email = 'anna@email.pl'; cvData.tel = '+48 123 456 789'; cvData.adres = 'Warszawa';
    cvData.podsumowanie = 'Doświadczona specjalistka ds. marketingu z 5-letnim stażem w e-commerce. Zarządzam kampaniami reklamowymi i analityką.';
    cvData.umiejetnosci = 'Google Analytics, Facebook Ads, Excel, SEO, Copywriting';

      {firma:'Sklep Online ABC', stanowisko:'Marketing Specialist', od:'01.2021', do:'Teraz', opis:'Zarządzanie kampaniami Google Ads i Meta. Wzrost konwersji o 35%.'},
      {firma:'Agencja XYZ', stanowisko:'Junior Marketer', od:'06.2018', do:'12.2020', opis:'Tworzenie treści i obsługa social media.'}
    ];
    cvData.wyksztalcenie = [{szkola:'Uniwersytet Warszawski', kierunek:'Zarządzanie i Marketing', od:'2014', do:'2018'}];
    cvData.jezyki = [{jezyk:'Angielski', poziom:'C1'}, {jezyk:'Niemiecki', poziom:'B1'}];
  }
  const html = buildCVHTML(t.id);
  // Przywróć oryginalne dane
  cvData.imie = savedImie; cvData.nazwisko = savedNazwisko; cvData.stanowisko = savedStan;
  cvData.email = savedEmail; cvData.tel = savedTel; cvData.adres = savedAdres;
  cvData.podsumowanie = savedPods; cvData.umiejetnosci = savedUm;
  cvData.doswiadczenie = savedDosw; cvData.wyksztalcenie = savedWyksztalcenie; cvData.jezyki = savedJezyki;
  cvCustomColor = savedColor;
  return `<div class="cv-tpl-thumb-inner">${html}</div>`;

function renderTplGrid() {
  const grid = document.getElementById('cvTplGrid');
  renderColorPicker();

  const groups = [
    { label: 'Premium',      ids: ['nova', 'nordic', 'cascade', 'metro'] },
    { label: 'Nowe 2026',    ids: ['executive', 'athens', 'matrix', 'prism', 'linen'] },
    { label: 'Klasyczne',    ids: ['sidebar', 'timeline', 'bold', 'midnight'] },
    { label: 'Nowoczesne',   ids: ['teal', 'slate', 'ocean'] },
    { label: 'Kreatywne',    ids: ['creative', 'coral', 'rose'] },
    { label: 'Wyraziste',    ids: ['shield'] },
  ];

  let html = '';
  groups.forEach(group => {
    const cards = CV_TEMPLATES.filter(t => group.ids.includes(t.id));
    if (!cards.length) return;
    html += `<div class="cv-tpl-section-label">${group.label}</div>`;
    html += cards.map(t => `
      <div class="cv-tpl-card${cvTemplate===t.id?' active':''}" data-tpl="${t.id}">
        <div class="cv-tpl-thumb">${getTplPreviewHTML(t)}</div>
        <div class="cv-tpl-name">${t.name}</div>
      </div>
    `).join('');
  });
  grid.innerHTML = html;

  // Use event delegation - click anywhere on grid picks the card
  grid.onclick = function(e) {
    const card = e.target.closest('[data-tpl]');
    if (card) pickTemplate(card.dataset.tpl);
  };
}
function pickTemplate(id) {
  cvTemplate = id;
  const t = CV_TEMPLATES.find(x => x.id === id);
  document.getElementById('tplDot').style.background = t.color1;
  updateCVPreview();
  closeTplDrawer();
}

async function downloadCV() {
  if (!window.checkPlanAccess(['kariera','promax','pro'])) return;

  const fullName = [cvData.imie, cvData.nazwisko].filter(Boolean).join(' ') || 'CV';
  const safeName = 'CV_' + fullName.replace(/\s+/g, '_');

  const btn = window.innerWidth < 768
    ? document.getElementById('tabPdf')
    : document.getElementById('cvNavDlBtn');
  const origText = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '⏳'; btn.disabled = true; }

  saveCVToMyDocs(fullName);

  const el = document.getElementById('cvPreviewInner');
  if (!el) { if (btn) { btn.innerHTML = origText; btn.disabled = false; } return; }

  // Resetuj zoom/transform żeby html2canvas uchwycił pełne 595px
  const savedZoom = el.style.zoom;
  const savedTransform = el.style.transform;
  el.style.zoom = '1';
  el.style.transform = 'none';

  try {
    await new Promise(r => setTimeout(r, 100));
    const opt = {
      margin: 0,
      filename: safeName + '.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, allowTaint: true, logging: false },
      jsPDF: { unit: 'px', format: [595, 842], orientation: 'portrait' }
    };
    await html2pdf().set(opt).from(el).save();
  } catch(e) {
    alert('Błąd: ' + e.message);
  } finally {
    el.style.zoom = savedZoom;
    el.style.transform = savedTransform;
    if (btn) { btn.innerHTML = origText; btn.disabled = false; }
  }
}

async function saveCVToMyDocs(fullName) {
  try {
    for (var i = 0; i < 30 && !window._fbReady; i++) {
      await new Promise(function(r) { setTimeout(r, 100); });
    }
    var token = typeof window._fbToken === 'function' ? await window._fbToken() : window._fbToken;
    if (!token) return;
    var cvPreviewEl = document.getElementById('cvPreviewInner');
    var cvText = cvPreviewEl ? '__CV_HTML__:' + cvPreviewEl.outerHTML : [
      fullName,
      cvData.stanowisko,
      cvData.email && 'Email: ' + cvData.email,
      cvData.tel && 'Tel: ' + cvData.tel,
    ].filter(Boolean).join('\n');
    await fetch('/api/save-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        docId: 'cv',
        docName: 'CV – ' + fullName,
        docCat: 'kariera',
        docIcon: '📋',
        docCatLabel: 'Kariera',
        text: cvText,
        cvDataJson: JSON.stringify(Object.assign({}, cvData, { __template: cvTemplate, __color: cvCustomColor || null, __customSections: cvCustomSections || [], __sidebarSections: Array.from(cvSidebarSections) }))
      })
    });
  } catch(e) {}
}

<script>
// ── RESIZABLE DIVIDER ──
(function(){
  var resizer = document.getElementById('cvResizer');
  var formCol = document.getElementById('cvFormPanel');
  var previewCol = document.getElementById('cvPreviewCol');
  if (!resizer || !formCol) return;

  var isDown = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', function(e) {
    if (window.innerWidth < 768) return;
    isDown = true;
    startX = e.clientX;
    startW = formCol.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    var dx = e.clientX - startX;
    var container = formCol.parentElement.getBoundingClientRect().width;
    var newW = startW + dx;
    var minW = container * 0.25;
    var maxW = container * 0.75;
    newW = Math.min(Math.max(newW, minW), maxW);
    var pct = (newW / container * 100).toFixed(2);
    formCol.style.width = pct + '%';
    // Update pay-bar width too
    var payBar = document.querySelector('.cv-pay-bar');
    if (payBar) payBar.style.width = pct + '%';
  });

  document.addEventListener('mouseup', function() {
    if (!isDown) return;
    isDown = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();
</script>
