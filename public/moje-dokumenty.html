<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="logo2.png">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-61ETEPHJB7"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje dokumenty – Dokumo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface2: #f5f5f7;
  --surface3: #ebebed;
  --border: rgba(26,23,20,.09);
  --border2: rgba(26,23,20,.15);
  --ink: #1a1714;
  --ink2: #6b6560;
  --ink3: rgba(26,23,20,.35);
  --green: #1a3a2e;
  --green-glow: rgba(26,58,46,.1);
  --green-bright: #2d6b52;
  --red: #c0392b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "DM Sans", sans-serif; font-size: 15px;
  min-height: 100vh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
.m-nav {
  height: 56px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(255,255,255,.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.m-nav-logo {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-weight: 800; font-size: 1.125rem; color: #111827; letter-spacing: -.02em;
}
.m-nav-logo-dot {
  width: 26px; height: 26px; background: var(--ink); border-radius: 7px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.m-nav-account {
  display: flex; align-items: center; gap: 5px;
  font-size: .73rem; font-weight: 500; color: var(--ink2);
  text-decoration: none; padding: 5px 11px; border-radius: 8px;
  border: 1px solid var(--border); transition: all .2s;
}
.m-nav-account:hover { color: var(--ink); border-color: var(--border2); }

/* ── PAGE HEADER ── */
.m-header {
  max-width: 960px; margin: 0 auto;
  padding: 40px 24px 0;
}
.m-header-row {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
}
.m-title-wrap {}
.m-title {
  font-family: "Bricolage Grotesque", sans-serif;
  font-size: clamp(1.5rem, 3.5vw, 2rem);
  font-weight: 800; letter-spacing: -.03em;
  color: var(--ink); line-height: 1.1;
}
.m-count-badge {
  display: inline-flex; align-items: center;
  font-size: .65rem; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; padding: 3px 9px; border-radius: 999px;
  background: var(--surface2); color: var(--ink3);
  border: 1px solid var(--border); margin-left: 10px;
  vertical-align: middle;
}

/* ── TOOLBAR ── */
.m-toolbar {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; padding: 0 24px 20px;
  max-width: 960px; margin: 0 auto;
}
.m-search-wrap {
  position: relative; flex: 1; min-width: 200px;
}
.m-search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink3); font-size: .85rem; pointer-events: none;
}
.m-search {
  width: 100%; padding: 9px 12px 9px 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--ink);
  font-family: "DM Sans", sans-serif; font-size: .83rem;
  outline: none; transition: border-color .18s;
}
.m-search::placeholder { color: var(--ink3); }
.m-search:focus { border-color: rgba(34,197,94,.4); }

.m-filters {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.m-filter {
  padding: 7px 14px;
  font-family: "DM Sans", sans-serif;
  font-size: .7rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--ink3);
  cursor: pointer; transition: all .15s;
}
.m-filter:hover { border-color: var(--border2); color: var(--ink2); }
.m-filter.active {
  background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.35);
  color: var(--green-bright);
}

.m-sort-wrap {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.m-sort-label { font-size: .72rem; color: var(--ink3); white-space: nowrap; }
.m-sort-select {
  font-family: "DM Sans", sans-serif; font-size: .75rem; font-weight: 600;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--ink2);
  padding: 6px 10px; cursor: pointer; outline: none;
  transition: border-color .18s;
}
.m-sort-select:focus { border-color: rgba(34,197,94,.4); }

/* ── RESULTS BAR ── */
.m-results-bar {
  max-width: 960px; margin: 0 auto;
  padding: 0 24px 14px;
  font-size: .72rem; color: var(--ink3);
}

/* ── CONTENT ── */
.m-content {
  max-width: 960px; margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── GRID ── */
.m-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* ── DOC CARD ── */
.d-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.d-card:hover {
  border-color: var(--border2);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.d-card-top {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.d-card-row1 {
  display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px;
}
.d-card-icon {
  font-size: 1.5rem; line-height: 1; flex-shrink: 0; margin-top: 2px;
}
.d-card-meta { flex: 1; min-width: 0; }
.d-card-name {
  font-family: "Bricolage Grotesque", sans-serif;
  font-size: .9rem; font-weight: 700; color: var(--ink);
  line-height: 1.3; margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.d-cat-badge {
  display: inline-flex; align-items: center;
  font-size: .62rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 999px;
  background: var(--green-glow); color: var(--green-bright);
  border: 1px solid rgba(34,197,94,.2);
}
.d-status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 999px; margin-left: 5px;
  background: rgba(34,197,94,.08); color: var(--green);
  border: 1px solid rgba(34,197,94,.15);
}
.d-card-date {
  font-size: .68rem; color: var(--ink3); margin-top: 5px;
  font-variant-numeric: tabular-nums;
}

.d-card-actions {
  display: flex; align-items: center; padding: 10px 14px; gap: 6px; flex-wrap: wrap;
}
.d-action-btn {
  padding: 6px 12px;
  font-family: "DM Sans", sans-serif;
  font-size: .7rem; font-weight: 700; letter-spacing: .04em;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--ink2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.d-action-btn:hover { border-color: var(--border2); color: var(--ink); }
.d-action-btn.primary {
  background: rgba(34,197,94,.15);
  color: var(--green-bright);
  border-color: rgba(34,197,94,.3);
}
.d-action-btn.primary:hover {
  background: rgba(34,197,94,.22);
  border-color: rgba(34,197,94,.45);
}
.d-action-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ── SELECT MODE ── */
.d-card { position: relative; }
.d-card-cb {
  display: none; position: absolute; top: 12px; right: 12px; z-index: 2;
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border2); background: var(--surface);
  cursor: pointer; accent-color: var(--red); transition: border-color .15s;
}
.select-mode .d-card-cb { display: block; }
.select-mode .d-card { cursor: pointer; }
.select-mode .d-card:hover { border-color: var(--border2); }
.d-card.selected { border-color: rgba(192,57,43,.4); background: rgba(192,57,43,.04); }
.d-card.selected .d-card-cb { border-color: var(--red); }

/* ── BULK BAR ── */
.bulk-bar {
  display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff;
  border-radius: 14px; padding: 10px 10px 10px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.35);
  align-items: center; gap: 10px; z-index: 400;
  font-family: "DM Sans", sans-serif; font-size: .82rem; white-space: nowrap;
}
.bulk-bar.open { display: flex; }
.bulk-bar-count { font-weight: 700; }
.bulk-bar-cancel {
  padding: 7px 14px; border-radius: 9px; border: 1.5px solid rgba(255,255,255,.2);
  background: transparent; color: rgba(255,255,255,.75);
  font-family: "DM Sans", sans-serif; font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.bulk-bar-cancel:hover { border-color: rgba(255,255,255,.5); color: #fff; }
.bulk-bar-del {
  padding: 7px 16px; border-radius: 9px; border: none;
  background: rgba(192,57,43,.85); color: #fff;
  font-family: "DM Sans", sans-serif; font-size: .78rem; font-weight: 700;
  cursor: pointer; transition: background .15s;
}
.bulk-bar-del:hover { background: var(--red); }
.btn-select-all {
  padding: 8px 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  font-family: "DM Sans", sans-serif; font-size: .75rem; font-weight: 700;
  color: var(--ink2); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-select-all:hover { border-color: var(--border2); color: var(--ink); }

/* ── EMPTY STATE ── */
.m-empty {
  text-align: center; padding: 80px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; margin-top: 8px;
}
.m-empty-icon { font-size: 2.5rem; margin-bottom: 16px; display: block; }
.m-empty-title {
  font-family: "Bricolage Grotesque", sans-serif;
  font-size: 1.2rem; font-weight: 800; color: var(--ink);
  letter-spacing: -.02em; margin-bottom: 8px;
}
.m-empty-sub { font-size: .85rem; color: var(--ink2); line-height: 1.65; margin-bottom: 24px; }
.m-empty-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 22px; border-radius: 12px;
  background: rgba(34,197,94,.15); color: var(--green-bright);
  border: 1px solid rgba(34,197,94,.3);
  font-family: "Bricolage Grotesque", sans-serif; font-size: .82rem; font-weight: 700;
  text-decoration: none; transition: all .2s;
}
.m-empty-btn:hover { background: rgba(34,197,94,.22); border-color: rgba(34,197,94,.45); }

/* ── EDIT MODAL ── */
.m-edit-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
  z-index: 800; align-items: center; justify-content: center;
}
.m-edit-overlay.open { display: flex; }
.m-edit-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 18px; padding: 24px;
  width: 100%; max-width: 680px; margin: 16px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
  animation: fadeUp .25s ease both;
  display: flex; flex-direction: column; gap: 14px;
  max-height: 85vh;
}
.m-edit-title {
  font-family: "Bricolage Grotesque", sans-serif;
  font-size: 1rem; font-weight: 800; color: var(--ink);
}
.m-edit-textarea {
  flex: 1; min-height: 320px; max-height: 55vh;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--ink);
  font-family: "DM Sans", sans-serif; font-size: .84rem; line-height: 1.7;
  padding: 14px; resize: vertical; outline: none;
  transition: border-color .18s;
}
.m-edit-textarea:focus { border-color: rgba(34,197,94,.4); }
.m-edit-btns { display: flex; gap: 10px; justify-content: flex-end; }
.m-edit-cancel {
  padding: 10px 20px; border: 1px solid var(--border);
  background: var(--surface2); border-radius: 10px;
  font-family: "DM Sans", sans-serif; font-size: .78rem; font-weight: 700;
  color: var(--ink2); cursor: pointer; transition: all .15s;
}
.m-edit-cancel:hover { border-color: var(--border2); color: var(--ink); }
.m-edit-save {
  padding: 10px 24px; border: 1px solid rgba(34,197,94,.3);
  background: rgba(34,197,94,.15); border-radius: 10px;
  font-family: "DM Sans", sans-serif; font-size: .78rem; font-weight: 700;
  color: var(--green-bright); cursor: pointer; transition: all .15s;
}
.m-edit-save:hover { background: rgba(34,197,94,.22); border-color: rgba(34,197,94,.45); }

/* ── CONFIRM MODAL ── */
.m-confirm-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  z-index: 800; align-items: center; justify-content: center;
}
.m-confirm-overlay.open { display: flex; }
.m-confirm-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 18px; padding: 28px 24px;
  max-width: 360px; width: 100%; margin: 16px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.m-confirm-title {
  font-family: "Bricolage Grotesque", sans-serif;
  font-size: 1rem; font-weight: 800; color: var(--ink); margin-bottom: 8px;
}
.m-confirm-sub { font-size: .83rem; color: var(--ink2); line-height: 1.6; margin-bottom: 22px; }
.m-confirm-btns { display: flex; gap: 10px; }
.m-confirm-cancel {
  flex: 1; padding: 11px; border: 1px solid var(--border);
  background: var(--surface2); border-radius: 10px;
  font-family: "DM Sans", sans-serif; font-size: .78rem; font-weight: 700;
  color: var(--ink2); cursor: pointer; transition: all .15s;
}
.m-confirm-cancel:hover { border-color: var(--border2); color: var(--ink); }
.m-confirm-delete {
  flex: 1; padding: 11px; border: none;
  background: rgba(248,113,113,.15); color: var(--red);
  border: 1px solid rgba(248,113,113,.25);
  border-radius: 10px;
  font-family: "DM Sans", sans-serif; font-size: .78rem; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.m-confirm-delete:hover { background: rgba(248,113,113,.25); border-color: rgba(248,113,113,.4); }

/* ── TOAST ── */
.m-toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); color: var(--ink);
  border: 1px solid var(--border2);
  padding: 11px 22px; border-radius: 12px;
  font-family: "DM Sans", sans-serif; font-size: .8rem; font-weight: 600;
  z-index: 900; transition: transform .3s; pointer-events: none;
  white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.m-toast.show { transform: translateX(-50%) translateY(0); }

@media(max-width: 640px) {
  .m-header { padding: 28px 16px 0; }
  .m-toolbar { padding: 0 16px 16px; }
  .m-results-bar { padding: 0 16px 10px; }
  .m-content { padding: 0 16px 60px; }
  .m-grid { grid-template-columns: 1fr; }
  .m-header-row { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="m-nav">
  <a href="index.html" class="m-nav-logo">
    <img src="logo2.png" style="height:28px;width:auto;display:block;">
    Dokumo
  </a>
  <a href="konto.html" class="m-nav-account">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span>Konto</span>
  </a>
</nav>

<!-- HEADER -->
<div class="m-header">
  <div class="m-header-row">
    <div class="m-title-wrap">
      <h1 class="m-title">Moje dokumenty<span class="m-count-badge" id="docCount"></span></h1>
      <p style="font-size:.83rem;color:var(--ink3);margin-top:6px;">Wszystkie Twoje wygenerowane dokumenty w jednym miejscu.</p>
    </div>
    <button class="btn-select-all" id="btnSelectAll" onclick="toggleSelectMode()">Zaznacz</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="m-toolbar">
  <div class="m-search-wrap">
    <span class="m-search-icon">🔍</span>
    <input class="m-search" id="mySearch" type="text" placeholder="Szukaj dokumentu…" oninput="filterAndRender()">
  </div>
  <div class="m-filters" id="myFilters">
    <button class="m-filter active" onclick="setFilter('all',this)">Wszystkie</button>
    <button class="m-filter" onclick="setFilter('kariera',this)">Kariera</button>
    <button class="m-filter" onclick="setFilter('biznes',this)">Biznes</button>
  </div>
  <div class="m-sort-wrap">
    <span class="m-sort-label">Sortuj:</span>
    <select class="m-sort-select" id="mySort" onchange="filterAndRender()">
      <option value="newest">Najnowsze</option>
      <option value="oldest">Najstarsze</option>
      <option value="name">Nazwa A-Z</option>
    </select>
  </div>
</div>

<!-- RESULTS LABEL -->
<div class="m-results-bar">
  <span id="resultsLabel"></span>
</div>

<!-- CONTENT -->
<div class="m-content">
  <div id="myDocGrid"><div style="padding:40px;text-align:center;color:var(--ink3);font-size:.85rem;">Ładowanie…</div></div>
</div>

<!-- EDIT MODAL -->
<div class="m-edit-overlay" id="editOverlay">
  <div class="m-edit-box">
    <div class="m-edit-title" id="editTitle">Edytuj dokument</div>
    <textarea class="m-edit-textarea" id="editTextarea" spellcheck="true"></textarea>
    <div class="m-edit-btns">
      <button class="m-edit-cancel" onclick="closeEdit()">Anuluj</button>
      <button class="m-edit-save" onclick="saveEdit()">Zapisz</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="m-confirm-overlay" id="confirmOverlay">
  <div class="m-confirm-box">
    <div class="m-confirm-title">Usunąć dokument?</div>
    <p class="m-confirm-sub" id="confirmMsg"></p>
    <div class="m-confirm-btns">
      <button class="m-confirm-cancel" onclick="closeConfirm()">Anuluj</button>
      <button class="m-confirm-delete" id="confirmDeleteBtn">Usuń</button>
    </div>
  </div>
</div>
<div class="m-toast" id="myToast"></div>

<!-- BULK BAR -->
<div class="bulk-bar" id="bulkBar">
  <span class="bulk-bar-count" id="bulkCount">0 zaznaczonych</span>
  <button class="bulk-bar-cancel" onclick="selectAll()" id="bulkSelectAllBtn">Zaznacz wszystkie</button>
  <button class="bulk-bar-cancel" onclick="exitSelectMode()">Anuluj</button>
  <button class="bulk-bar-del" id="bulkDelBtn" onclick="askDeleteSelected()" disabled>Usuń zaznaczone</button>
</div>

<!-- FIREBASE AUTH -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const __c=await(await fetch('/api/nip-lookup?fbconfig')).json();const app = initializeApp(__c);
const auth = getAuth(app);

onAuthStateChanged(auth, async user => {
  window._fbReady = true;
  window._fbToken = user ? () => user.getIdToken(true) : null;
  window._firebaseUser = user || null;
  if (user) {
    localStorage.setItem('dokumo_user', JSON.stringify({
      name: user.displayName || '',
      email: user.email || '',
      photo: user.photoURL || ''
    }));
    try {
      const token = await user.getIdToken();
      const res = await fetch('/api/check-sub', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (data.active && data.expiresAt) {
        localStorage.setItem('dokumo_sub', JSON.stringify({ plan: data.plan, expiresAt: data.expiresAt }));
      }
    } catch(e) {}
  } else {
    localStorage.removeItem('dokumo_user');
  }
  if (!user) {
    document.getElementById('resultsLabel').textContent = '';
    document.getElementById('myDocGrid').innerHTML =
      '<div class="m-empty">' +
      '<span class="m-empty-icon">🔒</span>' +
      '<div class="m-empty-title">Zaloguj się</div>' +
      '<p class="m-empty-sub">Musisz być zalogowany, aby zobaczyć swoje dokumenty.</p>' +
      '<a href="konto.html" class="m-empty-btn">Zaloguj się →</a>' +
      '</div>';
  } else {
    loadAndRender();
  }
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// ── STATE ──
window._allDocs = [];
var activeFilter = 'all';

// ── API ──
async function getToken() {
  for (var i = 0; i < 30 && !window._fbReady; i++) {
    await new Promise(function(r) { setTimeout(r, 100); });
  }
  if (window._fbToken) {
    try { return await window._fbToken(); } catch(e) {}
  }
  return null;
}

async function loadDocsFromAPI() {
  var token = await getToken();
  if (!token) return [];
  try {
    var res = await fetch('/api/get-docs', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return [];
    var data = await res.json();
    return data.docs || [];
  } catch(e) { return []; }
}

async function deleteDocAPI(docId) {
  var token = await getToken();
  if (!token) return;
  await fetch('/api/delete-doc', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ docId: docId })
  });
}

// ── RENDER ──
async function loadAndRender() {
  document.getElementById('myDocGrid').innerHTML =
    '<div style="padding:40px;text-align:center;color:var(--ink3);font-size:.85rem;">Ładowanie dokumentów…</div>';
  window._allDocs = await loadDocsFromAPI();
  filterAndRender();
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.m-filter').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  filterAndRender();
}

function filterAndRender() {
  var docs = [].concat(window._allDocs || []);
  var q = (document.getElementById('mySearch').value || '').toLowerCase().trim();
  var sort = document.getElementById('mySort').value;

  if (activeFilter === 'kariera') docs = docs.filter(function(d) { return d.cat === 'kariera'; });
  else if (activeFilter === 'biznes') docs = docs.filter(function(d) { return d.cat === 'biznes'; });

  if (q) docs = docs.filter(function(d) { return (d.name||'').toLowerCase().includes(q); });

  if (sort === 'newest') docs.sort(function(a,b) { return new Date(b.createdAt||0) - new Date(a.createdAt||0); });
  if (sort === 'oldest') docs.sort(function(a,b) { return new Date(a.createdAt||0) - new Date(b.createdAt||0); });
  if (sort === 'name') docs.sort(function(a,b) { return (a.name||'').localeCompare(b.name||'','pl'); });

  var total = (window._allDocs || []).length;
  var badge = document.getElementById('docCount');
  badge.textContent = total ? total : '';
  badge.style.display = total ? '' : 'none';
  document.getElementById('resultsLabel').textContent =
    docs.length + ' ' + (docs.length === 1 ? 'dokument' : docs.length < 5 ? 'dokumenty' : 'dokumentów');

  var grid = document.getElementById('myDocGrid');

  if (docs.length === 0) {
    grid.innerHTML = '<div class="m-empty">' +
      '<span class="m-empty-icon">📂</span>' +
      '<div class="m-empty-title">' + (total === 0 ? 'Brak dokumentów' : 'Brak wyników') + '</div>' +
      '<p class="m-empty-sub">' + (total === 0 ? 'Wygeneruj swój pierwszy dokument — zajmie to mniej niż minutę.' : 'Spróbuj innego filtra lub frazy.') + '</p>' +
      (total === 0 ? '<a href="index.html" class="m-empty-btn">Przeglądaj dokumenty →</a>' : '') +
      '</div>';
    return;
  }

  var html = '<div class="m-grid' + (_selectMode ? ' select-mode' : '') + '">';
  docs.forEach(function(doc) {
    var id = doc.id || '';
    var name = (doc.name || 'Dokument').replace(/"/g, '&quot;');
    var icon = doc.icon || '📄';
    var catLabel = doc.catLabel || doc.cat || '';
    var date = formatDate(doc.createdAt);
    var isSel = _selected[id] ? ' selected' : '';
    html += '<div class="d-card' + isSel + '" data-id="' + id + '" onclick="if(_selectMode){var cb=this.querySelector(\'.d-card-cb\');toggleCard(\'' + id + '\',this,cb);}">';
    html += '<input type="checkbox" class="d-card-cb"' + (isSel ? ' checked' : '') + ' onclick="event.stopPropagation();var card=this.closest(\'.d-card\');toggleCard(\'' + id + '\',card,this);">';
    html += '<div class="d-card-top">';
    html += '<div class="d-card-row1">';
    html += '<div class="d-card-icon">' + icon + '</div>';
    html += '<div class="d-card-meta">';
    html += '<div class="d-card-name" title="' + name + '">' + name + '</div>';
    html += '<div>';
    if (catLabel) html += '<span class="d-cat-badge">' + catLabel + '</span>';
    html += '<span class="d-status-badge">&#10003; Wygenerowany</span>';
    html += '</div>';
    html += '</div></div>';
    html += '<div class="d-card-date">Utworzono: ' + date + '</div>';
    html += '</div>';
    html += '<div class="d-card-actions">';
    if (doc.status === 'generated' || doc.text) {
      html += '<button class="d-action-btn primary" onclick="downloadDoc(\'' + id + '\',\'pdf\')">PDF</button>';
      html += '<button class="d-action-btn" onclick="downloadDoc(\'' + id + '\',\'txt\')">TXT</button>';
      html += '<button class="d-action-btn" onclick="downloadDoc(\'' + id + '\',\'docx\')">Word</button>';
    }
    html += '<button class="d-action-btn" title="Edytuj" onclick="editDoc(\'' + id + '\')" style="margin-left:auto">✏️</button>';
    html += '<button class="d-action-btn danger" onclick="askDelete(\'' + id + '\')">&#10005; Usuń</button>';
    html += '</div></div>';
  });
  html += '</div>';
  grid.innerHTML = html;
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

// ── COVER LETTER HTML BUILDER ──
function buildCoverLetterHTML(d) {
  var esc = function(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var nl2br = function(s) { return esc(s).replace(/\n/g,'<br>'); };
  var fullName = [d.firstName, d.lastName].filter(Boolean).join(' ');
  var today = new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long', year:'numeric'});

  var senderHtml = '<b>' + esc(fullName || 'Imię Nazwisko') + '</b>';
  if (d.street) senderHtml += '<br>' + esc(d.street);
  var zipCity = [d.zip, d.city].filter(Boolean).join(' ');
  if (zipCity) senderHtml += '<br>' + esc(zipCity);
  if (d.email) senderHtml += '<br>' + esc(d.email);
  if (d.phone) senderHtml += '<br>' + esc(d.phone);

  var dateHtml = esc((d.city || 'Miejscowość') + ', ' + today);

  var recipientBlock = '';
  if (d.rCompany || d.rContact) {
    var rLines = [];
    if (d.rCompany) rLines.push('<b>' + esc(d.rCompany) + '</b>');
    if (d.rContact) rLines.push(esc(d.rContact));
    if (d.rStreet)  rLines.push(esc(d.rStreet));
    var rZipCity = [d.rZip, d.rCity].filter(Boolean).join(' ');
    if (rZipCity) rLines.push(esc(rZipCity));
    recipientBlock = '<div style="margin-bottom:32px;">' + rLines.join('<br>') + '</div>';
  }

  var subjectLine = d.position
    ? '<div style="margin-bottom:24px;">Dotyczy: Aplikacja na stanowisko <b>' + esc(d.position) + '</b>' + (d.company ? ' w firmie <b>' + esc(d.company) + '</b>' : '') + '</div>'
    : '';

  var salutation = d.rContact
    ? 'Szanowna Pani/Panie ' + esc((d.rContact.split(' ').slice(-1)[0]) || '') + ','
    : 'Szanowni Państwo,';

  var bodyHtml = d.body
    ? '<div style="text-align:justify;">' + nl2br(d.body) + '</div>'
    : '';

  var inner =
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;">' +
      '<div style="line-height:1.7;">' + senderHtml + '</div>' +
      '<div style="text-align:right;white-space:nowrap;padding-left:16px;">' + dateHtml + '</div>' +
    '</div>' +
    recipientBlock + subjectLine +
    '<div style="margin-bottom:20px;">' + salutation + '</div>' +
    '<div style="margin-bottom:40px;">' + bodyHtml + '</div>' +
    '<div>Z poważaniem,</div>' +
    '<div style="margin-top:36px;"><b>' + esc(fullName || 'Imię Nazwisko') + '</b></div>';

  return '<div style="background:#fff;padding:52px 56px;font-family:Georgia,\'Times New Roman\',serif;font-size:12.5px;line-height:1.8;color:#1a1a1a;box-sizing:border-box;">' + inner + '</div>';
}

function openLmPdf(paperHtml, fname) {
  var fullDoc = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
    '<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>' +
    '<style>*{box-sizing:border-box}body{margin:0;padding:0;background:#fff;}</style>' +
    '</head><body>' + paperHtml +
    '<script>window.onload=function(){' +
    'html2pdf().set({margin:[18,18,18,18],filename:"' + fname + '",image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}})' +
    '.from(document.body.firstElementChild).save().then(function(){setTimeout(function(){window.close()},1000)});' +
    '};<\/script></body></html>';
  var win = window.open('', '_blank');
  if (win) { win.document.write(fullDoc); win.document.close(); }
  else { showToast('Zezwól na otwieranie okien dla tej strony.'); }
}

// ── DOWNLOAD ──
function downloadDoc(docId, format) {
  var doc = (window._allDocs || []).find(function(d) { return d.id === docId; });
  if (!doc || !doc.text) { showToast('Brak treści dokumentu.'); return; }
  var safeName = (doc.name || 'dokument').replace(/[\s\/\\:*?"<>|]+/g, '_');
  var text = doc.text;

  if (format === 'txt') {
    var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    triggerDl(URL.createObjectURL(blob), safeName + '.txt');

  } else if (format === 'pdf') {
    if (doc.typeId === 'cover-letter' || text.indexOf('__LM_HTML__:') === 0) {
      var fname = safeName + '.pdf';
      var paperHtml = null;
      // Priorytet: covDataJson → pełna rekonstrukcja 1:1 z edytorem
      if (doc.covDataJson) {
        try { paperHtml = buildCoverLetterHTML(JSON.parse(doc.covDataJson)); } catch(e) {}
      }
      // Fallback: zapisany HTML
      if (!paperHtml && text.indexOf('__LM_HTML__:') === 0) {
        paperHtml = text.slice('__LM_HTML__:'.length);
      }
      if (paperHtml) { openLmPdf(paperHtml, fname); return; }
      // Ostateczny fallback: plain text
    }
    if (text.indexOf('__CV_HTML__:') === 0) {
      // CV with template — use Railway Puppeteer service (same as kreator-cv.html)
      var cvHtml = text.slice('__CV_HTML__:'.length);
      downloadCvPdf(cvHtml, safeName);
    } else {
      var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var win = window.open('', '_blank');
      win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + doc.name + '</title>');
      win.document.write('<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/scr'+'ipt>');
      win.document.write('<style>body{font-family:Arial,sans-serif;font-size:12pt;line-height:1.7;margin:2.5cm;color:#111}pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:11pt}@media print{body{margin:2cm}}</style>');
      win.document.write('</head><body><pre>' + safe + '</pre>');
      win.document.write('<script>window.onload=function(){html2pdf().set({margin:25,filename:"'+safeName+'.pdf",image:{type:"jpeg",quality:0.95},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}}).from(document.body.firstElementChild).save().then(function(){setTimeout(function(){window.close()},800)});}<\/script>');
      win.document.write('</body></html>');
      win.document.close();
    }

  } else if (format === 'docx') {
    var rtf = buildRTF(text, doc.name || 'Dokument');
    var blob = new Blob([rtf], { type: 'application/rtf' });
    triggerDl(URL.createObjectURL(blob), safeName + '.rtf');
  }
}

async function downloadCvPdf(html, safeName) {
  showToast('Generowanie PDF…');
  try {
    var token = typeof window._fbToken === 'function' ? await window._fbToken() : window._fbToken;
    if (!token) { showToast('Zaloguj się aby pobrać PDF.'); return; }
    var resp = await fetch('/api/pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ html: html, filename: safeName })
    });
    if (!resp.ok) {
      var err = await resp.json().catch(function() { return {}; });
      showToast('Błąd PDF: ' + (err.error || resp.status)); return;
    }
    var blob = await resp.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = safeName + '.pdf'; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  } catch(e) {
    showToast('Błąd generowania PDF: ' + e.message);
  }
}

function triggerDl(url, filename) {
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function buildRTF(text, title) {
  var esc = function(s) {
    return s.replace(/\\/g,'\\\\').replace(/[{}]/g, function(c) { return '\\' + c; })
      .replace(/[\u0080-\uFFFF]/g, function(c) {
        var code = c.charCodeAt(0);
        return code > 32767 ? '{\\uc1\\u'+(code-65536)+'?}' : '\\u'+code+'?';
      });
  };
  var lines = text.split('\n').map(function(l) {
    var e = esc(l); return e.trim() ? e + '\\par' : '\\par';
  }).join('\n');
  return '{\\rtf1\\ansi\\deff0{\\fonttbl{\\f0\\froman\\fcharset238 Times New Roman;}}' +
    '{\\colortbl ;\\red17\\green17\\blue17;}\\f0\\fs24\\cf1\\sl360\\slmult1 ' +
    '{\\b\\fs28 ' + esc(title) + '}\\par\\par ' + lines + '}';
}

// ── EDIT ──
var _editDocId = null;

function editDoc(docId) {
  var doc = (window._allDocs || []).find(function(d) { return d.id === docId; });
  if (!doc) return;
  // Cover letter → redirect to generator
  if (doc.typeId === 'cover-letter' || (doc.text && doc.text.indexOf('__LM_HTML__:') === 0)) {
    if (doc.covDataJson) {
      sessionStorage.setItem('dokumo_editLmData', doc.covDataJson);
      sessionStorage.removeItem('dokumo_editLmText');
    } else {
      sessionStorage.removeItem('dokumo_editLmData');
      var rawText = (doc.text || '').indexOf('__LM_HTML__:') === 0 ? '' : (doc.text || '');
      if (rawText) sessionStorage.setItem('dokumo_editLmText', rawText);
      else sessionStorage.removeItem('dokumo_editLmText');
    }
    sessionStorage.setItem('dokumo_editLmDocId', docId);
    window.location.href = 'generator.html';
    return;
  }
  // CV → redirect to kreator
  if (doc.typeId === 'cv' || (doc.text && doc.text.indexOf('__CV_HTML__:') === 0)) {
    if (doc.cvDataJson) {
      sessionStorage.setItem('dokumo_editCvData', doc.cvDataJson);
    } else {
      sessionStorage.removeItem('dokumo_editCvData');
    }
    // Pass template so kreator skips template picker
    var tplParam = 'nova';
    try { var saved = JSON.parse(doc.cvDataJson || '{}'); if (saved.__template) tplParam = saved.__template; } catch(e) {}
    window.location.href = 'kreator-cv.html?template=' + tplParam;
    return;
  }
  // Other docs → inline editor
  _editDocId = docId;
  document.getElementById('editTitle').textContent = 'Edytuj: ' + (doc.name || 'Dokument');
  document.getElementById('editTextarea').value = doc.text || '';
  document.getElementById('editOverlay').classList.add('open');
  document.getElementById('editTextarea').focus();
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
  _editDocId = null;
}

async function saveEdit() {
  if (!_editDocId) return;
  var text = document.getElementById('editTextarea').value;
  var token = await getToken();
  if (!token) { showToast('Błąd autoryzacji.'); return; }
  var btn = document.querySelector('.m-edit-save');
  btn.textContent = 'Zapisywanie…'; btn.disabled = true;
  try {
    var res = await fetch('/api/update-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ docId: _editDocId, text: text })
    });
    if (!res.ok) throw new Error();
    var doc = (window._allDocs || []).find(function(d) { return d.id === _editDocId; });
    if (doc) doc.text = text;
    closeEdit();
    showToast('Dokument zapisany.');
  } catch(e) {
    showToast('Błąd zapisu. Spróbuj ponownie.');
  } finally {
    btn.textContent = 'Zapisz'; btn.disabled = false;
  }
}

// ── DELETE ──
function askDelete(docId) {
  var doc = (window._allDocs || []).find(function(d) { return d.id === docId; });
  var name = doc ? doc.name : 'ten dokument';
  document.getElementById('confirmMsg').textContent = 'Usunąć "' + name + '"? Tej operacji nie można cofnąć.';
  document.getElementById('confirmDeleteBtn').onclick = function() { doDelete(docId); };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }
async function doDelete(docId) {
  await deleteDocAPI(docId);
  closeConfirm();
  window._allDocs = (window._allDocs || []).filter(function(d) { return d.id !== docId; });
  filterAndRender();
  showToast('Dokument usunięty.');
}

// ── SELECT MODE ──
var _selectMode = false;
var _selected = {};

function toggleSelectMode() {
  _selectMode ? exitSelectMode() : enterSelectMode();
}

function enterSelectMode() {
  _selectMode = true;
  _selected = {};
  document.getElementById('myDocGrid').classList.add('select-mode');
  document.getElementById('bulkBar').classList.add('open');
  document.getElementById('btnSelectAll').textContent = 'Anuluj';
  updateBulkBar();
}

function exitSelectMode() {
  _selectMode = false;
  _selected = {};
  document.getElementById('myDocGrid').classList.remove('select-mode');
  document.getElementById('bulkBar').classList.remove('open');
  document.getElementById('btnSelectAll').textContent = 'Zaznacz';
  document.querySelectorAll('.d-card.selected').forEach(function(c) { c.classList.remove('selected'); });
  document.querySelectorAll('.d-card-cb').forEach(function(cb) { cb.checked = false; });
}

function toggleCard(docId, cardEl, cb) {
  if (!_selectMode) return;
  if (_selected[docId]) {
    delete _selected[docId];
    cardEl.classList.remove('selected');
    cb.checked = false;
  } else {
    _selected[docId] = true;
    cardEl.classList.add('selected');
    cb.checked = true;
  }
  updateBulkBar();
}

function selectAll() {
  var allVisible = document.querySelectorAll('.d-card[data-id]');
  var allSelected = allVisible.length > 0 && Object.keys(_selected).length === allVisible.length;
  if (allSelected) {
    // odznacz wszystkie
    _selected = {};
    allVisible.forEach(function(c) {
      c.classList.remove('selected');
      var cb = c.querySelector('.d-card-cb'); if (cb) cb.checked = false;
    });
  } else {
    // zaznacz wszystkie
    allVisible.forEach(function(c) {
      var id = c.getAttribute('data-id');
      _selected[id] = true;
      c.classList.add('selected');
      var cb = c.querySelector('.d-card-cb'); if (cb) cb.checked = true;
    });
  }
  updateBulkBar();
}

function updateBulkBar() {
  var count = Object.keys(_selected).length;
  var allVisible = document.querySelectorAll('.d-card[data-id]').length;
  document.getElementById('bulkCount').textContent = count + ' zaznaczon' + (count === 1 ? 'y' : 'ych');
  document.getElementById('bulkDelBtn').disabled = count === 0;
  document.getElementById('bulkSelectAllBtn').textContent =
    count === allVisible && allVisible > 0 ? 'Odznacz wszystkie' : 'Zaznacz wszystkie';
}

function askDeleteSelected() {
  var count = Object.keys(_selected).length;
  if (!count) return;
  document.getElementById('confirmMsg').textContent =
    'Usunąć ' + count + ' ' + (count === 1 ? 'dokument' : count < 5 ? 'dokumenty' : 'dokumentów') + '? Tej operacji nie można cofnąć.';
  document.getElementById('confirmDeleteBtn').onclick = doDeleteSelected;
  document.getElementById('confirmOverlay').classList.add('open');
}

async function doDeleteSelected() {
  var ids = Object.keys(_selected);
  closeConfirm();
  var token = await getToken();
  if (!token) { showToast('Błąd autoryzacji.'); return; }
  showToast('Usuwanie ' + ids.length + ' dokumentów…');
  await Promise.all(ids.map(function(id) {
    return fetch('/api/delete-doc', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ docId: id })
    }).catch(function(){});
  }));
  window._allDocs = (window._allDocs || []).filter(function(d) { return !_selected[d.id]; });
  exitSelectMode();
  filterAndRender();
  showToast('Usunięto ' + ids.length + ' dokumentów.');
}

// ── TOAST ──
function showToast(msg) {
  var t = document.getElementById('myToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}
</script>

</body>
