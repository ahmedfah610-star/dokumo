}

}

}

}

}
.cv-crop-btns {
  display:flex; gap:10px; width:100%;
}

  cursor:pointer; transition:opacity 0.15s;
}
.cv-crop-btn-confirm:hover { opacity:0.88; }

/* ── ACCORDION LIST ── */
.acc-list { background:var(--white); }
.acc-item { border-bottom:1px solid var(--border); }

/* ── ACCORDION ROW (header) ── */
.acc-row {

  transition:background 0.15s; min-height:56px;
}

  color:#d4d2ce; font-size:0.95rem;

}

.acc-row:hover .acc-drag { color:#aaa; }
.acc-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }

/* ── TOGGLE BUTTON ── */
.acc-btn {
  width:34px; height:34px; flex-shrink:0;
  border:1.5px solid var(--border); background:var(--bg); color:var(--ink2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border-radius:8px;
  transition:all 0.22s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;
}
.acc-row:hover .acc-btn { border-color:var(--accent2); color:var(--accent2); }
.acc-item.open .acc-btn { background:var(--accent2); border-color:var(--accent2); color:#fff; }
.acc-plus-v {
  transform-origin:7px 7px;
  transition:transform 0.22s cubic-bezier(0.4,0,0.2,1);
}
.acc-item.open .acc-plus-v { transform:rotate(90deg); }

/* ── ACCORDION BODY ── */
.acc-body { display:none; padding:4px 18px 20px 38px; animation:acc-in 0.2s ease; }
.acc-item.open .acc-body { display:block; }
@keyframes acc-in {
  from { opacity:0; transform:translateY(-4px); }
  to   { opacity:1; transform:translateY(0); }
}

.acc-hint { font-size:0.67rem; color:var(--muted); margin:6px 0 6px; }

.acc-lang-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.acc-remove-x {
  background:none; border:none; color:var(--muted);

  padding:0; line-height:1; transition:color 0.15s;
}
.acc-remove-x:hover { color:var(--red); }

  border-bottom:1px solid transparent; transition:border-color 0.15s; padding:0;
}
.acc-custom-name:focus { border-bottom-color:var(--accent2); color:var(--ink); }

.cv-tpl-grid {

}

}
.cv-tpl-card {
  border:2px solid var(--border); background:white;
  cursor:pointer; overflow:hidden; width:300px;

  transition:border-color 0.18s, box-shadow 0.18s;

  content:'✓'; position:absolute; bottom:8px; right:8px;

  transition:all 0.18s; flex-shrink:0;

  border-color:var(--ink); transform:scale(1.15);

.cv-color-reset {
  width:28px; height:28px; border-radius:50%;

  color:var(--muted); transition:all 0.18s; flex-shrink:0;

.cv-color-reset:hover { border-color:var(--accent2); color:var(--accent2); }

  if (!resizer || !formCol) return;

  var isDown = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', function(e) {
    if (window.innerWidth < 768) return;
    isDown = true;
    startX = e.clientX;
    startW = formCol.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    var dx = e.clientX - startX;
    var container = formCol.parentElement.getBoundingClientRect().width;
    var newW = startW + dx;
    var minW = container * 0.25;
    var maxW = container * 0.75;
    newW = Math.min(Math.max(newW, minW), maxW);
    var pct = (newW / container * 100).toFixed(2);
    formCol.style.width = pct + '%';
    // Update pay-bar width too
    var payBar = document.querySelector('.cv-pay-bar');
    if (payBar) payBar.style.width = pct + '%';
  });

  document.addEventListener('mouseup', function() {
    if (!isDown) return;
    isDown = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();
</script>
<script defer src="plan-guard.js?v=2"></script>
