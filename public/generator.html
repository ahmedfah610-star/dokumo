<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="logo2.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-61ETEPHJB7"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-61ETEPHJB7");</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List motywacyjny – Dokumo</title>
<link rel="canonical" href="https://dokumoflow.com/generator.html">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--ink:#111;--ink2:#555;--ink3:#999;--border:#e5e5e5;--surface:#f5f5f7;--pill:50px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);font-family:'Figtree',-apple-system,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden;}

/* NAV */
.nav{height:60px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:.75rem;flex-shrink:0;z-index:200;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#111827;font-family:'Inter',sans-serif;font-weight:800;font-size:1.125rem;letter-spacing:-.02em;flex-shrink:0;}
.nav-back{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:600;color:var(--ink2);text-decoration:none;padding:7px 13px;border-radius:var(--pill);border:1.5px solid var(--border);transition:all .2s;}
.nav-back:hover{border-color:#999;color:var(--ink);}

/* LAYOUT */
.lm-wrap{flex:1;display:flex;overflow:hidden;}

/* ── EDITOR ── */
.lm-editor{width:360px;min-width:300px;overflow-y:auto;border-right:1px solid var(--border);flex-shrink:0;}
.lm-editor-inner{padding:20px 18px 48px;}

.lm-section{margin-bottom:22px;}
.lm-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.lm-section-title{font-size:.67rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);}

.lm-field{margin-bottom:8px;}
.lm-label{font-size:.71rem;font-weight:600;color:var(--ink2);margin-bottom:3px;display:block;}
.lm-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-family:'Figtree',sans-serif;font-size:.84rem;color:var(--ink);outline:none;background:#fff;transition:border-color .15s;}
.lm-input:focus{border-color:#111;}
.lm-textarea{resize:vertical;min-height:120px;line-height:1.6;}
.lm-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.lm-rec-hint{font-size:.73rem;color:var(--ink3);line-height:1.5;margin-bottom:8px;}
.lm-rec-fields{display:none;}
.lm-rec-fields.open{display:block;}
.lm-toggle-rec{display:inline-flex;align-items:center;gap:5px;font-size:.73rem;font-weight:600;color:var(--ink2);cursor:pointer;padding:0;background:none;border:none;font-family:'Figtree',sans-serif;transition:color .15s;}
.lm-toggle-rec:hover{color:var(--ink);}
.lm-toggle-rec svg{transition:transform .2s;}
.lm-toggle-rec.open svg{transform:rotate(180deg);}

@media print{
  .nav,.lm-editor,.lm-bar{display:none!important;}
  body{overflow:visible!important;}
  .lm-wrap{display:block!important;overflow:visible!important;}
  .lm-preview{background:#fff!important;padding:0!important;display:block!important;}
  .lm-paper{box-shadow:none!important;max-width:100%!important;padding:20mm 20mm!important;min-height:auto!important;}
}

/* ── PREVIEW ── */
.lm-preview{flex:1;overflow-y:auto;background:#f0f0f2;display:flex;justify-content:center;padding:28px 20px 48px;}
.lm-paper{background:#fff;width:100%;max-width:600px;min-height:760px;padding:52px 56px;font-family:Georgia,'Times New Roman',serif;font-size:12.5px;line-height:1.8;color:#1a1a1a;box-shadow:0 2px 24px rgba(0,0,0,.09);border-radius:2px;align-self:flex-start;}

/* ── BOTTOM BAR ── */
.lm-bar{height:52px;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:8px;flex-shrink:0;background:#fff;z-index:10;}
.btn-dl{padding:8px 18px;border-radius:var(--pill);border:none;background:var(--ink);font-family:'Figtree',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;color:#fff;display:flex;align-items:center;gap:6px;transition:background .2s;}
.btn-dl:hover{background:#333;}
.btn-copy{padding:8px 18px;border-radius:var(--pill);border:1.5px solid var(--border);background:#fff;font-family:'Figtree',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-copy:hover{border-color:#999;background:var(--surface);}
.btn-new{padding:8px 18px;border-radius:var(--pill);border:1.5px solid var(--border);background:#fff;font-family:'Figtree',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--ink2);transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;margin-left:auto;}
.btn-new:hover{border-color:#999;color:var(--ink);}

@media(max-width:700px){
  .lm-editor{width:100%;min-width:0;border-right:none;}
  .lm-preview{display:none;}
}
</style>
<script type="module">
import{initializeApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const __c=await(await fetch('/api/nip-lookup?fbconfig')).json();
const app=getApps().length?getApps()[0]:initializeApp(__c);
onAuthStateChanged(getAuth(app),async u=>{
  if(u){localStorage.setItem("dokumo_user",JSON.stringify({name:u.displayName||"",email:u.email||"",photo:u.photoURL||""}));window._fbToken=await u.getIdToken();}
  else{window._fbToken=null;}
  if(window._onAuthReady) window._onAuthReady();
});
</script>
</head>
<body>

<nav class="nav">
  <a href="kariera.html" class="nav-logo">
    <img src="logo2.png" style="height:28px;width:auto;display:block;">
    Dokumo
  </a>
  <a href="kariera.html" class="nav-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Strefa Kariery
  </a>
</nav>

<div class="lm-wrap">

  <!-- ── EDITOR ── -->
  <div class="lm-editor">
    <div class="lm-editor-inner">

      <!-- Aplikacja -->
      <div class="lm-section">
        <div class="lm-section-head"><span class="lm-section-title">Aplikacja</span></div>
        <div class="lm-field"><label class="lm-label">Stanowisko</label><input class="lm-input" id="fPos" placeholder="np. Frontend Developer" oninput="renderPreview()"></div>
        <div class="lm-field"><label class="lm-label">Firma</label><input class="lm-input" id="fCompany" placeholder="np. Google" oninput="renderPreview()"></div>
      </div>

      <!-- Nadawca -->
      <div class="lm-section">
        <div class="lm-section-head"><span class="lm-section-title">Nadawca</span></div>
        <div class="lm-row2">
          <div class="lm-field"><label class="lm-label">Imię</label><input class="lm-input" id="fFirstName" placeholder="np. Ahmed" oninput="renderPreview()"></div>
          <div class="lm-field"><label class="lm-label">Nazwisko</label><input class="lm-input" id="fLastName" placeholder="np. Kowalski" oninput="renderPreview()"></div>
        </div>
        <div class="lm-field"><label class="lm-label">Adres e-mail</label><input class="lm-input" id="fEmail" type="email" placeholder="np. jan@gmail.com" oninput="renderPreview()"></div>
        <div class="lm-field"><label class="lm-label">Numer telefonu</label><input class="lm-input" id="fPhone" placeholder="np. 567-898-765" oninput="renderPreview()"></div>
        <div class="lm-field"><label class="lm-label">Ulica</label><input class="lm-input" id="fStreet" placeholder="np. Partyzantów 12" oninput="renderPreview()"></div>
        <div class="lm-row2">
          <div class="lm-field"><label class="lm-label">Kod pocztowy</label><input class="lm-input" id="fZip" placeholder="np. 47-220" oninput="renderPreview()"></div>
          <div class="lm-field"><label class="lm-label">Miasto</label><input class="lm-input" id="fCity" placeholder="np. Kraków" oninput="renderPreview()"></div>
        </div>
      </div>

      <!-- Odbiorca -->
      <div class="lm-section">
        <div class="lm-section-head">
          <span class="lm-section-title">Odbiorca</span>
          <button class="lm-toggle-rec" id="recToggle" onclick="toggleRec()">
            Dodaj dane
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <p class="lm-rec-hint">Jeśli znasz odbiorcę listu motywacyjnego, możesz dodać jego dane tutaj. Nie martw się, jeśli ich nie znasz – Twój list będzie nadal świetny bez nich.</p>
        <div class="lm-rec-fields" id="recFields">
          <div class="lm-field"><label class="lm-label">Firma</label><input class="lm-input" id="rCompany" placeholder="np. Google Sp. z o.o." oninput="renderPreview()"></div>
          <div class="lm-field"><label class="lm-label">Osoba kontaktowa</label><input class="lm-input" id="rContact" placeholder="np. Anna Kowalska" oninput="renderPreview()"></div>
          <div class="lm-field"><label class="lm-label">Ulica</label><input class="lm-input" id="rStreet" placeholder="np. Aleje Jerozolimskie 1" oninput="renderPreview()"></div>
          <div class="lm-row2">
            <div class="lm-field"><label class="lm-label">Kod pocztowy</label><input class="lm-input" id="rZip" placeholder="np. 47-224" oninput="renderPreview()"></div>
            <div class="lm-field"><label class="lm-label">Miasto</label><input class="lm-input" id="rCity" placeholder="np. Kraków" oninput="renderPreview()"></div>
          </div>
        </div>
      </div>

      <!-- Treść -->
      <div class="lm-section">
        <div class="lm-section-head"><span class="lm-section-title">Treść listu</span></div>
        <div class="lm-field">
          <textarea class="lm-input lm-textarea" id="fBody" placeholder="Opisz w 3-4 zdaniach, dlaczego jesteś idealnym kandydatem na to stanowisko." oninput="renderPreview()"></textarea>
        </div>
      </div>

    </div>
  </div>

  <!-- ── PREVIEW ── -->
  <div class="lm-preview">
    <div class="lm-paper" id="lmPaper"></div>
  </div>

</div>

<div class="lm-bar">
  <button class="btn-dl" onclick="downloadPdf()">⬇ Pobierz PDF</button>
  <button class="btn-copy" onclick="copyText()">⎘ Kopiuj</button>
  <a href="kariera.html" class="btn-new">Nowy list</a>
</div>

<script>
var _p = new URLSearchParams(window.location.search);
function gp(k){ return _p.get(k) || ''; }
function val(id){ return (document.getElementById(id)||{}).value || ''; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }

// ── Pre-fill on load ──
var _autoGenDone = false;

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('fPos').value     = gp('position');
  document.getElementById('fCompany').value = gp('company');

  try {
    var u = JSON.parse(localStorage.getItem('dokumo_user') || '{}');
    if (u.name) {
      var parts = u.name.trim().split(' ');
      document.getElementById('fFirstName').value = parts[0] || '';
      document.getElementById('fLastName').value  = parts.slice(1).join(' ') || '';
    }
    if (u.email) document.getElementById('fEmail').value = u.email;
  } catch(e) {}

  renderPreview();

  // Auto-generate when coming from wizard (position param present)
  if (gp('position')) {
    window._onAuthReady = function() { if (!_autoGenDone) autoGenerateFromWizard(); };
    setTimeout(function() { if (!_autoGenDone) autoGenerateFromWizard(); }, 2000);
  }
});

async function autoGenerateFromWizard() {
  if (_autoGenDone) return;
  _autoGenDone = true;
  var bodyEl = document.getElementById('fBody');
  if (bodyEl) { bodyEl.disabled = true; bodyEl.placeholder = 'AI generuje treść…'; }
  try {
    var token = window._fbToken || '';
    var dz = new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long', year:'numeric'});
    var fullName = [val('fFirstName'), val('fLastName')].filter(Boolean).join(' ');
    var extra = '';
    if (gp('achievements')) extra += '\n- Osiągnięcia: ' + gp('achievements');
    if (gp('motivation'))   extra += '\n- Motywacja: ' + gp('motivation');
    var prompt = 'Napisz treść listu motywacyjnego po polsku (tylko główna treść – bez nagłówka adresowego, bez "Szanowni Państwo", bez "Z poważaniem").\n\n'
      + 'DANE:\n'
      + '- Stanowisko: ' + (gp('position') || '[stanowisko]') + '\n'
      + '- Firma: ' + (gp('company') || '[firma]') + '\n'
      + '- Kandydat: ' + (fullName || '[imię i nazwisko]') + '\n'
      + '- Data: ' + dz + extra + '\n\n'
      + 'Napisz 3-4 akapity. Formalny, konkretny, gotowy do wklejenia. Zero markdown, zero gwiazdek, zero emoji.';
    var res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ prompt: prompt, docId: 'cover-letter', docName: 'List motywacyjny', docCat: 'kariera', docCatLabel: 'Kariera', docIcon: '✉️' })
    });
    var data = await res.json();
    var text = data.text || data.result || '';
    if (!text) throw new Error('empty');
    if (bodyEl) { bodyEl.disabled = false; bodyEl.value = text; }
    renderPreview();
  } catch(e) {
    if (bodyEl) { bodyEl.disabled = false; bodyEl.placeholder = 'Opisz w 3-4 zdaniach, dlaczego jesteś idealnym kandydatem na to stanowisko.'; }
  }
}

// ── Odbiorca toggle ──
var _recOpen = false;
function toggleRec() {
  _recOpen = !_recOpen;
  document.getElementById('recFields').classList.toggle('open', _recOpen);
  document.getElementById('recToggle').classList.toggle('open', _recOpen);
}

// ── Live Preview ──
function renderPreview() {
  var firstName = val('fFirstName'), lastName = val('fLastName');
  var fullName  = [firstName, lastName].filter(Boolean).join(' ');
  var email = val('fEmail'), phone = val('fPhone');
  var street = val('fStreet'), zip = val('fZip'), city = val('fCity');
  var pos = val('fPos'), company = val('fCompany');
  var body = val('fBody');
  var rCompany = val('rCompany'), rContact = val('rContact');
  var rStreet = val('rStreet'), rZip = val('rZip'), rCity = val('rCity');

  var today = new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long', year:'numeric'});
  var cityDate = esc((city || 'Miejscowość') + ', ' + today);

  var senderLines = [];
  if (street) senderLines.push(esc(street));
  var zipCity = [zip, city].filter(Boolean).join(' ');
  if (zipCity) senderLines.push(esc(zipCity));
  if (email)  senderLines.push(esc(email));
  if (phone)  senderLines.push(esc(phone));

  var recipientBlock = '';
  if (rCompany || rContact) {
    var rLines = [];
    if (rCompany) rLines.push('<b>' + esc(rCompany) + '</b>');
    if (rContact) rLines.push(esc(rContact));
    if (rStreet)  rLines.push(esc(rStreet));
    var rZipCity = [rZip, rCity].filter(Boolean).join(' ');
    if (rZipCity) rLines.push(esc(rZipCity));
    recipientBlock = '<div style="margin-bottom:24px;">' + rLines.join('<br>') + '</div>';
  }

  var subjectLine = pos
    ? ('<div style="margin-bottom:22px;">Dotyczy: Aplikacja na stanowisko <b>' + esc(pos) + '</b>' + (company ? ' w firmie <b>' + esc(company) + '</b>' : '') + '</div>')
    : '';

  var salutation = rContact
    ? 'Szanowna Pani/Panie ' + esc(rContact.split(' ').slice(-1)[0]) + ','
    : 'Szanowni Państwo,';

  var bodyHtml = body
    ? '<div style="text-align:justify;">' + nl2br(body) + '</div>'
    : '<div style="color:#bbb;font-style:italic;">Tutaj pojawi się treść Twojego listu motywacyjnego…</div>';

  var html =
    '<div style="text-align:right;margin-bottom:32px;">' + cityDate + '</div>' +
    '<div style="margin-bottom:26px;"><b>' + esc(fullName || 'Imię Nazwisko') + '</b><br>' +
      (senderLines.length ? senderLines.join('<br>') : '<span style="color:#bbb;">adres…</span>') +
    '</div>' +
    recipientBlock +
    subjectLine +
    '<div style="margin-bottom:20px;">' + salutation + '</div>' +
    '<div style="margin-bottom:32px;">' + bodyHtml + '</div>' +
    '<div style="margin-bottom:6px;">Z poważaniem,</div>' +
    '<div style="margin-top:28px;"><b>' + esc(fullName || 'Imię Nazwisko') + '</b></div>';

  document.getElementById('lmPaper').innerHTML = html;
}

// ── Export ──
function downloadPdf() { window.print(); }
function getFullText() {
  var fn = val('fFirstName'), ln = val('fLastName');
  var fullName = [fn, ln].filter(Boolean).join(' ');
  var city = val('fCity');
  var today = new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long', year:'numeric'});
  var lines = [];
  lines.push((city || 'Miejscowość') + ', ' + today);
  lines.push('');
  lines.push(fullName);
  if (val('fStreet')) lines.push(val('fStreet'));
  var zpC = [val('fZip'), city].filter(Boolean).join(' ');
  if (zpC) lines.push(zpC);
  if (val('fEmail')) lines.push(val('fEmail'));
  if (val('fPhone')) lines.push(val('fPhone'));
  lines.push('');
  if (val('rCompany')) lines.push(val('rCompany'));
  if (val('rContact')) lines.push(val('rContact'));
  if (val('rStreet'))  lines.push(val('rStreet'));
  var rzc = [val('rZip'), val('rCity')].filter(Boolean).join(' ');
  if (rzc) lines.push(rzc);
  if (val('rCompany') || val('rContact')) lines.push('');
  if (val('fPos')) lines.push('Dotyczy: Aplikacja na stanowisko ' + val('fPos') + (val('fCompany') ? ' w firmie ' + val('fCompany') : ''));
  lines.push('');
  var sal = val('rContact') ? ('Szanowna Pani/Panie ' + val('rContact').split(' ').slice(-1)[0] + ',') : 'Szanowni Państwo,';
  lines.push(sal);
  lines.push('');
  lines.push(val('fBody') || '');
  lines.push('');
  lines.push('Z poważaniem,');
  lines.push('');
  lines.push(fullName);
  return lines.join('\n');
}

function copyText() {
  navigator.clipboard.writeText(getFullText()).then(function(){ showToast('Skopiowano!'); });
}

function downloadTxt() {
  var blob = new Blob([getFullText()], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'list-motywacyjny-' + (val('fCompany') || 'dokumo').replace(/\s+/g,'-').toLowerCase() + '.txt';
  a.click();
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:999px;font-size:.82rem;font-weight:600;z-index:9999;font-family:Figtree,sans-serif;pointer-events:none;';
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2200);
}
</script>
</body>
</html>
