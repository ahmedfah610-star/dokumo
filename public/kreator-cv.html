<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokumo – Kreator CV</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<!-- CV BUILDER -->
<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">

  <!-- NAV -->
  <div class="cv-page-nav">
    <button class="btn-back" onclick="window.location.href='dokumenty.html'">← Wróć</button>
    <a href="index.html" class="logo" style="font-size:1.3rem">Doku<span>mo</span> · Kreator CV</a>
    <div class="cv-tpl-bar" id="cvTplBar"></div>
  </div>

  <!-- LAYOUT -->
  <div class="cv-layout">
    <!-- FORM -->
    <div class="cv-form-panel" id="cvFormPanel"></div>

    <!-- PREVIEW -->
    <div class="cv-preview-panel">
      <div class="cv-preview-label">Podgląd na żywo · A4</div>
      <div class="cv-preview-wrap" id="cvPreviewInner"></div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="cv-bottom-bar visible">
  <div class="cv-price-tag">5 zł</div>
  <button class="btn-cv-pay" id="cvPayBtn" onclick="payAndDownloadCV()">Zapłać i pobierz PDF →</button>
  <div id="cvAfterPay" style="display:none;flex:1">
    <button class="btn-cv-download" onclick="downloadCV()">⬇ Pobierz PDF</button>
  </div>
</div>

<script>
// ======================================================
// KREATOR CV
// ======================================================

const CV_STRIPE = 'https://buy.stripe.com/test_28E4gB0uqbzf18o0Bs1Jm00';

const CV_TEMPLATES = [
  { id:'klasyczny',       name:'Klasyczny',       accent:'#1a3a2e' },
  { id:'nowoczesny',      name:'Nowoczesny',      accent:'#1a2744' },
  { id:'minimalistyczny', name:'Minimalistyczny', accent:'#111111' },
  { id:'kreatywny',       name:'Kreatywny',       accent:'#c0392b' },
];

let cvData = {
  imie:'', nazwisko:'', stanowisko:'', email:'', tel:'', adres:'', linkedin:'', www:'',
  podsumowanie:'',
  doswiadczenie:[{ firma:'', stanowisko:'', od:'', do:'', opis:'' }],
  wyksztalcenie:[{ szkola:'', kierunek:'', od:'', do:'', opis:'' }],
  umiejetnosci:'',
  jezyki:[{ jezyk:'', poziom:'B2' }],
  zainteresowania:''
};
let cvTemplate = 'klasyczny';
let cvPaid = new URLSearchParams(window.location.search).get('cv') === 'paid';

function openCV() {
  document.getElementById('cvPage').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderCVForm();
  updateCVPreview();
  if (cvPaid) {
    document.getElementById('cvPayBtn').style.display = 'none';
    document.getElementById('cvDownloadBtn').style.display = 'block';
  }
}

function closeCV() {
  document.getElementById('cvPage').style.display = 'none';
  document.body.style.overflow = '';
}

function setCVTemplate(id) {
  cvTemplate = id;
  document.querySelectorAll('.cv-tpl-btn').forEach(b => b.classList.toggle('active', b.dataset.tpl === id));
  updateCVPreview();
}

function renderCVForm() {
  const panel = document.getElementById('cvFormPanel');
  panel.innerHTML = `
    <div class="cvf-section-title">Dane osobowe</div>
    <div class="cvf-grid2">
      <div class="cvf-group"><label>Imię</label><input class="cvf-input" oninput="cvData.imie=this.value;updateCVPreview()" value="${cvData.imie}" placeholder="Jan"></div>
      <div class="cvf-group"><label>Nazwisko</label><input class="cvf-input" oninput="cvData.nazwisko=this.value;updateCVPreview()" value="${cvData.nazwisko}" placeholder="Kowalski"></div>
      <div class="cvf-group cvf-full"><label>Stanowisko / tytuł zawodowy</label><input class="cvf-input" oninput="cvData.stanowisko=this.value;updateCVPreview()" value="${cvData.stanowisko}" placeholder="Specjalista ds. marketingu"></div>
      <div class="cvf-group"><label>Email</label><input class="cvf-input" oninput="cvData.email=this.value;updateCVPreview()" value="${cvData.email}" placeholder="jan@kowalski.pl" type="email"></div>
      <div class="cvf-group"><label>Telefon</label><input class="cvf-input" oninput="cvData.tel=this.value;updateCVPreview()" value="${cvData.tel}" placeholder="+48 600 000 000"></div>
      <div class="cvf-group cvf-full"><label>Adres</label><input class="cvf-input" oninput="cvData.adres=this.value;updateCVPreview()" value="${cvData.adres}" placeholder="Warszawa"></div>
      <div class="cvf-group"><label>LinkedIn (opcjonalnie)</label><input class="cvf-input" oninput="cvData.linkedin=this.value;updateCVPreview()" value="${cvData.linkedin}" placeholder="linkedin.com/in/jan-kowalski"></div>
      <div class="cvf-group"><label>Strona www (opcjonalnie)</label><input class="cvf-input" oninput="cvData.www=this.value;updateCVPreview()" value="${cvData.www}" placeholder="jankowalski.pl"></div>
    </div>

    <div class="cvf-section-title" style="margin-top:24px">Podsumowanie zawodowe</div>
    <div class="cvf-group">
      <textarea class="cvf-input" rows="3" oninput="cvData.podsumowanie=this.value;updateCVPreview()" placeholder="Krótki opis Twoich kompetencji i celów zawodowych (2-4 zdania)...">${cvData.podsumowanie}</textarea>
    </div>

    <div class="cvf-section-title" style="margin-top:24px">Doświadczenie zawodowe
      <button class="cvf-add-btn" onclick="addCVExp()">+ Dodaj</button>
    </div>
    <div id="cvExpList">
      ${cvData.doswiadczenie.map((e,i) => `
        <div class="cvf-card" id="cvExp${i}">
          <div class="cvf-grid2">
            <div class="cvf-group cvf-full"><label>Firma</label><input class="cvf-input" oninput="cvData.doswiadczenie[${i}].firma=this.value;updateCVPreview()" value="${e.firma}" placeholder="Google Polska"></div>
            <div class="cvf-group cvf-full"><label>Stanowisko</label><input class="cvf-input" oninput="cvData.doswiadczenie[${i}].stanowisko=this.value;updateCVPreview()" value="${e.stanowisko}" placeholder="Marketing Manager"></div>
            <div class="cvf-group"><label>Od</label><input class="cvf-input" oninput="cvData.doswiadczenie[${i}].od=this.value;updateCVPreview()" value="${e.od}" placeholder="01.2022"></div>
            <div class="cvf-group"><label>Do</label><input class="cvf-input" oninput="cvData.doswiadczenie[${i}].do=this.value;updateCVPreview()" value="${e.do}" placeholder="obecnie"></div>
            <div class="cvf-group cvf-full"><label>Opis obowiązków</label><textarea class="cvf-input" rows="2" oninput="cvData.doswiadczenie[${i}].opis=this.value;updateCVPreview()" placeholder="Zarządzanie kampaniami, analityka...">${e.opis}</textarea></div>
          </div>
          ${i>0?`<button class="cvf-remove-btn" onclick="removeCVExp(${i})">✕ Usuń</button>`:''}
        </div>
      `).join('')}
    </div>

    <div class="cvf-section-title" style="margin-top:24px">Wykształcenie
      <button class="cvf-add-btn" onclick="addCVEdu()">+ Dodaj</button>
    </div>
    <div id="cvEduList">
      ${cvData.wyksztalcenie.map((e,i) => `
        <div class="cvf-card" id="cvEdu${i}">
          <div class="cvf-grid2">
            <div class="cvf-group cvf-full"><label>Uczelnia / szkoła</label><input class="cvf-input" oninput="cvData.wyksztalcenie[${i}].szkola=this.value;updateCVPreview()" value="${e.szkola}" placeholder="Uniwersytet Warszawski"></div>
            <div class="cvf-group cvf-full"><label>Kierunek / tytuł</label><input class="cvf-input" oninput="cvData.wyksztalcenie[${i}].kierunek=this.value;updateCVPreview()" value="${e.kierunek}" placeholder="Finanse i Rachunkowość, lic."></div>
            <div class="cvf-group"><label>Od</label><input class="cvf-input" oninput="cvData.wyksztalcenie[${i}].od=this.value;updateCVPreview()" value="${e.od}" placeholder="2020"></div>
            <div class="cvf-group"><label>Do</label><input class="cvf-input" oninput="cvData.wyksztalcenie[${i}].do=this.value;updateCVPreview()" value="${e.do}" placeholder="2023"></div>
          </div>
          ${i>0?`<button class="cvf-remove-btn" onclick="removeCVEdu(${i})">✕ Usuń</button>`:''}
        </div>
      `).join('')}
    </div>

    <div class="cvf-section-title" style="margin-top:24px">Umiejętności</div>
    <div class="cvf-group">
      <input class="cvf-input" oninput="cvData.umiejetnosci=this.value;updateCVPreview()" value="${cvData.umiejetnosci}" placeholder="Excel, Python, Photoshop, zarządzanie projektami...">
      <small style="color:var(--muted);font-size:0.7rem">Oddzielaj przecinkami</small>
    </div>

    <div class="cvf-section-title" style="margin-top:24px">Języki
      <button class="cvf-add-btn" onclick="addCVLang()">+ Dodaj</button>
    </div>
    <div id="cvLangList">
      ${cvData.jezyki.map((l,i) => `
        <div class="cvf-grid2" style="margin-bottom:8px">
          <div class="cvf-group"><input class="cvf-input" oninput="cvData.jezyki[${i}].jezyk=this.value;updateCVPreview()" value="${l.jezyk}" placeholder="Angielski"></div>
          <div class="cvf-group">
            <select class="cvf-input" onchange="cvData.jezyki[${i}].poziom=this.value;updateCVPreview()">
              ${['A1','A2','B1','B2','C1','C2','Ojczysty'].map(p=>`<option${l.poziom===p?' selected':''}>${p}</option>`).join('')}
            </select>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="cvf-section-title" style="margin-top:24px">Zainteresowania (opcjonalnie)</div>
    <div class="cvf-group">
      <input class="cvf-input" oninput="cvData.zainteresowania=this.value;updateCVPreview()" value="${cvData.zainteresowania}" placeholder="fotografia, finanse osobiste, sport...">
    </div>
  `;
}

function addCVExp() {
  cvData.doswiadczenie.push({ firma:'', stanowisko:'', od:'', do:'', opis:'' });
  renderCVForm();
}
function removeCVExp(i) {
  cvData.doswiadczenie.splice(i,1);
  renderCVForm(); updateCVPreview();
}
function addCVEdu() {
  cvData.wyksztalcenie.push({ szkola:'', kierunek:'', od:'', do:'', opis:'' });
  renderCVForm();
}
function removeCVEdu(i) {
  cvData.wyksztalcenie.splice(i,1);
  renderCVForm(); updateCVPreview();
}
function addCVLang() {
  cvData.jezyki.push({ jezyk:'', poziom:'B2' });
  renderCVForm();
}

function updateCVPreview() {
  const el = document.getElementById('cvPreviewInner');
  if (!el) return;
  el.innerHTML = buildCVHTML(cvTemplate);
}

function buildCVHTML(tpl) {
  const d = cvData;
  const fullName = [d.imie, d.nazwisko].filter(Boolean).join(' ') || 'Twoje Imię i Nazwisko';
  const skills = d.umiejetnosci ? d.umiejetnosci.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const contact = [d.email,d.tel,d.adres,d.linkedin,d.www].filter(Boolean);

  if (tpl === 'klasyczny') return `
    <div style="font-family:'Georgia',serif;padding:40px;background:#fff;min-height:100%">
      <div style="text-align:center;border-bottom:2px solid #1a3a2e;padding-bottom:16px;margin-bottom:20px">
        <div style="font-size:26px;font-weight:bold;letter-spacing:1px;color:#1a3a2e">${fullName}</div>
        ${d.stanowisko?`<div style="font-size:13px;color:#666;margin-top:4px;font-style:italic">${d.stanowisko}</div>`:''}
        <div style="font-size:10px;color:#555;margin-top:8px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap">${contact.map(c=>`<span>${c}</span>`).join(' · ')}</div>
      </div>
      ${d.podsumowanie?`<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#1a3a2e;margin-bottom:6px">Podsumowanie</div><div style="font-size:10.5px;line-height:1.6;color:#333">${d.podsumowanie}</div></div>`:''}
      ${d.doswiadczenie.some(e=>e.firma)||d.doswiadczenie.some(e=>e.stanowisko)?`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#1a3a2e;margin-bottom:8px">Doświadczenie zawodowe</div>
        ${d.doswiadczenie.filter(e=>e.firma||e.stanowisko).map(e=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <div style="font-size:11px;font-weight:bold;color:#222">${e.stanowisko||''}</div>
              <div style="font-size:9.5px;color:#888">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
            </div>
            <div style="font-size:10px;color:#555;font-style:italic">${e.firma||''}</div>
            ${e.opis?`<div style="font-size:10px;color:#444;margin-top:3px;line-height:1.5">${e.opis}</div>`:''}
          </div>`).join('')}
      </div>`:''}
      ${d.wyksztalcenie.some(e=>e.szkola)?`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#1a3a2e;margin-bottom:8px">Wykształcenie</div>
        ${d.wyksztalcenie.filter(e=>e.szkola).map(e=>`
          <div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between">
              <div style="font-size:11px;font-weight:bold;color:#222">${e.kierunek||''}</div>
              <div style="font-size:9.5px;color:#888">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
            </div>
            <div style="font-size:10px;color:#555;font-style:italic">${e.szkola}</div>
          </div>`).join('')}
      </div>`:''}
      ${skills.length?`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#1a3a2e;margin-bottom:8px">Umiejętności</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${skills.map(s=>`<span style="background:#f0f4f2;border:1px solid #c8d8d2;padding:2px 8px;font-size:9.5px;color:#1a3a2e">${s}</span>`).join('')}</div>
      </div>`:''}
      ${d.jezyki.some(l=>l.jezyk)?`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#1a3a2e;margin-bottom:8px">Języki</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">${d.jezyki.filter(l=>l.jezyk).map(l=>`<span style="font-size:10px"><strong>${l.jezyk}</strong> – ${l.poziom}</span>`).join('')}</div>
      </div>`:''}
      ${d.zainteresowania?`
      <div>
        <div style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#1a3a2e;margin-bottom:6px">Zainteresowania</div>
        <div style="font-size:10px;color:#444">${d.zainteresowania}</div>
      </div>`:''}
      <div style="margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:8.5px;color:#aaa;text-align:center">Wyrażam zgodę na przetwarzanie moich danych osobowych dla potrzeb rekrutacji.</div>
    </div>`;

  if (tpl === 'nowoczesny') return `
    <div style="font-family:'Arial',sans-serif;display:flex;min-height:100%;background:#fff">
      <div style="width:38%;background:#1a2744;padding:32px 24px;color:#fff;flex-shrink:0">
        <div style="margin-bottom:24px">
          <div style="font-size:20px;font-weight:bold;line-height:1.2;color:#fff">${fullName}</div>
          ${d.stanowisko?`<div style="font-size:10px;color:#90aad4;margin-top:6px;text-transform:uppercase;letter-spacing:1px">${d.stanowisko}</div>`:''}
        </div>
        <div style="margin-bottom:20px">
          <div style="font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#90aad4;margin-bottom:8px;border-bottom:1px solid #2d3f6e;padding-bottom:4px">Kontakt</div>
          ${contact.map(c=>`<div style="font-size:9.5px;color:#d0ddf0;margin-bottom:4px">${c}</div>`).join('')}
        </div>
        ${skills.length?`
        <div style="margin-bottom:20px">
          <div style="font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#90aad4;margin-bottom:8px;border-bottom:1px solid #2d3f6e;padding-bottom:4px">Umiejętności</div>
          ${skills.map(s=>`<div style="font-size:9.5px;color:#d0ddf0;margin-bottom:4px;display:flex;align-items:center;gap:6px"><span style="width:4px;height:4px;background:#90aad4;border-radius:50%;flex-shrink:0;display:inline-block"></span>${s}</div>`).join('')}
        </div>`:''}
        ${d.jezyki.some(l=>l.jezyk)?`
        <div style="margin-bottom:20px">
          <div style="font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#90aad4;margin-bottom:8px;border-bottom:1px solid #2d3f6e;padding-bottom:4px">Języki</div>
          ${d.jezyki.filter(l=>l.jezyk).map(l=>`<div style="font-size:9.5px;color:#d0ddf0;margin-bottom:3px">${l.jezyk} <span style="color:#90aad4">– ${l.poziom}</span></div>`).join('')}
        </div>`:''}
        ${d.zainteresowania?`
        <div>
          <div style="font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#90aad4;margin-bottom:8px;border-bottom:1px solid #2d3f6e;padding-bottom:4px">Zainteresowania</div>
          <div style="font-size:9.5px;color:#d0ddf0">${d.zainteresowania}</div>
        </div>`:''}
      </div>
      <div style="flex:1;padding:32px 28px">
        ${d.podsumowanie?`<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#1a2744;margin-bottom:8px;border-bottom:2px solid #1a2744;padding-bottom:4px">Profil zawodowy</div><div style="font-size:10px;line-height:1.65;color:#444">${d.podsumowanie}</div></div>`:''}
        ${d.doswiadczenie.some(e=>e.firma||e.stanowisko)?`
        <div style="margin-bottom:20px">
          <div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#1a2744;margin-bottom:10px;border-bottom:2px solid #1a2744;padding-bottom:4px">Doświadczenie</div>
          ${d.doswiadczenie.filter(e=>e.firma||e.stanowisko).map(e=>`
            <div style="margin-bottom:12px;padding-left:10px;border-left:2px solid #d0dae8">
              <div style="font-size:10.5px;font-weight:bold;color:#1a2744">${e.stanowisko||''}</div>
              <div style="display:flex;justify-content:space-between"><div style="font-size:9.5px;color:#555">${e.firma||''}</div><div style="font-size:9px;color:#999">${[e.od,e.do].filter(Boolean).join(' – ')}</div></div>
              ${e.opis?`<div style="font-size:9.5px;color:#555;margin-top:3px;line-height:1.5">${e.opis}</div>`:''}
            </div>`).join('')}
        </div>`:''}
        ${d.wyksztalcenie.some(e=>e.szkola)?`
        <div>
          <div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;color:#1a2744;margin-bottom:10px;border-bottom:2px solid #1a2744;padding-bottom:4px">Wykształcenie</div>
          ${d.wyksztalcenie.filter(e=>e.szkola).map(e=>`
            <div style="margin-bottom:10px;padding-left:10px;border-left:2px solid #d0dae8">
              <div style="font-size:10.5px;font-weight:bold;color:#1a2744">${e.kierunek||''}</div>
              <div style="display:flex;justify-content:space-between"><div style="font-size:9.5px;color:#555">${e.szkola}</div><div style="font-size:9px;color:#999">${[e.od,e.do].filter(Boolean).join(' – ')}</div></div>
            </div>`).join('')}
        </div>`:''}
      </div>
    </div>`;

  if (tpl === 'minimalistyczny') return `
    <div style="font-family:'Helvetica Neue',Arial,sans-serif;padding:48px 52px;background:#fff;min-height:100%">
      <div style="margin-bottom:32px">
        <div style="font-size:30px;font-weight:300;letter-spacing:-0.5px;color:#111">${fullName}</div>
        ${d.stanowisko?`<div style="font-size:12px;color:#888;margin-top:4px;letter-spacing:2px;text-transform:uppercase">${d.stanowisko}</div>`:''}
        <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap">${contact.map(c=>`<span style="font-size:9.5px;color:#777">${c}</span>`).join('')}</div>
      </div>
      ${d.podsumowanie?`
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid #eee">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#bbb;margin-bottom:10px">O mnie</div>
        <div style="font-size:10.5px;line-height:1.8;color:#444;max-width:480px">${d.podsumowanie}</div>
      </div>`:''}
      ${d.doswiadczenie.some(e=>e.firma||e.stanowisko)?`
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid #eee">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#bbb;margin-bottom:16px">Doświadczenie</div>
        ${d.doswiadczenie.filter(e=>e.firma||e.stanowisko).map(e=>`
          <div style="display:flex;gap:20px;margin-bottom:14px">
            <div style="font-size:9px;color:#bbb;white-space:nowrap;padding-top:2px;min-width:70px">${[e.od,e.do].filter(Boolean).join('–')}</div>
            <div>
              <div style="font-size:11px;font-weight:600;color:#111">${e.stanowisko||''}</div>
              <div style="font-size:10px;color:#888">${e.firma||''}</div>
              ${e.opis?`<div style="font-size:9.5px;color:#666;margin-top:3px;line-height:1.6">${e.opis}</div>`:''}
            </div>
          </div>`).join('')}
      </div>`:''}
      ${d.wyksztalcenie.some(e=>e.szkola)?`
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid #eee">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#bbb;margin-bottom:16px">Wykształcenie</div>
        ${d.wyksztalcenie.filter(e=>e.szkola).map(e=>`
          <div style="display:flex;gap:20px;margin-bottom:10px">
            <div style="font-size:9px;color:#bbb;white-space:nowrap;padding-top:2px;min-width:70px">${[e.od,e.do].filter(Boolean).join('–')}</div>
            <div>
              <div style="font-size:11px;font-weight:600;color:#111">${e.kierunek||''}</div>
              <div style="font-size:10px;color:#888">${e.szkola}</div>
            </div>
          </div>`).join('')}
      </div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px">
        ${skills.length?`
        <div>
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#bbb;margin-bottom:10px">Umiejętności</div>
          ${skills.map(s=>`<div style="font-size:10px;color:#444;margin-bottom:4px">— ${s}</div>`).join('')}
        </div>`:''}
        ${d.jezyki.some(l=>l.jezyk)?`
        <div>
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#bbb;margin-bottom:10px">Języki</div>
          ${d.jezyki.filter(l=>l.jezyk).map(l=>`<div style="font-size:10px;color:#444;margin-bottom:4px">${l.jezyk} <span style="color:#bbb">– ${l.poziom}</span></div>`).join('')}
        </div>`:''}
      </div>
      <div style="margin-top:40px;font-size:8px;color:#ccc;text-align:center">Wyrażam zgodę na przetwarzanie moich danych osobowych dla potrzeb rekrutacji.</div>
    </div>`;

  if (tpl === 'kreatywny') return `
    <div style="font-family:'Arial',sans-serif;background:#fff;min-height:100%">
      <div style="background:linear-gradient(135deg,#c0392b,#922b21);padding:32px 40px;color:#fff">
        <div style="font-size:24px;font-weight:bold">${fullName}</div>
        ${d.stanowisko?`<div style="font-size:11px;opacity:0.85;margin-top:4px;letter-spacing:1px">${d.stanowisko}</div>`:''}
        <div style="margin-top:12px;display:flex;gap:14px;flex-wrap:wrap">${contact.map(c=>`<span style="font-size:9px;opacity:0.9;background:rgba(255,255,255,0.15);padding:2px 8px">${c}</span>`).join('')}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
        <div style="padding:28px 24px 28px 40px;border-right:1px solid #f0f0f0">
          ${d.podsumowanie?`<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#c0392b;margin-bottom:6px;display:flex;align-items:center;gap:6px"><span style="width:16px;height:2px;background:#c0392b;display:inline-block"></span>Profil</div><div style="font-size:10px;line-height:1.65;color:#444">${d.podsumowanie}</div></div>`:''}
          ${d.doswiadczenie.some(e=>e.firma||e.stanowisko)?`
          <div>
            <div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#c0392b;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="width:16px;height:2px;background:#c0392b;display:inline-block"></span>Doświadczenie</div>
            ${d.doswiadczenie.filter(e=>e.firma||e.stanowisko).map(e=>`
              <div style="margin-bottom:12px">
                <div style="font-size:10.5px;font-weight:bold;color:#222">${e.stanowisko||''}</div>
                <div style="font-size:9.5px;color:#c0392b">${e.firma||''}</div>
                <div style="font-size:9px;color:#999">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
                ${e.opis?`<div style="font-size:9.5px;color:#555;margin-top:3px;line-height:1.5">${e.opis}</div>`:''}
              </div>`).join('')}
          </div>`:''}
        </div>
        <div style="padding:28px 40px 28px 24px">
          ${d.wyksztalcenie.some(e=>e.szkola)?`
          <div style="margin-bottom:20px">
            <div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#c0392b;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="width:16px;height:2px;background:#c0392b;display:inline-block"></span>Wykształcenie</div>
            ${d.wyksztalcenie.filter(e=>e.szkola).map(e=>`
              <div style="margin-bottom:10px">
                <div style="font-size:10.5px;font-weight:bold;color:#222">${e.kierunek||''}</div>
                <div style="font-size:9.5px;color:#555">${e.szkola}</div>
                <div style="font-size:9px;color:#999">${[e.od,e.do].filter(Boolean).join(' – ')}</div>
              </div>`).join('')}
          </div>`:''}
          ${skills.length?`
          <div style="margin-bottom:20px">
            <div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#c0392b;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span style="width:16px;height:2px;background:#c0392b;display:inline-block"></span>Umiejętności</div>
            ${skills.map(s=>`<div style="font-size:9.5px;background:#fdf2f2;padding:3px 8px;margin-bottom:3px;color:#333">${s}</div>`).join('')}
          </div>`:''}
          ${d.jezyki.some(l=>l.jezyk)?`
          <div>
            <div style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#c0392b;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span style="width:16px;height:2px;background:#c0392b;display:inline-block"></span>Języki</div>
            ${d.jezyki.filter(l=>l.jezyk).map(l=>`<div style="font-size:10px;color:#444;margin-bottom:4px">${l.jezyk} – <span style="color:#888">${l.poziom}</span></div>`).join('')}
          </div>`:''}
        </div>
      </div>
      <div style="padding:10px 40px;background:#fafafa;border-top:1px solid #eee;font-size:8px;color:#bbb;text-align:center">Wyrażam zgodę na przetwarzanie moich danych osobowych dla potrzeb rekrutacji.</div>
    </div>`;

  return '';
}

function downloadCV() {
  const el = document.getElementById('cvPreviewInner');
  const opt = {
    margin: 0,
    filename: 'CV_' + (cvData.imie||'') + '_' + (cvData.nazwisko||'') + '.pdf',
    image: { type:'jpeg', quality:0.98 },
    html2canvas: { scale:2, useCORS:true },
    jsPDF: { unit:'px', format:[595,842], orientation:'portrait' }
  };
  html2pdf().set(opt).from(el).save();
}

function payAndDownloadCV() {
  // Otwórz Stripe w nowej karcie z parametrem success
  const successUrl = encodeURIComponent(window.location.origin + window.location.pathname + '?cv=paid');
  window.open(CV_STRIPE, '_blank');
  // Po 3s pokaż przycisk pobierania (użytkownik wraca po płatności)
  document.getElementById('cvPayBtn').style.display = 'none';
  document.getElementById('cvAfterPay').style.display = 'block';
}

function confirmAndDownload() {
  downloadCV();
}

// ---- INIT ----
// Template buttons
(function() {
  const bar = document.getElementById('cvTplBar');
  bar.innerHTML = CV_TEMPLATES.map(t =>
    `<button class="cv-tpl-btn${t.id===cvTemplate?' active':''}" data-tpl="${t.id}" onclick="setCVTemplate('${t.id}')">${t.name}</button>`
  ).join('');
})();

// Init form and preview
renderCVForm();
updateCVPreview();

// Check if paid (Stripe redirect)
if (new URLSearchParams(window.location.search).get('cv') === 'paid') {
  document.getElementById('cvPayBtn').style.display = 'none';
  document.getElementById('cvAfterPay').style.display = 'flex';
}

function payAndDownloadCV() {
  window.open(CV_STRIPE, '_blank');
  document.getElementById('cvPayBtn').style.display = 'none';
  document.getElementById('cvAfterPay').style.display = 'flex';
}

function downloadCV() {
  const el = document.getElementById('cvPreviewInner');
  const opt = {
    margin: 0,
    filename: 'CV_' + (cvData.imie||'Imie') + '_' + (cvData.nazwisko||'Nazwisko') + '.pdf',
    image: { type:'jpeg', quality:0.98 },
    html2canvas: { scale:2, useCORS:true },
    jsPDF: { unit:'px', format:[595,842], orientation:'portrait' }
  };
  html2pdf().set(opt).from(el).save();
}
</script>
