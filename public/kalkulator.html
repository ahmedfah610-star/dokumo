<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Wynagrodzeń – Dokumo</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root {
  --bg: #f5f3ef;
  --ink: #1a1714;
  --ink2: #6b6560;
  --cream: #faf8f4;
  --green: #1a3a2e;
  --gold: #c9903a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; }

.k-nav {
  background: var(--cream);
  border-bottom: 1px solid rgba(26,23,20,.08);
  position: sticky; top: 0; z-index: 50;
  padding: 0 2rem; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
}
.k-logo { display:flex;align-items:center;gap:8px;text-decoration:none;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.1rem;color:var(--ink);letter-spacing:-.02em; }
.k-logo-dot { width:28px;height:28px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center; }
.k-back { font-size:.78rem;font-weight:500;color:var(--ink2);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .2s; }
.k-back:hover { color:var(--ink); }

.page-wrap {
  max-width: 620px;
  margin: 0 auto;
  padding: 56px 2rem 80px;
}
.page-eyebrow {
  display:inline-flex;align-items:center;gap:6px;
  font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);margin-bottom:20px;
}
.page-title {
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:clamp(1.8rem,4vw,2.6rem);
  font-weight:800;letter-spacing:-.03em;
  color:var(--ink);margin-bottom:10px;line-height:1.1;
}
.page-sub { font-size:.9rem;color:var(--ink2);margin-bottom:40px;line-height:1.6; }

.k-field { margin-bottom:18px; }
.k-label { display:block;font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px; }
.k-input { width:100%;padding:14px 16px;background:#fff;border:1.5px solid rgba(26,23,20,.1);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--ink);outline:none;transition:border-color .2s;appearance:none; }
.k-input:focus { border-color:var(--ink); }
.k-row { display:grid;grid-template-columns:1fr 1fr;gap:14px; }

.k-calc-btn {
  width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:14px;
  font-family:'Bricolage Grotesque',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.01em;
  cursor:pointer;transition:background .2s,transform .1s;margin-top:8px;
}
.k-calc-btn:hover { background:#2d2824; }
.k-calc-btn:active { transform:scale(.98); }

.k-result {
  margin-top:28px;background:var(--ink);border-radius:18px;padding:28px;display:none;
}
.k-result.show { display:block; }
.k-result-label { font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px; }
.k-result-amount { font-family:'Bricolage Grotesque',sans-serif;font-size:2.4rem;font-weight:800;color:#fff;letter-spacing:-.03em;margin-bottom:20px; }
.k-result-breakdown { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.k-result-item { background:rgba(255,255,255,.07);border-radius:10px;padding:12px 14px; }
.k-result-item-label { font-size:.7rem;color:rgba(255,255,255,.4);margin-bottom:3px; }
.k-result-item-val { font-size:.95rem;font-weight:600;color:rgba(255,255,255,.85); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.page-wrap { animation:fadeUp .45s ease both; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const auth = getAuth(initializeApp({
    apiKey:"AIzaSyAzeUjHGu7gbgWK3lY_400RXDJGS6bmbBo",
    authDomain:"dokumo-c1ccb.firebaseapp.com",
    projectId:"dokumo-c1ccb",
    storageBucket:"dokumo-c1ccb.firebasestorage.app",
    messagingSenderId:"1088576029067",
    appId:"1:1088576029067:web:e99734e4d50b398aa92f8e"
  }));
  onAuthStateChanged(auth, user => {
    if (user) { localStorage.setItem('dokumo_user', JSON.stringify({name:user.displayName||'',email:user.email||'',photo:user.photoURL||''})); }
    else { localStorage.removeItem('dokumo_user'); }
    if (typeof updateNavAuth==='function') updateNavAuth();
    if (typeof updateNavBadge==='function') updateNavBadge();
  });
</script>
</head>
<body>

<nav class="k-nav">
  <a href="index.html" class="k-logo">
    <div class="k-logo-dot">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>
    Dokumo
  </a>
  <a href="kariera.html" class="k-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Strefa Kariery
  </a>
</nav>

<div class="page-wrap">
  <div class="page-eyebrow">💰 Zarobki</div>
  <h1 class="page-title">Kalkulator<br>wynagrodzeń</h1>
  <p class="page-sub">Oblicz wynagrodzenie netto na podstawie brutto. Uwzględniamy ZUS, podatek i ulgę dla pracowników.</p>

  <div class="k-row">
    <div class="k-field">
      <label class="k-label">Wynagrodzenie brutto</label>
      <input type="number" id="calcBrutto" class="k-input" placeholder="np. 6000" min="0">
    </div>
    <div class="k-field">
      <label class="k-label">Typ umowy</label>
      <select id="calcTyp" class="k-input">
        <option value="uop">Umowa o pracę</option>
        <option value="b2b">B2B (własna działalność)</option>
        <option value="zlecenie">Umowa zlecenie</option>
      </select>
    </div>
  </div>

  <div class="k-row">
    <div class="k-field">
      <label class="k-label">Wiek pracownika</label>
      <select id="calcWiek" class="k-input">
        <option value="do26">Do 26 lat (zerowy PIT)</option>
        <option value="26plus" selected>Powyżej 26 lat</option>
      </select>
    </div>
    <div class="k-field">
      <label class="k-label">Próg podatkowy</label>
      <select id="calcProg" class="k-input">
        <option value="12">12% (do 120 000 zł)</option>
        <option value="32">32% (powyżej 120 000 zł)</option>
      </select>
    </div>
  </div>

  <button class="k-calc-btn" onclick="obliczNetto()">Oblicz wynagrodzenie netto →</button>

  <div class="k-result" id="calcResult">
    <div class="k-result-label">Wynagrodzenie netto</div>
    <div class="k-result-amount" id="resultNetto">— zł</div>
    <div class="k-result-breakdown">
      <div class="k-result-item">
        <div class="k-result-item-label">Składki ZUS</div>
        <div class="k-result-item-val" id="resultZUS">—</div>
      </div>
      <div class="k-result-item">
        <div class="k-result-item-label">Składka zdrowotna</div>
        <div class="k-result-item-val" id="resultZdrowotna">—</div>
      </div>
      <div class="k-result-item">
        <div class="k-result-item-label">Zaliczka na podatek</div>
        <div class="k-result-item-val" id="resultPodatek">—</div>
      </div>
      <div class="k-result-item">
        <div class="k-result-item-label">Podstawa opodatkowania</div>
        <div class="k-result-item-val" id="resultPodstawa">—</div>
      </div>
    </div>
  </div>
</div>

<script>
function getUser() { try { return JSON.parse(localStorage.getItem('dokumo_user')); } catch(e) { return null; } }
function clearUser() { localStorage.removeItem('dokumo_user'); }
function updateNavAuth() {}
function updateNavBadge() {}
function logoutUser() { clearUser(); localStorage.removeItem('dokumo_sub'); window.location.href='index.html'; }

function obliczNetto() {
  const brutto = parseFloat(document.getElementById('calcBrutto').value);
  if (!brutto || brutto <= 0) { document.getElementById('calcBrutto').focus(); return; }
  const typ = document.getElementById('calcTyp').value;
  const wiek = document.getElementById('calcWiek').value;
  const prog = parseInt(document.getElementById('calcProg').value);
  let zus=0, zdrowotna=0, podatek=0, netto=0, podstawa=0;

  if (typ === 'uop') {
    zus = brutto * (0.0976 + 0.015 + 0.0245);
    zdrowotna = (brutto - zus) * 0.09;
    podstawa = Math.round(brutto - zus - 250);
    podatek = wiek==='do26' ? 0 : Math.max(0, Math.round(podstawa*(prog/100)-300));
    netto = brutto - zus - zdrowotna - podatek;
  } else if (typ === 'zlecenie') {
    zus = brutto * 0.1371;
    zdrowotna = (brutto - zus) * 0.09;
    podstawa = Math.round(brutto - zus - (brutto - zus)*0.2);
    podatek = wiek==='do26' ? 0 : Math.round(podstawa*(prog/100));
    netto = brutto - zus - zdrowotna - podatek;
  } else {
    zus = 381.81;
    zdrowotna = brutto * 0.049;
    podstawa = brutto - zus;
    podatek = Math.round(podstawa*(prog/100));
    netto = brutto - zus - zdrowotna - podatek;
  }

  const fmt = v => Math.round(v).toLocaleString('pl-PL') + ' zł';
  document.getElementById('resultNetto').textContent = fmt(netto);
  document.getElementById('resultZUS').textContent = fmt(zus);
  document.getElementById('resultZdrowotna').textContent = fmt(zdrowotna);
  document.getElementById('resultPodatek').textContent = fmt(podatek);
  document.getElementById('resultPodstawa').textContent = fmt(podstawa);
  const r = document.getElementById('calcResult');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth',block:'nearest'});
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('calcBrutto')?.addEventListener('keydown', e => { if(e.key==='Enter') obliczNetto(); });
});
</script>
</body>
</html>
