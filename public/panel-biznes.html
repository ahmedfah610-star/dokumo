<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="logo2.png">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel biznesu – Dokumo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,Segoe UI,sans-serif;}
body{background:#f5f3ef;color:#1a1714;min-height:100vh;}
.wrap{max-width:960px;margin:0 auto;padding:24px 20px 60px;}
h1{font-size:1.45rem;font-weight:800;margin-bottom:3px;}
.sub{font-size:.82rem;color:#6b6560;margin-bottom:16px;}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.links{display:flex;gap:14px;flex-wrap:wrap;}
.link{font-size:.8rem;color:#1a1714;font-weight:600;text-decoration:none;border-bottom:1px solid #cfc9c0;}
.debug-banner{background:#fef9c3;color:#854d0e;border:1px solid #fde68a;border-radius:10px;padding:9px 13px;font-size:.78rem;font-weight:600;margin-bottom:14px;}
.attn{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.attn-card{background:#fff;border:1px solid rgba(26,23,20,.1);border-radius:12px;padding:12px 16px;flex:1;min-width:150px;}
.attn-num{font-size:1.5rem;font-weight:800;line-height:1;}
.attn-lbl{font-size:.7rem;color:#6b6560;margin-top:4px;}
.attn-red .attn-num{color:#b91c1c;}
.attn-amber .attn-num{color:#b45309;}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:6px 13px;border-radius:999px;border:1px solid rgba(26,23,20,.15);background:#fff;font-size:.76rem;font-weight:600;cursor:pointer;color:#6b6560;}
.chip.active{background:#1a1714;color:#fff;border-color:#1a1714;}
.card{background:#fff;border:1px solid rgba(26,23,20,.1);border-radius:13px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .12s;}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,.07);}
.card-ico{font-size:1.5rem;flex-shrink:0;}
.card-mid{flex:1;min-width:0;}
.card-name{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:.74rem;color:#9b948c;margin-top:2px;}
.badge{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0;}
.b-none{background:#f0ede8;color:#9b948c;}
.b-ok{background:#dcfce7;color:#15803d;}
.b-soon{background:#fef3c7;color:#b45309;}
.b-over{background:#fee2e2;color:#b91c1c;}
.empty,.loading,.error{padding:48px;text-align:center;color:#9b948c;font-size:.88rem;}
.error{color:#b91c1c;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;padding:20px;overflow-y:auto;}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:#fff;border-radius:16px;max-width:600px;width:100%;margin:auto;padding:22px;}
.modal h2{font-size:1.05rem;font-weight:800;margin-bottom:2px;}
.modal .mtype{font-size:.74rem;color:#9b948c;margin-bottom:14px;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b6560;margin-bottom:5px;}
.fld input,.fld textarea{width:100%;padding:9px 12px;border:1px solid rgba(26,23,20,.18);border-radius:9px;font-size:.85rem;font-family:inherit;outline:none;}
.fld input:focus,.fld textarea:focus{border-color:#1a1714;}
.preview{background:#faf8f4;border:1px solid rgba(26,23,20,.1);border-radius:10px;padding:12px 14px;font-size:.8rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:230px;overflow-y:auto;font-family:ui-monospace,Menlo,Consolas,monospace;color:#3a3330;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.row .fld{flex:1;min-width:160px;}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.btn{padding:9px 17px;border-radius:9px;border:none;cursor:pointer;font-size:.8rem;font-weight:700;font-family:inherit;}
.btn-dark{background:#1a1714;color:#fff;}.btn-dark:hover{background:#3a3330;}
.btn-light{background:#f0ede8;color:#1a1714;}.btn-light:hover{background:#e5e1da;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.msg{font-size:.8rem;padding:8px 12px;border-radius:8px;margin-top:10px;display:none;}
.msg.ok{background:#dcfce7;color:#15803d;display:block;}
.msg.err{background:#fee2e2;color:#b91c1c;display:block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Panel biznesu</h1>
      <div class="sub">Twoje dokumenty, terminy i wysyłka — w jednym miejscu</div>
    </div>
    <div class="links">
      <a class="link" href="/panel-windykacja.html">AI Windykator →</a>
      <a class="link" href="/panel-faktury-test.html">Faktury testowe →</a>
    </div>
  </div>
  <div class="debug-banner" id="debugBanner" style="display:none">⚠️ TRYB TESTOWY — maile NIE są wysyłane (zmień DUNNING_DEBUG_MODE, by włączyć wysyłkę).</div>

  <div class="attn" id="attn" style="display:none">
    <div class="attn-card attn-red"><div class="attn-num" id="cntOver">0</div><div class="attn-lbl">po terminie</div></div>
    <div class="attn-card attn-amber"><div class="attn-num" id="cntSoon">0</div><div class="attn-lbl">termin w 7 dni</div></div>
    <div class="attn-card"><div class="attn-num" id="cntAll">0</div><div class="attn-lbl">dokumentów łącznie</div></div>
  </div>

  <div class="chips" id="chips"></div>
  <div id="content" class="loading">Ładowanie…</div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="mName">—</h2>
    <div class="mtype" id="mType"></div>
    <div class="fld">
      <label>Podgląd treści</label>
      <div class="preview" id="mPreview"></div>
    </div>
    <div class="row">
      <div class="fld"><label>Termin</label><input type="date" id="mDue"></div>
      <div class="fld"><label>E-mail odbiorcy</label><input type="email" id="mEmail" placeholder="klient@example.com"></div>
    </div>
    <div class="fld">
      <label>Wiadomość do odbiorcy (opcjonalnie)</label>
      <textarea id="mNote" rows="2" placeholder="Krótka notka dołączona nad treścią dokumentu…"></textarea>
    </div>
    <div class="btns">
      <button class="btn btn-light" id="mSaveDue">Zapisz termin</button>
      <button class="btn btn-dark" id="mSend">Wyślij e-mailem</button>
      <button class="btn btn-light" id="mClose">Zamknij</button>
    </div>
    <div class="msg" id="mMsg"></div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const __c = await (await fetch('/api/nip-lookup?fbconfig')).json();
const app = getApps().length ? getApps()[0] : initializeApp(__c);
const auth = getAuth(app);
let _user = null, _docs = [], _filter = 'all', _current = null;

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const DAY = 86400000;

async function api(path, opts = {}) {
  const t = await _user.getIdToken();
  const r = await fetch(path, { ...opts, headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...(opts.headers||{}) } });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
  return data;
}

// Klasyfikacja terminu
function dueInfo(iso) {
  if (!iso) return { cls: 'b-none', label: 'Brak terminu', rank: 3, ts: Infinity };
  const ms = new Date(iso).getTime();
  const diff = ms - Date.now();
  const d = new Date(ms).toLocaleDateString('pl-PL');
  if (diff < 0) {
    const days = Math.ceil(-diff / DAY);
    return { cls: 'b-over', label: `Po terminie: ${d} (${days} dni)`, rank: 0, ts: ms };
  }
  if (diff <= 7 * DAY) {
    const days = Math.max(1, Math.ceil(diff / DAY));
    return { cls: 'b-soon', label: `Termin: ${d} (za ${days} dni)`, rank: 1, ts: ms };
  }
  return { cls: 'b-ok', label: `Termin: ${d}`, rank: 2, ts: ms };
}

onAuthStateChanged(auth, async u => {
  if (!u) { $('content').className = 'error'; $('content').textContent = 'Zaloguj się, aby zobaczyć panel.'; return; }
  _user = u;
  load();
});

async function load() {
  $('content').className = 'loading';
  $('content').textContent = 'Ładowanie…';
  try {
    const { documents, debug } = await api('/api/dunning?action=documents');
    if (debug) $('debugBanner').style.display = 'block';
    _docs = documents || [];
    // sort: po terminie / wkrótce / z terminem / bez terminu; w grupie wg daty
    _docs.forEach(d => { d._due = dueInfo(d.dueDate); });
    _docs.sort((a, b) => a._due.ts - b._due.ts || (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderAttn();
    renderChips();
    render();
  } catch (e) {
    $('content').className = 'error';
    $('content').textContent = /feature_disabled/.test(e.message)
      ? 'Funkcja niedostępna na tym koncie.' : 'Błąd: ' + e.message;
  }
}

function renderAttn() {
  const over = _docs.filter(d => d._due.rank === 0).length;
  const soon = _docs.filter(d => d._due.rank === 1).length;
  $('cntOver').textContent = over;
  $('cntSoon').textContent = soon;
  $('cntAll').textContent = _docs.length;
  $('attn').style.display = 'flex';
}

function renderChips() {
  const cats = [...new Set(_docs.map(d => d.catLabel || 'Inne'))].sort();
  const chips = [['all', 'Wszystkie'], ...cats.map(c => [c, c])];
  $('chips').innerHTML = chips.map(([v, l]) =>
    `<div class="chip${v === _filter ? ' active' : ''}" data-f="${esc(v)}">${esc(l)}</div>`).join('');
  document.querySelectorAll('.chip').forEach(c => {
    c.onclick = () => { _filter = c.dataset.f; renderChips(); render(); };
  });
}

function render() {
  const list = _filter === 'all' ? _docs : _docs.filter(d => (d.catLabel || 'Inne') === _filter);
  if (!list.length) {
    $('content').className = 'empty';
    $('content').textContent = 'Brak dokumentów. Wygeneruj dokument w Dokumo, a pojawi się tutaj.';
    return;
  }
  $('content').className = '';
  $('content').innerHTML = list.map(d => {
    const created = d.createdAt ? new Date(d.createdAt).toLocaleDateString('pl-PL') : '—';
    return `<div class="card" data-id="${d.id}">
      <div class="card-ico">${esc(d.icon || '📄')}</div>
      <div class="card-mid">
        <div class="card-name">${esc(d.name)}</div>
        <div class="card-meta">${esc(d.catLabel || 'Inne')} · utworzono ${created}${d.lastSentAt ? ' · wysłano' : ''}</div>
      </div>
      <div class="badge ${d._due.cls}">${esc(d._due.label)}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(c => {
    c.onclick = () => openModal(_docs.find(x => x.id === c.dataset.id));
  });
}

function openModal(d) {
  _current = d;
  $('mName').textContent = d.name;
  $('mType').textContent = (d.catLabel || 'Inne') + (d.typeId ? ' · ' + d.typeId : '');
  $('mPreview').textContent = d.text || '(dokument nie zawiera treści tekstowej)';
  $('mDue').value = d.dueDate ? d.dueDate.slice(0, 10) : '';
  $('mEmail').value = d.recipientEmail || '';
  $('mNote').value = '';
  $('mMsg').className = 'msg';
  $('modalBg').classList.add('open');
}
function closeModal() { $('modalBg').classList.remove('open'); _current = null; }
function showMsg(t, ok) { const m = $('mMsg'); m.className = 'msg ' + (ok ? 'ok' : 'err'); m.textContent = t; }
function busy(b) { ['mSaveDue','mSend'].forEach(id => $(id).disabled = b); }

$('mClose').onclick = closeModal;
$('modalBg').onclick = e => { if (e.target === $('modalBg')) closeModal(); };

$('mSaveDue').onclick = async () => {
  if (!_current) return;
  busy(true);
  try {
    await api('/api/dunning', { method: 'POST', body: JSON.stringify({
      action: 'set-deadline', docId: _current.id,
      dueDate: $('mDue').value || null, recipientEmail: $('mEmail').value.trim(),
    })});
    showMsg('✓ Termin zapisany', true);
    setTimeout(() => { closeModal(); load(); }, 900);
  } catch (e) { showMsg('✗ ' + e.message, false); busy(false); }
};

$('mSend').onclick = async () => {
  if (!_current) return;
  const toEmail = $('mEmail').value.trim();
  if (!toEmail) { showMsg('Podaj e-mail odbiorcy.', false); return; }
  busy(true);
  try {
    const res = await api('/api/dunning', { method: 'POST', body: JSON.stringify({
      action: 'send-document', docId: _current.id, toEmail, note: $('mNote').value.trim(),
    })});
    showMsg(res.debug ? '✓ Zapisano (tryb testowy — mail nie wyszedł)' : '✓ Wysłano na ' + toEmail, true);
    setTimeout(() => { closeModal(); load(); }, 1300);
  } catch (e) { showMsg('✗ ' + e.message, false); busy(false); }
};
</script>
</body>
</html>
