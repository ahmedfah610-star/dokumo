<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="logo2.png">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://dokumoflow.com/panel.html">
<meta name="description" content="Panel administracyjny Dokumo.">
<title>Panel – Dokumo Admin</title>
<link rel="stylesheet" href="style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f3ef;font-family:'Inter',sans-serif;color:#1a1714;min-height:100vh;}
.panel-wrap{max-width:1200px;margin:0 auto;padding:24px 20px;}
h1{font-size:1.4rem;font-weight:800;margin-bottom:6px;}
.panel-sub{font-size:.82rem;color:#6b6560;margin-bottom:28px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px;}
.stat-card{background:#fff;border:1px solid rgba(26,23,20,.09);border-radius:14px;padding:18px 20px;}
.stat-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#6b6560;margin-bottom:6px;}
.stat-value{font-size:2rem;font-weight:800;color:#1a1714;line-height:1;}
.stat-note{font-size:.7rem;color:#aaa;margin-top:4px;}
.panel-section{background:#fff;border:1px solid rgba(26,23,20,.09);border-radius:14px;margin-bottom:20px;overflow:hidden;}
.panel-section-head{padding:14px 20px;border-bottom:1px solid rgba(26,23,20,.07);display:flex;align-items:center;justify-content:space-between;}
.panel-section-head h2{font-size:.9rem;font-weight:700;}
.panel-section-head span{font-size:.75rem;color:#aaa;}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
th{padding:10px 16px;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;border-bottom:1px solid rgba(26,23,20,.06);}
td{padding:10px 16px;border-bottom:1px solid rgba(26,23,20,.04);color:#444;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#faf8f4;}
.badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em;}
.badge-kariera{background:#dbeafe;color:#1e40af;}
.badge-biznes{background:#dcfce7;color:#15803d;}
.badge-promax{background:#1a1714;color:#fff;}
.loading{padding:40px;text-align:center;color:#aaa;font-size:.85rem;}
.error-msg{padding:40px;text-align:center;color:#e05c5c;font-size:.85rem;}
.login-wall{max-width:420px;margin:80px auto;background:#fff;border:1px solid rgba(26,23,20,.09);border-radius:16px;padding:40px;text-align:center;}
.login-wall h2{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
.login-wall p{font-size:.82rem;color:#6b6560;margin-bottom:20px;}
.btn-go{display:inline-block;padding:10px 24px;background:#1a1714;color:#fff;border-radius:10px;text-decoration:none;font-size:.82rem;font-weight:700;}
.grant-form{padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.grant-form label{display:flex;flex-direction:column;gap:4px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b6560;}
.grant-form input,.grant-form select{padding:8px 12px;border:1px solid rgba(26,23,20,.15);border-radius:8px;font-size:.82rem;font-family:inherit;outline:none;background:#fff;min-width:180px;}
.grant-form input:focus,.grant-form select:focus{border-color:#1a1714;}
.btn-grant{padding:9px 22px;background:#1a1714;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;}
.btn-grant:hover{background:#3a3330;}
.btn-grant:disabled{background:#aaa;cursor:not-allowed;}
.grant-result{margin-top:2px;font-size:.8rem;padding:8px 14px;border-radius:8px;display:none;}
.grant-result.ok{background:#dcfce7;color:#15803d;display:block;}
.grant-result.err{background:#fee2e2;color:#b91c1c;display:block;}
.grant-result.pending{background:#fef9c3;color:#854d0e;display:block;}
</style>
</head>
<body>

<div id="loginWall" class="login-wall" style="display:none">
  <h2>Brak dostępu</h2>
  <p>Zaloguj się na konto administratora aby zobaczyć panel.</p>
  <a href="konto.html" class="btn-go">Zaloguj się</a>
</div>

<div id="panelContent" style="display:none">
  <div class="panel-wrap">
    <h1>Panel administracyjny</h1>
    <div class="panel-sub">Historia płatności · Dokumo</div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Płatności łącznie</div><div class="stat-value" id="statPayments">—</div></div>
      <div class="stat-card"><div class="stat-label">Przychód (zł)</div><div class="stat-value" id="statRevenue">—</div><div class="stat-note">suma z Stripe</div></div>
    </div>

    <div class="panel-section" style="margin-bottom:20px">
      <div class="panel-section-head"><h2>Nadaj subskrypcję</h2><span>działa też dla kont które jeszcze nie istnieją</span></div>
      <div class="grant-form">
        <label>Email użytkownika
          <input type="email" id="grantEmail" placeholder="jan@example.com" autocomplete="off">
        </label>
        <label>Plan
          <select id="grantPlan">
            <option value="promax">ProMax</option>
            <option value="biznes">Biznes</option>
            <option value="kariera">Kariera</option>
          </select>
        </label>
        <label>Dni
          <input type="number" id="grantDays" value="30" min="1" max="365" style="min-width:80px;max-width:90px">
        </label>
        <button class="btn-grant" id="grantBtn" onclick="grantSub()">Nadaj</button>
      </div>
      <div style="padding:0 20px 16px">
        <div class="grant-result" id="grantResult"></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-head"><h2>Płatności</h2></div>
      <div id="paymentsContent" class="loading">Ładowanie...</div>
    </div>
  </div>
</div>

<div id="loadingScreen" style="padding:80px;text-align:center;color:#aaa;font-size:.9rem;">Ładowanie...</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const __c=await(await fetch('/api/nip-lookup?fbconfig')).json();const app = getApps().length ? getApps()[0] : initializeApp(__c);
const auth = getAuth(app);
let _adminUser = null;
window._getAdminToken = async () => _adminUser ? await _adminUser.getIdToken(true) : null;
onAuthStateChanged(auth, async user => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (!user) {
    document.getElementById('loginWall').style.display = 'block';
    return;
  }
  _adminUser = user;
  const token = await user.getIdToken();
  loadStats(token);
});

async function loadStats(token) {
  try {
    const res = await fetch('/api/analytics', { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.status === 403) {
      document.getElementById('loginWall').style.display = 'block';
      document.getElementById('loginWall').querySelector('p').textContent = 'Twoje konto nie ma uprawnień administratora.';
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { payments } = await res.json();
    document.getElementById('panelContent').style.display = 'block';
    renderStats(payments);
    renderPayments(payments);
  } catch(e) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('panelContent').style.display = 'block';
    document.getElementById('paymentsContent').innerHTML = '<div class="error-msg">Błąd ładowania: ' + e.message + '</div>';
  }
}

function renderStats(payments) {
  document.getElementById('statPayments').textContent = payments.length;
  const revenue = payments.reduce((s, p) => s + (p.amount || 0), 0);
  document.getElementById('statRevenue').textContent = (revenue / 100).toFixed(2);
}

function fmt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL') + ' ' + d.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
}

async function grantSub() {
  const email = document.getElementById('grantEmail').value.trim();
  const plan  = document.getElementById('grantPlan').value;
  const days  = parseInt(document.getElementById('grantDays').value) || 30;
  const btn   = document.getElementById('grantBtn');
  const res   = document.getElementById('grantResult');
  res.className = 'grant-result'; res.style.display = 'none'; res.textContent = '';
  if (!email) { res.className = 'grant-result err'; res.textContent = 'Wpisz email.'; return; }
  btn.disabled = true; btn.textContent = 'Zapisywanie…';
  try {
    const token = await window._getAdminToken();
    const r = await fetch('/api/admin-grant', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ email, plan, days })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Błąd ' + r.status);
    const exp = new Date(data.expiresAt).toLocaleDateString('pl-PL');
    if (data.status === 'granted') {
      res.className = 'grant-result ok';
      res.textContent = '✓ Nadano ' + plan.toUpperCase() + ' dla ' + email + ' — ważny do ' + exp;
    } else {
      res.className = 'grant-result pending';
      res.textContent = '⏳ Konto nie istnieje — ' + plan.toUpperCase() + ' aktywuje się automatycznie gdy ' + email + ' się zarejestruje (ważny do ' + exp + ')';
    }
    document.getElementById('grantEmail').value = '';
  } catch(e) {
    res.className = 'grant-result err';
    res.textContent = '✗ ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Nadaj';
  }
}
window.grantSub = grantSub;

function renderPayments(payments) {
  if (!payments.length) {
    document.getElementById('paymentsContent').innerHTML = '<div class="loading">Brak płatności.</div>';
    return;
  }
  const planBadge = p => {
    const cls = {kariera:'badge-kariera',biznes:'badge-biznes',promax:'badge-promax'}[p] || '';
    return `<span class="badge ${cls}">${p||'—'}</span>`;
  };
  let rows = payments.map(p => `
    <tr>
      <td>${fmt(p.ts)}</td>
      <td>${planBadge(p.plan)}</td>
      <td style="color:#555">${p.email||'—'}</td>
      <td style="font-weight:700">${p.amount ? (p.amount/100).toFixed(2)+' '+((p.currency||'pln').toUpperCase()) : '—'}</td>
      <td style="color:#aaa;font-size:.7rem;font-family:monospace">${(p.stripeSessionId||'').slice(0,20)}</td>
    </tr>`).join('');
  document.getElementById('paymentsContent').innerHTML = `
    <table>
      <thead><tr><th>Data</th><th>Plan</th><th>Email</th><th>Kwota</th><th>Stripe ID</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
</script>
</body>
</html>
